name: Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  toml-syntax:
    name: TOML 構文チェック (taplo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install taplo
        run: |
          curl -fsSL https://github.com/tamasfe/taplo/releases/latest/download/taplo-linux-x86_64.gz \
            | gunzip > /usr/local/bin/taplo
          chmod +x /usr/local/bin/taplo

      - name: taplo check (core/*.toml)
        run: |
          if ls core/*.toml >/dev/null 2>&1; then
            taplo check core/*.toml
          else
            echo "no core/*.toml; skip"
          fi

      - name: taplo check (rules/*.toml)
        run: |
          if ls rules/*.toml >/dev/null 2>&1; then
            taplo check rules/*.toml
          else
            echo "no rules/*.toml; skip"
          fi

  schema-validate:
    name: スキーマ + カタカナ検証 (validate.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 検証実行
        run: python3 tools/validate.py

  python-security:
    name: Python セキュリティ静的解析 (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: bandit scan (tools/)
        # tools/ 配下の Python script を任意コード実行系 API
        # (exec / eval / pickle / yaml.load / os.system / subprocess shell=True 等)
        # で scan、 medium 以上の severity が出たら CI fail。
        # 既存 script は subprocess.run(argv list, shell=False) のみで clean。
        # -ii = MEDIUM 以上を fail 対象に、 -ll = LOW 以上 confidence を表示。
        run: bandit -r tools/ -ii -ll

  test-append-only:
    name: Inline test append-only 検査
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # PR base ref を取得するため fetch-depth=0
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: append-only check (PR base との *.test.toml 比較)
        # docs/INLINE_TESTS.md の append-only ポリシー (= 既存 inline test case を
        # 削除しない、 reading 変更も削除と同等) を構造的に強制。
        # PR base の master 状態と HEAD を tools/check_test_append_only.py で比較し、
        # case が削除 / 変更されていたら CI fail。
        run: |
          python3 tools/check_test_append_only.py \
            --base-ref "${{ github.event.pull_request.base.sha }}"
