name: Dedup compat + Regen STATS.md / STATS_DUPS.md

# 辞書 (core/) / ルール (rules/) / 該当 tools/*.py のいずれかが master に push
# されたら、 順に:
#
#   1. compat 異体字 entries の dedup (unihan + jukugo + works)
#   2. STATS.md / STATS_DUPS.md の再生成
#
# を走らせて diff があれば **PR を作成 + GitHub 標準 auto-merge を enable** する。
# 4 個の required status checks が PR で pass すれば GitHub が自動 squash merge +
# branch 削除する。 contributor の手動操作は不要。
#
# bot 自身の commit / PR は `[skip stats]` を含むので再 trigger されない
# (regen-stats.yml も validate.yml も skip)。
#
# ## なぜ PR-based か (旧 direct push との違い)
#
# 旧実装では `git push` で master に直接 auto-commit していたが、 master の branch
# protection (4 個の required status checks) が github-actions[bot] の push を
# `4 of 4 required status checks are expected` で reject していた。 admin user の
# PAT を使う代替もあるが、 user 側に PAT 生成 + secret 登録の手作業が必要 →
# **PAT 不要** で完結する PR-based + auto-merge に切り替え。
#
# auto-merge の流れ:
# - bot が `auto-stats/<timestamp>` branch を作って regen 結果を commit
# - PR を master 向けに作成
# - **validate.yml を workflow_dispatch で明示 trigger** (GITHUB_TOKEN 起因の PR は
#   pull_request event を trigger しない GitHub の仕様回避、 workflow_dispatch /
#   repository_dispatch だけは GITHUB_TOKEN でも trigger 可能という公式 exception)
# - validate.yml の 4 checks が PR の head SHA で走る
# - 全 pass + merge 可能になった瞬間に GitHub auto-merge が squash + delete-branch
# - 50秒〜 数分の遅延あり (checks 完了待ち)、 自動 merge で contributor は何もしない

on:
  push:
    branches: [master]
    paths:
      - 'core/**/*.toml'
      - 'rules/**/*.toml'
      - 'tests/corpus/**/*.toml'
      - 'tools/regen_stats.py'
      - 'tools/list_dups.py'
      - 'tools/dedup_compat.py'

permissions:
  contents: write       # branch 作成 / commit / push に必要
  pull-requests: write  # PR 作成 + auto-merge 有効化に必要
  actions: write        # workflow_dispatch で validate.yml を明示 trigger するため

jobs:
  regen:
    name: dedup compat + STATS.md / STATS_DUPS.md 自動再生成
    if: "!contains(github.event.head_commit.message, '[skip stats]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: dedup compat 異体字 entries (unihan + jukugo + works)
        run: python3 tools/dedup_compat.py

      - name: STATS.md 再生成
        run: python3 tools/regen_stats.py

      - name: STATS_DUPS.md 再生成 (cross-file 重複レポート)
        run: python3 tools/list_dups.py

      - name: diff 検知 → PR 作成 + auto-merge enable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "辞書 + STATS.md / STATS_DUPS.md ともに drift なし、 PR 作成不要"
            exit 0
          fi
          echo "drift detected, creating auto-stats PR..."

          BRANCH="auto-stats/$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: dedup compat + regen STATS [skip stats]"
          git push -u origin "$BRANCH"

          # PR 作成 + auto-merge 有効化
          # `gh pr merge --auto --squash --delete-branch` は 「全 required checks
          # pass + merge 可能」 になった時点で GitHub が自動 squash merge し、
          # head branch も削除する組み込み機能。 設定 `allow_auto_merge: true` 必須
          # (repo settings、 確認済み)。
          PR_URL=$(gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "chore: dedup compat + regen STATS [skip stats]" \
            --body "Auto-generated regen by \`.github/workflows/regen-stats.yml\`. Triggered by ${GITHUB_SHA:0:7} on master.")
          echo "Created PR: $PR_URL"

          # GITHUB_TOKEN 起因の PR は pull_request event を発火しないので validate.yml が
          # 走らない → branch protection の required checks が満たされず auto-merge も
          # 永久に発火しない問題への対応。 workflow_dispatch を明示 dispatch すれば
          # GITHUB_TOKEN でも trigger 可 (公式 exception)、 validate.yml が PR branch
          # の SHA に対して走り、 4 checks の status が記録される。
          gh workflow run validate.yml --ref "$BRANCH"
          echo "Dispatched validate.yml on $BRANCH (4 required checks will run on PR)"

          gh pr merge --auto --squash --delete-branch "$PR_URL"
          echo "Auto-merge enabled. PR will merge once all required status checks pass."
