name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  package:
    name: Package + Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 解決された tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: tar.gz パッケージング
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="furigana-dict-${TAG}.tar.gz"
          # core/ (語彙辞書) と rules/ (助数詞・文脈・スケール等のエンジンルール) の両方を含める。
          # rules/ がないと本体 furigana は助数詞・文脈ルールが空のまま起動する。
          # _genre.toml はメンテナンス用メタデータ (STATS.md sub-section description) で
          # ja-furigana lib は読まないため release tar からは除外して配布サイズを削る。
          tar -czf "$ARCHIVE" --exclude='_genre.toml' core/ rules/
          ls -lh "$ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: sha256 計算
        run: |
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 前回 tag との差分 markdown 生成 (diff_release.py)
        # checkout は default で fetch-depth=1 のため、 tag 履歴を全部取り直す
        # (`git describe --tags HEAD^` が動くように)。
        # 直前 tag がない (= 最初の release) 場合は diff スキップ。
        run: |
          git fetch --tags --force --depth=200 || true
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          DIFF_FILE="furigana-dict-${TAG}-DIFF.md"
          if [ -n "$PREV" ]; then
            echo "前回 tag: $PREV → 今回 tag: $TAG"
            python3 tools/diff_release.py "$PREV" "$TAG" > "$DIFF_FILE"
            head -30 "$DIFF_FILE"
          else
            echo "# 初回 release ($TAG)" > "$DIFF_FILE"
            echo "" >> "$DIFF_FILE"
            echo "(前回 tag が無いので差分なし)" >> "$DIFF_FILE"
          fi
          echo "DIFF_FILE=$DIFF_FILE" >> "$GITHUB_ENV"

      - name: GitHub Release に upload
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            ${{ env.DIFF_FILE }}
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true

      - name: docs/release-diffs/ に diff を archive commit
        # 各 release の diff を repo 内 docs/release-diffs/<tag>.md として
        # 累積 commit する (一覧 / 検索 / 古い release への振り返り用)。
        # tag push trigger なので detached HEAD 状態。 master を fetch して
        # 切り替えてから docs/ に書き出して push する。
        # `[skip stats]` を含めるが、 docs/ は regen-stats workflow の paths
        # trigger に含まれないので元から走らない。
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git fetch origin master --depth=1
          git checkout -B master origin/master
          mkdir -p docs/release-diffs
          cp "$DIFF_FILE" "docs/release-diffs/${TAG}.md"
          if git diff --quiet -- docs/release-diffs/; then
            echo "diff なし (既に commit 済み or 同 tag 再走)、 skip"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/release-diffs/
          git commit -m "docs(release-diffs): ${TAG} [skip stats]"
          git push origin HEAD:master
