name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (CalVer 形式、 例: v2026.05.10)'
        required: true

permissions:
  contents: write

jobs:
  package:
    name: Package + Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # PAT で checkout (= docs/release-diffs/ archive commit を master に push する際、
          # branch protection を bypass できる PAT 所有者で push する必要があるため)。
          # RELEASE_PAT が未設定の repo では GITHUB_TOKEN に fallback (= archive commit step は失敗するが
          # tar.gz upload + draft 作成までは成功する)。
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: 解決された tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: tar.gz パッケージング
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="furigana-dict-${TAG}.tar.gz"
          # core/ (語彙辞書) と rules/ (助数詞・文脈・スケール等のエンジンルール) の両方を含める。
          # rules/ がないと本体 furigana は助数詞・文脈ルールが空のまま起動する。
          # _genre.toml (STATS sub-section description メタ) と *.test.toml (CI 専用
          # inline test) は ja-furigana lib が読まないため release tar から除外して
          # 配布サイズを削る。 lib loader 側でも file 名 match で skip するので双方
          # 防御 (release tar に紛れ込んでも runtime memory には載らない)。
          # README.md (例: core/works/README.md) は contributor 向け doc、 lib
          # runtime は読まないので release tar から除外。
          tar -czf "$ARCHIVE" \
            --exclude='_genre.toml' \
            --exclude='*.test.toml' \
            --exclude='README.md' \
            core/ rules/
          ls -lh "$ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: tests.tar.gz パッケージング (inline test 専用、 別配布)
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          TESTS_ARCHIVE="furigana-dict-${TAG}-tests.tar.gz"
          # *.test.toml だけを集めて別 tar に。 利用者の lib runtime には不要、
          # 他言語実装や regression test 共有のために別 asset として release page
          # で download 可能にする。 file が無い場合は空 tar を作って整合維持。
          if find core rules -name '*.test.toml' -print -quit | grep -q .; then
            find core rules -name '*.test.toml' -print0 | tar -czf "$TESTS_ARCHIVE" --null -T -
          else
            tar -czf "$TESTS_ARCHIVE" --files-from=/dev/null
          fi
          ls -lh "$TESTS_ARCHIVE"
          echo "TESTS_ARCHIVE=$TESTS_ARCHIVE" >> "$GITHUB_ENV"

      - name: sha256 計算
        run: |
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          sha256sum "$TESTS_ARCHIVE" > "${TESTS_ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256" "${TESTS_ARCHIVE}.sha256"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 前回 tag との差分 markdown 生成 (diff_release.py)
        # checkout は default で fetch-depth=1 のため、 tag 履歴を全部取り直す
        # (`git describe --tags HEAD^` が動くように)。
        # 直前 tag がない (= 最初の release) 場合は diff スキップ。
        run: |
          git fetch --tags --force --depth=200 || true
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          DIFF_FILE="furigana-dict-${TAG}-DIFF.md"
          if [ -n "$PREV" ]; then
            echo "前回 tag: $PREV → 今回 tag: $TAG"
            python3 tools/diff_release.py "$PREV" "$TAG" > "$DIFF_FILE"
            head -30 "$DIFF_FILE"
          else
            echo "# 初回 release ($TAG)" > "$DIFF_FILE"
            echo "" >> "$DIFF_FILE"
            echo "(前回 tag が無いので差分なし)" >> "$DIFF_FILE"
          fi
          echo "DIFF_FILE=$DIFF_FILE" >> "$GITHUB_ENV"

      - name: GitHub Release を draft で create + asset upload
        # Immutable Releases policy 下では published release への asset 追加が
        # 不可なので、 必ず draft で作って asset を全部入れてから後段で publish
        # する。 published 後は immutable lock が発効する設計。
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            ${{ env.TESTS_ARCHIVE }}
            ${{ env.TESTS_ARCHIVE }}.sha256
            ${{ env.DIFF_FILE }}
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          draft: true
          make_latest: 'false'

      - name: docs/release-diffs/ に diff を archive commit
        # 各 release の diff を repo 内 docs/release-diffs/<tag>.md として
        # 累積 commit する (一覧 / 検索 / 古い release への振り返り用)。
        # tag push trigger なので detached HEAD 状態。 master を fetch して
        # 切り替えてから docs/ に書き出して push する。
        # `[skip stats]` を含めるが、 docs/ は regen-stats workflow の paths
        # trigger に含まれないので元から走らない。
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git fetch origin master --depth=1
          git checkout -B master origin/master
          mkdir -p docs/release-diffs
          cp "$DIFF_FILE" "docs/release-diffs/${TAG}.md"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # untracked / new file も拾うため `git add` 先行 + `--cached` で staged
          # diff を見る (`git diff` 単独だと untracked dir は検出されない)。
          git add docs/release-diffs/
          if git diff --cached --quiet; then
            echo "diff なし (既に commit 済み or 同 tag 再走)、 skip"
            exit 0
          fi
          git commit -m "docs(release-diffs): ${TAG} [skip stats]"
          git push origin HEAD:master

      - name: Release を publish (draft → false、 immutable lock 発効)
        # docs/release-diffs/ commit まで成功したらここで draft を解除して publish。
        # publish 後は asset 編集不可 (immutable) になる。 publish 順を最後に
        # することで、 失敗時は draft が残って retry 可能 (asset 整合性確保)。
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release edit "$TAG" --repo "${{ github.repository }}" \
            --draft=false \
            --latest
