name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  package:
    name: Package + Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 解決された tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: tar.gz パッケージング
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="furigana-dict-${TAG}.tar.gz"
          # core/ (語彙辞書) と rules/ (助数詞・文脈・スケール等のエンジンルール) の両方を含める。
          # rules/ がないと本体 furigana は助数詞・文脈ルールが空のまま起動する。
          # _genre.toml はメンテナンス用メタデータ (STATS.md sub-section description) で
          # ja-furigana lib は読まないため release tar からは除外して配布サイズを削る。
          tar -czf "$ARCHIVE" --exclude='_genre.toml' core/ rules/
          ls -lh "$ARCHIVE"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: sha256 計算
        run: |
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          cat "${ARCHIVE}.sha256"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 前回 tag との差分 markdown 生成 (diff_release.py)
        # checkout は default で fetch-depth=1 のため、 tag 履歴を全部取り直す
        # (`git describe --tags HEAD^` が動くように)。
        # 直前 tag がない (= 最初の release) 場合は diff スキップ。
        run: |
          git fetch --tags --force --depth=200 || true
          TAG="${{ steps.tag.outputs.tag }}"
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          DIFF_FILE="furigana-dict-${TAG}-DIFF.md"
          if [ -n "$PREV" ]; then
            echo "前回 tag: $PREV → 今回 tag: $TAG"
            python3 tools/diff_release.py "$PREV" "$TAG" > "$DIFF_FILE"
            head -30 "$DIFF_FILE"
          else
            echo "# 初回 release ($TAG)" > "$DIFF_FILE"
            echo "" >> "$DIFF_FILE"
            echo "(前回 tag が無いので差分なし)" >> "$DIFF_FILE"
          fi
          echo "DIFF_FILE=$DIFF_FILE" >> "$GITHUB_ENV"

      - name: GitHub Release に upload
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
            ${{ env.DIFF_FILE }}
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
