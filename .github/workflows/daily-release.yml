name: Daily auto-release

# **PAUSED until ja-furigana lib 0.1.0 stable** (2026-05-09〜)
#
# alpha era は dict / lib の schema 不整合が起こりやすく、 daily auto-cut された
# dict release が古い alpha lib で読めない / 新 alpha lib が古い dict tar 読め
# ない 等の coordination cost が大きい。 lib 0.1.0 stable まで auto-cut は停止
# し、 lib release と coordinated に手動で打つ運用に切替。
#
# 停止中の動作:
# - schedule trigger は無効化 (cron コメントアウト)
# - `workflow_dispatch` は残置: stable release 時 + 緊急時の手動 release 用
#
# stable 後に schedule を復活する判断は user 側で。
#
# ─── 旧コメント (再開時の参考に残置) ─────────────────────────────────
# 1 日 1 回 (JST 03:00 / UTC 18:00) 起動。
# 前回 tag 以降に core/ または rules/ への変更が 1 件以上あれば、
# その日の date で CalVer tag を打つ → 既存 release.yml が
# tag push を catch して tar.gz + sha256 を GitHub Release に upload する。
#
# tag 形式: vYYYY.MM.DD (例: v2026.05.08)、同日 2 回目以降は v2026.05.08.1 / .2 …
#
# auto-commit (`chore: dedup compat + regen STATS [skip stats]`) は中身 (辞書 entry)
# の変更ではないので、 差分判定からは除外する。 `[skip stats]` tag の grep だけで
# fallback 上は十分だが、 念のため commit message prefix もマッチさせる。

on:
  # schedule:
  #   - cron: '0 18 * * *'    # UTC 18:00 = JST 03:00 — PAUSED
  workflow_dispatch:        # 手動トリガー (lib stable release 時 / 緊急時のみ)

permissions:
  contents: write

jobs:
  maybe-release:
    name: 差分があれば日付 tag を打つ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 前回 tag を解決
        id: last
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"

      - name: core/ rules/ の変更を確認 (auto-commit は除外)
        id: diff
        run: |
          LAST_TAG="${{ steps.last.outputs.tag }}"
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$LAST_TAG..HEAD"
          fi
          CHANGES=$(git log "$RANGE" --pretty='%H %s' -- core/ rules/ \
            | grep -v '\[skip stats\]' \
            | grep -v 'chore: dedup compat + regen STATS' \
            || true)
          if [ -z "$CHANGES" ]; then
            echo "No content changes in core/ or rules/ since $LAST_TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Changes since $LAST_TAG:"
            echo "$CHANGES"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 次の CalVer tag を計算 (vYYYY.MM.DD、同日複数なら .N suffix)
        if: steps.diff.outputs.skip != 'true'
        id: next
        run: |
          # JST date を使う (cron が JST 03:00 起動なので「今朝の date」になる)
          TODAY=$(TZ=Asia/Tokyo date +%Y.%m.%d)
          BASE="v${TODAY}"
          # 同日に既に release が打たれていたら .N suffix で衝突回避
          if ! git rev-parse "$BASE" >/dev/null 2>&1; then
            NEXT="$BASE"
          else
            i=1
            while git rev-parse "${BASE}.${i}" >/dev/null 2>&1; do
              i=$((i + 1))
            done
            NEXT="${BASE}.${i}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next tag: $NEXT"

      - name: tag を打って push
        if: steps.diff.outputs.skip != 'true'
        run: |
          NEXT="${{ steps.next.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 既存の release.yml workflow が tag push を catch して
          # tar.gz + sha256 を GitHub Release に upload する。
          git tag -a "$NEXT" -m "$NEXT (daily auto-release)"
          git push origin "$NEXT"
