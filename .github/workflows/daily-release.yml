name: Daily auto-release

# **RESUMED: 2026-05-12 (= ja-furigana lib v0.1.0 stable cut 後)**
#
# alpha era は dict / lib の schema 不整合が起こりやすく停止していたが、
# lib v0.1.0 stable + dict v0.1.0 coordinated 後は schema 互換 SemVer 維持、
# daily auto-cut の coordination cost が下がったので再開。
#
# 1 日 1 回 (JST 03:00 / UTC 18:00) 起動。
# 前回 tag 以降に core/ または rules/ への変更が 1 件以上あれば、
# その日の date で CalVer tag を打つ → 既存 release.yml が
# tag push を catch して tar.gz + sha256 を GitHub Release に upload する。
#
# tag 形式: vYYYY.MM.DD (例: v2026.05.08)、同日 2 回目以降は v2026.05.08.1 / .2 …
#
# auto-commit (`chore: dedup compat + regen STATS [skip stats]`) は中身 (辞書 entry)
# の変更ではないので、 差分判定からは除外する。 `[skip stats]` tag の grep だけで
# fallback 上は十分だが、 念のため commit message prefix もマッチさせる。

on:
  schedule:
    - cron: '0 18 * * *'    # UTC 18:00 = JST 03:00 (★resumed 2026-05-12)
  workflow_dispatch:        # 手動トリガー (緊急 release / 即時 cut 用)

permissions:
  contents: write

jobs:
  maybe-release:
    name: 差分があれば日付 tag を打つ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT 経由で tag push する (= GITHUB_TOKEN だと recursive workflow 制限で
          # release.yml が起動しない GitHub Actions の標準挙動を回避)。
          # RELEASE_PAT が未設定の repo では GITHUB_TOKEN に fallback (= 旧挙動)。
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: 前回 tag を解決
        id: last
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Last tag: $LAST_TAG"

      - name: core/ rules/ の変更を確認 (auto-commit は除外)
        id: diff
        run: |
          LAST_TAG="${{ steps.last.outputs.tag }}"
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$LAST_TAG..HEAD"
          fi
          CHANGES=$(git log "$RANGE" --pretty='%H %s' -- core/ rules/ \
            | grep -v '\[skip stats\]' \
            | grep -v 'chore: dedup compat + regen STATS' \
            || true)
          if [ -z "$CHANGES" ]; then
            echo "No content changes in core/ or rules/ since $LAST_TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Changes since $LAST_TAG:"
            echo "$CHANGES"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 次の CalVer tag を計算 (vYYYY.MM.DD、同日複数なら .N suffix)
        if: steps.diff.outputs.skip != 'true'
        id: next
        run: |
          # JST date を使う (cron が JST 03:00 起動なので「今朝の date」になる)
          TODAY=$(TZ=Asia/Tokyo date +%Y.%m.%d)
          BASE="v${TODAY}"
          # 同日に既に release が打たれていたら .N suffix で衝突回避
          if ! git rev-parse "$BASE" >/dev/null 2>&1; then
            NEXT="$BASE"
          else
            i=1
            while git rev-parse "${BASE}.${i}" >/dev/null 2>&1; do
              i=$((i + 1))
            done
            NEXT="${BASE}.${i}"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next tag: $NEXT"

      - name: tag を打って push
        if: steps.diff.outputs.skip != 'true'
        run: |
          NEXT="${{ steps.next.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 既存の release.yml workflow が tag push を catch して
          # tar.gz + sha256 を GitHub Release に upload する。
          git tag -a "$NEXT" -m "$NEXT (daily auto-release)"
          git push origin "$NEXT"
