[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "と"

# 「塗」 default 「ト」 (= 塗装/塗布/塗料/塗膜/塗炭/塗工)。
# 動詞 「塗る」 は okurigana 列挙で 「ぬ」 へ切替
[[kanji]]
char = "塗"
default = "ト"

# 「塗る/塗らない/塗った/塗って/塗れば/塗ろう/塗り○○」 = 動詞 → ぬ
[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "ぬ"

# 「唯」 default 「ユイ」 (= 唯一/唯物/唯心/唯美主義)。
# unihan default 「これ」 は古語指示詞、 現代では用例なし
[[kanji]]
char = "唯"
