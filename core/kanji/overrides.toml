[[kanji]]
char = "滞"
default = "タイ"

[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "とどこお"

# 「準」 default 「ジュン」 (= 準備/標準/基準/水準/準拠)。
# unihan default 「かた」 は古語、 現代では熟語 dominant
[[kanji]]
char = "準"
