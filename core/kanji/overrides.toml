char = "賭"
default = "ト"

# 「賭ける/賭けない/賭けた/賭けて/賭ければ/賭けよう/賭け○○」 = 動詞 → か
[[kanji.match]]
next_starts_any = ["け"]
reading = "か"

# 「込」 default 「こ」 (= 「込む/込める/取り込む/書き込む/見込み/込み入る」)。
