# 単漢字 default reading override + 文脈分岐 reading
#
# `[[kanji]]` block 形式で書く: 各 block は `char` (1 字 surface 必須) と
# `default` reading、 文脈分岐が要る場合は `[[kanji.match]]` block 配列を持つ
# (matcher vocabulary は entry inline match と完全同一)。
#
# 役割: lib の resolve_reading で Lindera reading が誤読 (= 訓読みが望ましい
# 単漢字に音読みを返す等) を返す surface を、 ここで明示的に default 上書き。
# 文脈による reading 切替 (例: 「生」 = セイ default だが 「生まれ」 のときは ウ)
# も `[[kanji.match]]` block で書ける。
#
# 関連 issue: <https://github.com/RyuuNeko1107/ja-furigana/issues/15>

[meta]
schema_version = "2"
role = "kanji"
description = "単漢字 default override + 文脈分岐 reading"

[[kanji]]
char = "土"
default = "ツチ"

# ─── default = on-yomi + 文脈 で kun-yomi 切替 (★alpha.14) ────────────────────
#
# 設計: 単独 standalone なら kun-yomi、 熟語文脈 (= 直後が漢字) なら on-yomi。
#
# - default = 熟語で最頻出の on-yomi (= 漢字連続 chunk 内 fallback で安全)
# - next_starts_any = [...] → kun-yomi (= 各漢字の活用形 / 助詞 / コピュラ を literal 列挙)
# - prev_ends_any = [...] → kun-yomi (= 助詞 / 形容詞活用 / 動詞活用 の語尾を literal 列挙)
# - next_eq = "々" → kun-yomi (= 踊り字反復、 「山々=やまやま」 等)
#
# ★方針: `next_char_type = "ひらがな"` / `prev_char_type = "ひらがな"` は **使わない**
#   (= 雑指定として禁止、 漢字ごとに literal okurigana / 助詞 を明示列挙)。
#   ただし以下は例外として残置可能:
#   - `prev_char_type = "漢字"` (= 接尾辞 case、 「漢字+力 = リョク」 等の組み合わせ無限大対応)
#   - `next_char_type = "カタカナ"` (= 「下ネタ = シモネタ」 等の特定 pattern)
#   - `next_char_type = "英数"` / `prev_char_type = "英数"` (= 数字接続の特定 pattern)

[[kanji]]
char = "上"
default = "ジョウ"

# 「上は / 上が / 上を / 上に / 上の / 上で / 上と / 上も / 上や / 上へ / 上から / 上まで / 上より」
# = 名詞用法 + 助詞接続 → ウエ
[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "うえ"

# 「○の上 / ○が上 / ○は上 / ○を上 / ○に上 / ○で上 / ○と上」 = 助詞 直後 → ウエ
[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "うえ"

# 踊り字「上々」 = ウエウエ
[[kanji.match]]
next_eq = "々"
reading = "うえ"

[[kanji]]
char = "下"
default = "カ"

# 「下は / 下が / 下を / 下に / 下の / 下で / 下と / 下も / 下や / 下へ / 下から / 下まで / 下より」
# = 名詞用法 + 助詞接続 → シタ
[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "した"

# 「下ネタ」 = シモネタ (= カタカナ語と複合する 「下」 は 「しも」 用法が多い)
[[kanji.match]]
next_starts_any = ["ネ"]
reading = "しも"

# 「○の下 / ○が下」 = 助詞 直後 → シタ
[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "した"

# 踊り字「下々」 = シタジタ
[[kanji.match]]
next_eq = "々"
reading = "した"

[[kanji]]
char = "前"
default = "ゼン"

# 「前は / 前が / 前を / 前に / 前の / 前で / 前と / 前も / 前や / 前へ / 前から / 前まで / 前より」
# = 名詞用法 + 助詞接続 → マエ
[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "まえ"

# 「○の前 / ○が前」 = 助詞 直後 → マエ
[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "まえ"

# 踊り字 「前々」 = マエマエ
[[kanji.match]]
next_eq = "々"
reading = "まえ"

# 「前 + 動詞 (= 言/見/聞/思/etc)」 = 「以前 〜 した」 用法、 default ゼン だと
# 「前言ってた → ゼンイッテタ」 になるが本来 「マエイッテタ」 (★round 31)
[[kanji.match]]
next_eq_any = ["言", "見", "聞", "思", "話", "書", "読", "持", "来", "行", "歩"]
reading = "まえ"

[[kanji]]
char = "後"
default = "ゴ"

# ★round 47、 「○○後 + に / の / で」 名詞用法 = prev カタカナ で ゴ
# (= 「スライド後に / リスポーン後の」 等)、 next ひらがな match より優先するため
# 物理順序を先頭に
[[kanji.match]]
prev_char_type = "カタカナ"
reading = "ゴ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "あと"

# 「後 3 試合 / 後 100 円」 等の副詞用法 = 数字後続で 「あと」
[[kanji.match]]
next_char_type = "英数"
reading = "あと"

# 「後、〜 / 後。〜」 文頭副詞用法 = 句読点後続で 「あと」
[[kanji.match]]
next_starts_any = ["、", "。", ",", "."]
reading = "あと"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "あと"

[[kanji.match]]
next_eq = "々"
reading = "あと"

[[kanji]]
char = "米"
default = "ベイ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "こめ"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "こめ"

[[kanji.match]]
next_eq = "々"
reading = "こめ"

[[kanji]]
char = "国"
default = "コク"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "くに"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "くに"

[[kanji.match]]
next_eq = "々"
reading = "くに"

[[kanji]]
char = "風"
default = "フウ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "かぜ"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "かぜ"

[[kanji.match]]
next_eq = "々"
reading = "かぜ"

[[kanji]]
char = "人"
default = "ジン"

# 漢数字 + 人 = ニン。 「一人 = ヒトリ」 「二人 = フタリ」 は counter people.toml の
# specials で対応するためここは 3〜10 のみ。 prev_char_type だと「個人/友人/恋人」 や
# 「人型/人前」 等に誤発火するため漢数字 literal 限定。
[[kanji.match]]
prev_ends_any = ["三", "四", "五", "六", "七", "八", "九", "十"]
reading = "ニン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "ひと"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "ひと"

[[kanji.match]]
next_eq = "々"
reading = "ひと"

[[kanji]]
char = "心"
default = "シン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "こころ"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "こころ"

[[kanji.match]]
next_eq = "々"
reading = "こころ"

[[kanji]]
char = "物"
default = "ブツ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "もの"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "もの"

[[kanji.match]]
next_eq = "々"
reading = "もの"

[[kanji]]
char = "山"
default = "サン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "やま"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "やま"

[[kanji.match]]
next_eq = "々"
reading = "やま"

[[kanji]]
char = "川"
default = "セン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "かわ"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "かわ"

[[kanji.match]]
next_eq = "々"
reading = "かわ"

[[kanji]]
char = "水"
default = "スイ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "みず"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "みず"

[[kanji.match]]
next_eq = "々"
reading = "みず"

[[kanji]]
char = "火"
default = "カ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "ひ"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "ひ"

[[kanji.match]]
next_eq = "々"
reading = "ひ"

[[kanji]]
char = "金"
default = "キン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "かね"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "かね"

[[kanji.match]]
next_eq = "々"
reading = "かね"

[[kanji]]
char = "月"
default = "ゲツ"

# 「月は / 月が / 月を / 月に / 月の / 月で / 月と / 月も / 月や / 月へ /
# 月から / 月まで / 月より / 月だ / 月です」 = 名詞用法 + 助詞 + コピュラ → ツキ
[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ", "だ"]
reading = "つき"

# 「○の月 / ○が月」 助詞 + 「○い月」「○る月」「○た月」「○て月」 形容詞/動詞活用 → ツキ
[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も", "い", "る", "た", "て"]
reading = "つき"

# 踊り字 「月々」 = ツキツキ
[[kanji.match]]
next_eq = "々"
reading = "つき"

[[kanji]]
char = "耳"
default = "ジ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "みみ"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "みみ"

[[kanji.match]]
next_eq = "々"
reading = "みみ"

[[kanji]]
char = "口"
default = "コウ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "くち"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "くち"

[[kanji.match]]
next_eq = "々"
reading = "くち"

[[kanji]]
char = "足"
default = "ソク"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "あし"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "あし"

[[kanji.match]]
next_eq = "々"
reading = "あし"

# 「足書く / 足音 / 足跡」 等 漢字後続も訓読み 「アシ」 が自然 (★round 36)
[[kanji.match]]
next_char_type = "漢字"
reading = "あし"

[[kanji]]
char = "車"
default = "シャ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "や", "へ", "か", "ま", "よ"]
reading = "くるま"

[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "くるま"

[[kanji.match]]
