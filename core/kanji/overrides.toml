char = "献"
default = "ケン"

# 「璽」 default 「ジ」 (= 御璽/玉璽/国璽、 天皇の印章)。
# unihan 「しるし」 は古語訓読み、 現代日本語では音読み主流 → default 訂正。
[[kanji]]
char = "璽"
default = "ジ"

# 「畝」 default 「うね」 (= 畝/畑の畝/畝織/畝間、 訓読み圧倒的)。
