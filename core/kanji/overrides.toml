# 単漢字 default reading override + 文脈分岐 reading
#
# `[[kanji]]` block 形式で書く: 各 block は `char` (1 字 surface 必須) と
# `default` reading、 文脈分岐が要る場合は `[[kanji.match]]` block 配列を持つ
# (matcher vocabulary は entry inline match と完全同一)。
#
# 役割: lib の resolve_reading で Lindera reading が誤読 (= 訓読みが望ましい
# 単漢字に音読みを返す等) を返す surface を、 ここで明示的に default 上書き。
# 文脈による reading 切替 (例: 「生」 = セイ default だが 「生まれ」 のときは ウ)
# も `[[kanji.match]]` block で書ける。
#
# 関連 issue: <https://github.com/RyuuNeko1107/ja-furigana/issues/15>

[meta]
schema_version = "2"
role = "kanji"
description = "単漢字 default override + 文脈分岐 reading"

[[kanji]]
char = "土"
default = "ツチ"

# ─── default = on-yomi + 送り仮名 / 助詞 で kun-yomi (★alpha.14) ───────────────
#
# 設計: 単独 standalone なら kun-yomi、 熟語文脈 (= 直後が漢字) なら on-yomi。
# Smart engine matcher で 直後 / 直前 が ひらがな または 「々」 なら kun-yomi に切替。
#
# - default = 熟語で最頻出の on-yomi (= 漢字連続 chunk 内 fallback で安全)
# - next_char_type = "ひらがな" → kun-yomi (= 直後が助詞 / 送り仮名)
# - prev_char_type = "ひらがな" → kun-yomi (= 入力末尾 / 助詞 直後)
# - next_eq = "々" → kun-yomi (= 踊り字反復、 「山々=やまやま」 等)

[[kanji]]
char = "上"
default = "ジョウ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "うえ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "うえ"

[[kanji.match]]
next_eq = "々"
reading = "うえ"

[[kanji]]
char = "下"
default = "カ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "した"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "した"

[[kanji.match]]
next_eq = "々"
reading = "した"

[[kanji]]
char = "前"
default = "ゼン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "まえ"

[[kanji.match]]
