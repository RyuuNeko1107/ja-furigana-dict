# 単漢字 default reading override + 文脈分岐 reading
#
# `[[kanji]]` block 形式で書く: 各 block は `char` (1 字 surface 必須) と
# `default` reading、 文脈分岐が要る場合は `[[kanji.match]]` block 配列を持つ
# (matcher vocabulary は entry inline match と完全同一)。
#
# 役割: lib の resolve_reading で Lindera reading が誤読 (= 訓読みが望ましい
# 単漢字に音読みを返す等) を返す surface を、 ここで明示的に default 上書き。
# 文脈による reading 切替 (例: 「生」 = セイ default だが 「生まれ」 のときは ウ)
# も `[[kanji.match]]` block で書ける。
#
# 関連 issue: <https://github.com/RyuuNeko1107/ja-furigana/issues/15>

[meta]
schema_version = "2"
role = "kanji"
description = "単漢字 default override + 文脈分岐 reading"

[[kanji]]
char = "土"
default = "ツチ"

# ─── default = on-yomi + 送り仮名 / 助詞 で kun-yomi (★alpha.14) ───────────────
#
# 設計: 単独 standalone なら kun-yomi、 熟語文脈 (= 直後が漢字) なら on-yomi。
# Smart engine matcher で 直後 / 直前 が ひらがな または 「々」 なら kun-yomi に切替。
#
# - default = 熟語で最頻出の on-yomi (= 漢字連続 chunk 内 fallback で安全)
# - next_char_type = "ひらがな" → kun-yomi (= 直後が助詞 / 送り仮名)
# - prev_char_type = "ひらがな" → kun-yomi (= 入力末尾 / 助詞 直後)
# - next_eq = "々" → kun-yomi (= 踊り字反復、 「山々=やまやま」 等)

[[kanji]]
char = "上"
default = "ジョウ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "うえ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "うえ"

[[kanji.match]]
next_eq = "々"
reading = "うえ"

[[kanji]]
char = "下"
default = "カ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "した"

# 「下ネタ / 下半身 / 下半期 / 下校」 等の 「しも」 用法 (= カタカナ後続)
# 「下ネタ」 = 「しもネタ」 期待、 「下半期」 = jukugo dict 1000 で 「カハンキ」 既覆い
# なら、 「下 + カタカナ」 だけでも 「しも」 採用で多くの case をカバー
[[kanji.match]]
next_char_type = "カタカナ"
reading = "しも"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "した"

[[kanji.match]]
next_eq = "々"
reading = "した"

[[kanji]]
char = "前"
default = "ゼン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "まえ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "まえ"

[[kanji.match]]
next_eq = "々"
reading = "まえ"

# 「前 + 動詞 (= 言/見/聞/思/etc)」 = 「以前 〜 した」 用法、 default ゼン だと
# 「前言ってた → ゼンイッテタ」 になるが本来 「マエイッテタ」、 round 31 で fix
[[kanji.match]]
next_eq_any = ["言", "見", "聞", "思", "話", "書", "読", "持", "来", "行", "歩"]
reading = "まえ"

[[kanji]]
char = "後"
default = "ゴ"

# ★round 47、 「○○後 + に / の / で」 名詞用法 = prev カタカナ で ゴ
# (= 「スライド後に / リスポーン後の」 等)、 next ひらがな match より優先するため
# 物理順序を先頭に
[[kanji.match]]
prev_char_type = "カタカナ"
reading = "ゴ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "あと"

# 「後 3 試合 / 後 100 円」 等の副詞用法 = 数字後続で 「あと」
[[kanji.match]]
next_char_type = "英数"
reading = "あと"

# 「後、〜 / 後。〜」 文頭副詞用法 = 句読点後続で 「あと」
[[kanji.match]]
next_starts_any = ["、", "。", ",", "."]
reading = "あと"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "あと"

[[kanji.match]]
next_eq = "々"
reading = "あと"

[[kanji]]
char = "米"
default = "ベイ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "こめ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "こめ"

[[kanji.match]]
next_eq = "々"
reading = "こめ"

[[kanji]]
char = "国"
default = "コク"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "くに"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "くに"

[[kanji.match]]
next_eq = "々"
reading = "くに"

[[kanji]]
char = "風"
default = "フウ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "かぜ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "かぜ"

[[kanji.match]]
next_eq = "々"
reading = "かぜ"

[[kanji]]
char = "人"
default = "ジン"

# 漢数字 + 人 = ニン。 「一人 = ヒトリ」 「二人 = フタリ」 は counter people.toml の
# specials で対応するためここは 3〜10 のみ。 prev_char_type だと「個人/友人/恋人」 や
# 「人型/人前」 等に誤発火するため漢数字 literal 限定。
[[kanji.match]]
prev_ends_any = ["三", "四", "五", "六", "七", "八", "九", "十"]
reading = "ニン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "ひと"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "ひと"

[[kanji.match]]
next_eq = "々"
reading = "ひと"

[[kanji]]
char = "心"
default = "シン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "こころ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "こころ"

[[kanji.match]]
next_eq = "々"
reading = "こころ"

[[kanji]]
char = "物"
default = "ブツ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "もの"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "もの"

[[kanji.match]]
next_eq = "々"
reading = "もの"

[[kanji]]
char = "山"
default = "サン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "やま"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "やま"

[[kanji.match]]
next_eq = "々"
reading = "やま"

[[kanji]]
char = "川"
default = "セン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "かわ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "かわ"

[[kanji.match]]
next_eq = "々"
reading = "かわ"

[[kanji]]
char = "水"
default = "スイ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "みず"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "みず"

[[kanji.match]]
next_eq = "々"
reading = "みず"

[[kanji]]
char = "火"
default = "カ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "ひ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "ひ"

[[kanji.match]]
next_eq = "々"
reading = "ひ"

[[kanji]]
char = "金"
default = "キン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "かね"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "かね"

[[kanji.match]]
next_eq = "々"
reading = "かね"

[[kanji]]
char = "月"
default = "ゲツ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "つき"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "つき"

[[kanji.match]]
next_eq = "々"
reading = "つき"

[[kanji]]
char = "耳"
default = "ジ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "みみ"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "みみ"

[[kanji.match]]
next_eq = "々"
reading = "みみ"

[[kanji]]
char = "口"
default = "コウ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "くち"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "くち"

[[kanji.match]]
next_eq = "々"
reading = "くち"

[[kanji]]
char = "足"
default = "ソク"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "あし"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "あし"

[[kanji.match]]
next_eq = "々"
reading = "あし"

# 「足書く / 足音 / 足跡」 等 漢字後続も訓読み 「アシ」 が自然 (★round 36)
[[kanji.match]]
next_char_type = "漢字"
reading = "あし"

[[kanji]]
char = "車"
default = "シャ"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "くるま"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "くるま"

[[kanji.match]]
next_eq = "々"
reading = "くるま"

[[kanji]]
char = "今"
default = "コン"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "いま"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "いま"

# 「今思った / 今食べる / 今行く」 = 漢字後続でも副詞 「いま」、 熟語 (= 「今度 /
# 今晩 / 今月 / 今年」) は dict 1000 jukugo で覆われる前提。 [[kanji]] block 「今」
# は band 100 fallback。
[[kanji.match]]
next_char_type = "漢字"
reading = "いま"

[[kanji.match]]
next_eq = "々"
reading = "いま"

# 「今8音量 / 今2時 / 今15分」 等の 「今 + 数字」 副詞用法も 「いま」 ★round 40
[[kanji.match]]
next_char_type = "英数"
reading = "いま"

# 来 — ka 変動詞、 活用ごとに母音変化 (キ / ク / コ)。 Lindera は 「来た」 を
# 「来 + た」 2 tokens で返すので、 来 1 字 surface に対する文脈分岐が必要。
# next 1 文字目で読みを決定:
#   た / て / ま (=ます) → キ
#   る → ク (Lindera 「来る」 1 token 「クル」 で覆われる場合多い)
#   な / よ / い → コ (来ない / 来よう / 来い)
[[kanji]]
char = "来"
default = "ライ"  # 来年/来週/来月/未来/将来 等の compound 用

# 「来た / 来て / 来ます / 来ちゃった / 来やすい / 来そう」 = キ + 送りがな
# (★round 22 「ち」、 ★round 24 「や」、 ★round 32 「そ」 追加)
[[kanji.match]]
next_starts_any = ["た", "て", "ま", "ち", "や", "そ"]
reading = "キ"

[[kanji.match]]
next_starts = "る"
reading = "ク"

[[kanji.match]]
next_starts_any = ["な", "よ", "い"]
reading = "コ"

# ─── 動詞 / 形容詞 1 字 (★alpha.19) ─────────────────────────────────────────
#
# 設計: default = 熟語で最頻出の on-yomi、 次の文字 (= 送り仮名先頭) で kun-yomi
# stem に分岐。 「美しい」 → 美 (ウツクシ) + しい、 「食べる」 → 食 (タベ) + べる、 等。
# 通常は Lindera が活用全体を 1 token で返して band 50 で勝つので [[kanji]] block
# は safety net、 declarative に書くことで trace 性 + contributor PR 余地確保。

[[kanji]]
char = "美"
default = "ビ"  # 美術 / 美人 / 美容 / 美少女 等

[[kanji.match]]
next_starts = "し"  # 美しい / 美しかった / 美しさ
reading = "ウツクシ"

[[kanji]]
char = "食"
default = "ショク"  # 食事 / 食物 / 食堂 / 夕食 等

[[kanji.match]]
next_starts = "べ"  # 食べる / 食べた / 食べない / 食べます
reading = "タベ"

[[kanji.match]]
next_starts_any = ["う", "わ", "っ"]  # 食う / 食わない / 食って (口語)
reading = "ク"

[[kanji]]
char = "飲"
default = "イン"  # 飲料 / 飲食

[[kanji.match]]
next_starts_any = ["み", "む", "ん", "め", "ま"]  # 飲み / 飲む / 飲んだ / 飲める / 飲まない
reading = "ノ"

[[kanji]]
char = "走"
default = "ソウ"  # 走行 / 競走 / 暴走

[[kanji.match]]
next_starts_any = ["り", "る", "っ", "ら", "れ"]  # 走り / 走る / 走った / 走らない / 走れば
reading = "ハシ"

[[kanji]]
char = "高"
default = "コウ"  # 高校 / 高速 / 最高 / 高度

[[kanji.match]]
next_starts_any = ["い", "く", "か", "さ", "ま", "す"]  # 高い / 高く / 高かった / 高さ / 高まる / 高すぎ
reading = "タカ"

[[kanji]]
char = "楽"
default = "ラク"  # 楽園 / 安楽 (= 音楽=オンガク は jukugo entry で band 1000)

[[kanji.match]]
next_starts = "し"  # 楽しい / 楽しかった / 楽しむ
reading = "タノシ"

[[kanji]]
char = "苦"
default = "ク"  # 苦労 / 苦痛 / 苦悩

[[kanji.match]]
next_starts = "し"  # 苦しい / 苦しんだ / 苦しさ
reading = "クルシ"

[[kanji]]
char = "早"
default = "ソウ"  # 早朝 / 早期 / 早急

[[kanji.match]]
next_starts_any = ["い", "く", "か", "ま", "す"]  # 早い / 早く / 早かった / 早まる / 早すぎ
reading = "ハヤ"

[[kanji]]
char = "古"
default = "コ"  # 古代 / 古典 / 中古

[[kanji.match]]
next_starts_any = ["い", "く", "か", "び"]  # 古い / 古く / 古かった / 古びる
reading = "フル"

[[kanji]]
char = "低"
default = "テイ"  # 低音 / 低気圧 / 低下

[[kanji.match]]
next_starts_any = ["い", "く", "か", "ま"]  # 低い / 低く / 低かった / 低まる
reading = "ヒク"

[[kanji]]
char = "忙"
default = "ボウ"  # 多忙 / 繁忙

[[kanji.match]]
next_starts = "し"  # 忙しい / 忙しかった
reading = "イソガシ"

[[kanji]]
char = "読"
default = "ドク"  # 読書 / 読者 / 音読

[[kanji.match]]
next_starts_any = ["み", "む", "ん", "め", "ま"]  # 読み / 読む / 読んだ / 読める
reading = "ヨ"

[[kanji]]
char = "遅"
default = "チ"  # 遅刻 / 遅延

[[kanji.match]]
next_starts_any = ["い", "く", "か"]  # 遅い / 遅く / 遅かった
reading = "オソ"

[[kanji.match]]
next_starts = "れ"  # 遅れる / 遅れた
reading = "オク"

# ─── 動詞 / 形容詞 1 系統絞り ──────────────────────────────────────────────
#
# 頻度上位の動詞 / 形容詞活用語幹を `[[kanji]]` block で declarative にカバー。 共通設計:
# - default = 音読み (= 熟語 fallback)、 「使用」 「言語」 等の jukugo dict 1000 が
#   勝つので default は熟語の中で残りやすい音読みを選ぶ
# - next_char_type = ひらがな → 訓読み語幹 (= 動詞活用 「使う/使えた/使わない/使って」
#   を 「使(つか)」+「う/え/わ/って」 のように分解)
#
# 多義動詞 (行/入/落/出/何/主/分 等) は 1 系統に絞ると誤読リスク高、 別途 next_starts
# 精密化で後追い予定。 ここは「片方の読みが圧倒的多数」 な surface のみ。

[[kanji]]
char = "使"
default = "ツカイ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ツカ"

[[kanji]]
char = "言"
default = "ゲン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "イ"

[[kanji]]
char = "見"
default = "ケン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ミ"

[[kanji]]
char = "思"
default = "シ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "オモ"

[[kanji]]
char = "終"
default = "シュウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "オワ"

[[kanji]]
char = "強"
default = "キョウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ツヨ"

[[kanji]]
char = "持"
default = "ジ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "モ"

[[kanji]]
char = "勝"
default = "ショウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "カ"

[[kanji]]
char = "変"
default = "ヘン"  # 変な / 変だ / 変身 / 変化 / 変装 等は 「ヘン」、 round 33 で 「な / だ」
                  # を default に fallback、 動詞活用のみ 「カ」 に
[[kanji.match]]
next_starts_any = ["え", "わ"]  # 「変える / 変わる / 変わった / 変わらない」 = カ + 送りがな
reading = "カ"

[[kanji]]
char = "寝"
default = "シン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ネ"
# 「寝落ち / 寝顔 / 寝坊」 等 漢字後続も訓読み 「ネ」 が自然 (★round 36)
[[kanji.match]]
next_char_type = "漢字"
reading = "ネ"

# ─── 多義動詞 (行/入/落/出 を next_starts で精密分岐) ────────────────────────
#
# 1 字 [[kanji]] block で 2 つの訓読みを切り替える設計。 ひらがな送りがなの先頭文字
# (next_starts / next_starts_any) で 「どの活用語幹を使うか」 を declarative に書ける。
# default は熟語用音読み (= dict band 1000 で個別熟語 entry が勝つので、 dict 未登録の
# 漢字連続 case の fallback としてのみ使われる)。

[[kanji]]
char = "行"
default = "ギョウ"
# 「行く / 行か / 行け / 行こう / 行って」 = イ + 送りがな
[[kanji.match]]
next_starts_any = ["く", "か", "け", "こ", "っ"]
reading = "イ"
# 「行う / 行わ / 行え / 行おう / 行い」 = オコナ + 送りがな
[[kanji.match]]
next_starts_any = ["う", "わ", "え", "お", "い"]
reading = "オコナ"

[[kanji]]
char = "入"
default = "ニュウ"
# 「入って / 入る / 入り / 入ろう / 入らない」 = ハイ + 送りがな
[[kanji.match]]
next_starts_any = ["っ", "る", "り", "ろ", "ら"]
reading = "ハイ"
# 「入れる / 入れた / 入れて」 = イ + 送りがな
[[kanji.match]]
next_starts = "れ"
reading = "イ"

[[kanji]]
char = "落"
default = "ラク"
# 「落ちる / 落ちた / 落ちて / 落ちます」 = オチ + 送りがな
[[kanji.match]]
next_starts = "ち"
reading = "オチ"
# 「落とす / 落とした / 落として」 = オト + 送りがな
[[kanji.match]]
next_starts = "と"
reading = "オト"

[[kanji]]
char = "出"
default = "シュツ"
# 「出る / 出て / 出ない / 出よう / 出ろ / 出た / 出ます」 = デ + 送りがな
# (★round 16 「た」 「ま」 追加 = round 2 漏れ、 「出た → でた」 「出ます → でます」 fix)
[[kanji.match]]
next_starts_any = ["る", "て", "な", "よ", "ろ", "た", "ま"]
reading = "デ"
# 「出す / 出した / 出して / 出さない / 出せ / 出そう」 = ダ + 送りがな
[[kanji.match]]
next_starts_any = ["す", "し", "さ", "せ", "そ"]
reading = "ダ"

# ─── default 修正 ────────────────────────────────────────────────────────────

# 「的」: 接尾辞用法 (= 「全体的に / 基本的」) が圧倒的多数、 default を 「テキ」 に。
# 単独 「的」 = まと は dict / context match で個別 jukugo 化 (= 「弓的」 等)。
[[kanji]]
char = "的"
default = "テキ"

# 「次」: 「つぎ」 が圧倒的、 「つぐ」 動詞 「次ぐ」 は希少。 default を 「つぎ」 に。
[[kanji]]
char = "次"
default = "つぎ"

# ─── 単漢字 default 修正 ────────────────────────────────────────────────────

# 「手」: 単独 「て」 (= 「手が震える / 猫の手 / 手を貸す」) が圧倒的多数。
# 「シュ」 音読みは熟語 dict 1000 で覆う (= 「歌手 / 選手 / 助手」)。
[[kanji]]
char = "手"
default = "て"

# 「力」: 単独 「ちから」 + 接尾辞 「リョク」 (= 「免疫力 / 集中力 / 体力」)。
# 接尾辞用法が圧倒的、 単独は 「ちから」 名詞。 漢字後続 = 熟語末尾 → リョク。
[[kanji]]
char = "力"
default = "ちから"
[[kanji.match]]
prev_char_type = "漢字"
reading = "リョク"

# 「雅」: 形容動詞 「雅な / 雅やか」 で 「みやび」、 default 「つね」 は希少。
[[kanji]]
char = "雅"
default = "みやび"

# 「為」: 「為に / 為だ / 為になる」 で名詞 「ため」、 default 「おさめる」 は誤読が大半。
[[kanji]]
char = "為"
default = "ため"

# 「居」: 動詞 「居る / 居ない / 居て / 居た」 = イ + 送りがな。 default は 「居住 /
# 同居」 等の音読み 「キョ」 (= 熟語 dict 1000 で勝つ)。 ひらがな後続で動詞語幹に。
# default を訓読み 「いる」 にすると 「居ない」 → 「いるない」 と誤読される。
[[kanji]]
char = "居"
default = "キョ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "イ"

# 「悪」: 形容詞 「悪い / 悪く / 悪かった」 + 接頭辞 「悪すぎる」 = 「わる」 語幹。
# 音読み 「アク」 (= 「悪魔 / 悪人 / 善悪」) は dict 1000 で勝つ前提で default 化。
[[kanji]]
char = "悪"
default = "アク"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ワル"

# 「嫌」: 多義 — 形容動詞 「いや」 (= 「嫌で / 嫌だ / 嫌な」) + 動詞 / 形容詞 「きら」
# (= 「嫌い / 嫌う / 嫌わない」)。 形容動詞用法が文末 / 助詞前に多いので default は イヤ、
# 「い / う / わ / え / お」 後続で動詞活用語幹 キラ。
[[kanji]]
char = "嫌"
default = "イヤ"
[[kanji.match]]
next_starts_any = ["い", "う", "わ", "え", "お"]
reading = "キラ"

# 「対」: 標準音読み 「タイ」 (= 「対戦 / 対象 / 対応 / 対立 / 対あり」)。
# 「ツイ」 は 「一対 (ひとつい)」 等の限定用法。
[[kanji]]
char = "対"
default = "タイ"

# 「全」: 接頭辞 「全自動 / 全体 / 全部 / 全力 / 全員」 で 「ゼン」 が圧倒的。
# 副詞 「全く」 は dict 1000 jukugo で 「マッタク」 を別途登録。
[[kanji]]
char = "全"
default = "ゼン"

# 「目」: 単独 「目が / 目を / 目に / 目の」 で 「メ」 が圧倒的。 「目的 / 目標 /
# 注目」 等の 「モク」 は dict 1000 jukugo で覆う前提。
[[kanji]]
char = "目"
default = "め"

# 「会」: 音読み 「カイ」 (= 「会議 / 大会 / 機会 / 次会」 等の熟語) が圧倒的。
# 動詞 「会う / 会わない」 はひらがな後続で 「あ」 (= 「会う」 = 「あう」 = 「あ」+「う」)。
[[kanji]]
char = "会"
default = "カイ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "あ"

# 「話」: 名詞 「話 (はなし)」 と動詞 「話す」 で語幹分岐。 default は名詞形 「はなし」、
# 動詞活用 (= 「話す / 話して / 話さない」) は す/し/さ/せ/そ 後続で語幹 「はな」。
[[kanji]]
char = "話"
default = "はなし"
[[kanji.match]]
next_starts_any = ["す", "し", "さ", "せ", "そ"]
reading = "はな"

# 「例」: 名詞 「例 (れい)」 = 「例の / 例文 / 例題」 圧倒的、 動詞 「例える / 例えば」
# は え 後続 で 「たと」。 unihan default 「たとえる」 だと 「例の / 例題」 が誤読。
[[kanji]]
char = "例"
default = "れい"
[[kanji.match]]
next_starts = "え"
reading = "たと"

# 「似」: 動詞 「似る / 似た / 似て」 で 「に」 語幹、 単独 「似」 はレア (= 「相似」
# 等の音読み 「ジ」 は dict 1000)。 default 「に」 + ひらがな後続も 「に」 で統一、
# unihan default 「にる」 だと 「似てる」 → 「にるてる」 になる。
[[kanji]]
char = "似"
default = "に"

# 「戦」: 音読み 「セン」 (= 「戦争 / 作戦 / 争奪戦 / 大戦」) が圧倒的。 動詞
# 「戦う / 戦った」 = タタカ 語幹は ひらがな後続。 unihan default 「いくさ」 だと
# 「争奪戦 → そうだついくさ」 になる。
[[kanji]]
char = "戦"
default = "セン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "タタカ"

# 「僕」: 一人称 「ぼく」 圧倒的、 「しもべ」 (= 古語 / 文語) はレア。 unihan default
# 「しもべ」 だと 「僕は / 僕の / 僕も」 全部 「しもべ」 で違和感。
[[kanji]]
char = "僕"
default = "ぼく"

# 「性」: 接尾辞 「セイ」 (= 「可能性 / 重要性 / 必要性 / 個性」 等) が圧倒的。
# 名詞 「性 (さが)」 (= 「人間の性」) は希少。
[[kanji]]
char = "性"
default = "セイ"

# 「熱」: 名詞 「熱 (ねつ)」 (= 「熱は / 熱が / 熱を / 熱中」) 圧倒的、 形容詞
# 「熱い」 = 「あつい」 は ひらがな後続。
[[kanji]]
char = "熱"
default = "ねつ"
[[kanji.match]]
next_starts_any = ["い", "く", "か"]
reading = "あつ"

# 「更」: 音読み 「コウ」 (= 「変更 / 更新 / 更生」 等) が圧倒的、 副詞 「更に
# (さらに)」 は ひらがな後続。
[[kanji]]
char = "更"
default = "コウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "さら"

# 「均」: 「平均 / 均等 / 百均 / 均一」 等の音読み 「キン」 が圧倒的。 動詞 「均す
# (ならす) / 整える (ととのえる)」 は希少。
[[kanji]]
char = "均"
default = "キン"

# 「器」: 多義。 単独 / 助詞前 = うつわ (= 「ガラスの器 / 器が割れた」)、 熟語末尾
# = キ (= 「機器 / 食器 / 充電器 / 楽器」)。 prev_char_type=漢字 (= 熟語末尾位置) で
# キ に切り替え、 そうでなければ default うつわ。
[[kanji]]
char = "器"
default = "うつわ"
[[kanji.match]]
prev_char_type = "漢字"
reading = "キ"

# 「曲」: 「楽曲 / 名曲 / 作曲 / 一曲」 等の音読み 「キョク」 が圧倒的。 動詞
# 「曲がる (まがる)」 は ひらがな後続。
[[kanji]]
char = "曲"
default = "キョク"
# 動詞活用 「曲がる / 曲げる / 曲がった / 曲げて」 = が/げ/ぎ 後続のみ。
# 「曲は / 曲の / 曲が」 (= 名詞 + 助詞) は default 「キョク」 維持。
# ★round 18 で next_char_type=ひらがな に絞っていたのを、 「曲は」 誤読 (= まがは) のため
# 動詞 5/1 段活用先頭文字に限定。
[[kanji.match]]
next_starts_any = ["が", "げ", "ぎ"]
reading = "ま"

# 「短」: 音読み 「タン」 (= 「短期 / 短歌 / 短時間 / 最短」) が圧倒的。
# 形容詞 「短い (みじかい)」 は ひらがな後続。
[[kanji]]
char = "短"
default = "タン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "みじか"

# 「用」: 「ヨウ」 (= 「使用 / 用途 / 用件 / 喋る用 / 利用」) が圧倒的。 動詞
# 「用いる」 は希少 (= ほぼ書き言葉)。
[[kanji]]
char = "用"
default = "ヨウ"

# 「班」: 「ハン」 (= 「拠点処理班 / 班長 / 救助班」) が圧倒的。 動詞 「分ける
# (わける)」 は本来 「分」 字の用法、 「班」 単独で 「わける」 は誤読。
[[kanji]]
char = "班"
default = "ハン"

# 「非」: 接頭辞 「ヒ」 (= 「非表示 / 非常 / 非番 / 非公開」) が圧倒的。 古語
# 「非ず (あらず)」 は希少。
[[kanji]]
char = "非"
default = "ヒ"

# 「敵」: 音読み 「テキ」 (= 「強敵 / 対敵 / 大敵 / 敵対 / 味方敵」) が圧倒的。
# 「かたき」 (= 仇討ち文脈) は希少。
[[kanji]]
char = "敵"
default = "テキ"

# 「久」: 音読み 「キュウ」 (= 「永久 / 久遠」) + 「久しい (ひさしい)」 ひらがな後続。
# 「久々 = ひさびさ」 は jukugo で別途。
[[kanji]]
char = "久"
default = "キュウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ひさ"

# 「銀」: 「ギン」 (= 「銀メダル / 白銀 / 銀行 / 銀河 / 銀製」) が圧倒的。
# 「しろがね」 (= 古語 / 雅称) は希少。
[[kanji]]
char = "銀"
default = "ギン"

# 「和」: 「ワ」 (= 「平和 / 和食 / 和傘 / 大和 / 調和」) が圧倒的。 動詞
# 「和らぐ (やわらぐ)」 は ひらがな後続。
[[kanji]]
char = "和"
default = "ワ"
[[kanji.match]]
next_starts_any = ["ら", "む"]
reading = "やわ"

# 「運」: 音読み 「ウン」 (= 「幸運 / 運命 / 運勢 / 運用 / 運転」) が圧倒的。
# 動詞 「運ぶ (はこぶ)」 = ば/ん/び/べ/ぼ 後続 (= 「運ぶ / 運ばない / 運んで / 運べ /
# 運ぼう」 五段活用)。 「運じゃない」 「運だ」 は名詞 「うん」 + 助動詞でそのまま。
[[kanji]]
char = "運"
default = "ウン"
[[kanji.match]]
next_starts_any = ["ば", "ん", "び", "べ", "ぼ"]
reading = "はこ"

# 「劇」: 音読み 「ゲキ」 (= 「演劇 / 茶番劇 / 劇場 / 喜劇」) が圧倒的。 形容詞
# 「劇しい (はげしい)」 は古語、 現代では 「激しい」 = 「激」 字。
[[kanji]]
char = "劇"
default = "ゲキ"

# 「絵」: 名詞 「絵 (え)」 (= 「絵を描く / 絵本 / 絵下手 / 絵心」) が圧倒的。
# 音読み 「カイ」 は 「絵画」 の 1 字目用法のみ、 dict 1000 で覆う。
[[kanji]]
char = "絵"
default = "え"

# 「園」: 音読み 「エン」 (= 「動物園 / 公園 / 遊園地 / 学園」) が圧倒的。
# 「その」 (= 「果樹園」 の和訓 / 古語) は希少、 dict 1000 で必要なら個別登録。
[[kanji]]
char = "園"
default = "エン"

# 「助」: 音読み 「ジョ」 (= 「助手 / 助言 / 援助 / 救助 / 助動詞」) が圧倒的。
# 動詞 「助ける (たすける)」 は ひらがな後続。
[[kanji]]
char = "助"
default = "ジョ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "たす"

# 「外」: 音読み 「ガイ」 (= 「以外 / 海外 / 戦力外 / 案外 / 例外」) が圧倒的。
# 名詞 「外 (そと)」 (= 「外で / 外に / 外側」) は ひらがな後続。
[[kanji]]
char = "外"
default = "ガイ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "そと"

# 「帯」: 名詞 「帯 (おび) / 音読み (タイ)」 多義。 単独 / 助詞前 (= 「帯地 / 帯の」)
# は 「おび」、 熟語 (= 「携帯 / 包帯 / 一帯 / A 帯」) は 「タイ」。 「帯びる (おびる)」
# 動詞は ひらがな後続。 prev / next で context 判定が複雑なので default は最頻出の
# 「タイ」、 「帯びる」 のみ next ひらがな で 「おび」 切替。
[[kanji]]
char = "帯"
default = "タイ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "おび"

# 「多」: 形容詞 「多い (おおい)」 = ひらがな後続で 「おお」 語幹 (= 「多い / 多く /
# 多すぎる / 多かった」)。 音読み 「タ」 (= 「多数 / 多分 / 多忙」) は熟語、 dict
# 1000 で覆われる前提。 default は接頭辞用法を考慮して 「タ」。
[[kanji]]
char = "多"
default = "タ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "おお"

# 「歯」: 名詞 「歯 (は)」 (= 「歯が / 歯を / 歯ブラシ / 虫歯」) が圧倒的。
# 「よわい」 (= 「齢」 異字) は古語、 dict 1000 で必要なら個別。
[[kanji]]
char = "歯"
default = "は"

# 「生」: 名詞 「生 (なま)」 (= 「生の / 生地 / 生もの / 生卵」) が単独 / 助詞前で
# 圧倒的。 動詞 「生きる / 生まれる / 生える」 = ひらがな後続で 「い」 語幹。
# 音読み 「セイ / ショウ」 (= 「人生 / 学生 / 一生」) は dict 1000 で覆う。
[[kanji]]
char = "生"
default = "なま"
[[kanji.match]]
next_starts_any = ["き", "ま", "え", "い", "や"]
reading = "い"

# 「類」: 接尾辞 「ルイ」 (= 「魚介類 / 哺乳類 / 種類 / 分類 / 親族類」) が圧倒的。
# 名詞 「類 (たぐい)」 = 「類なき」 等は古語、 希少。
[[kanji]]
char = "類"
default = "ルイ"

# 「鉄」: 音読み 「テツ」 (= 「地下鉄 / 鉄製 / 鋼鉄 / 鉄道 / 鉄ブロ」) が圧倒的。
# 「くろがね」 (= 「鉄」 雅称) は古語 / 詩的用法のみ。
[[kanji]]
char = "鉄"
default = "テツ"

# 「派」: 音読み 「ハ」 (= 「派閥 / 流派 / 民主派 / ねこ派 / 派手」) が圧倒的。
# 動詞 「派す (はす) / 別れ (わかれ)」 は誤読、 unihan default 「わかれ」 は誤。
[[kanji]]
char = "派"
default = "ハ"

# 「王」: 音読み 「オウ」 (= 「王様 / 国王 / 新人王 / 王者 / 魔王」) が圧倒的。
# 名詞 「王 (きみ)」 (= 古語、 雅称) は希少。
[[kanji]]
char = "王"
default = "オウ"

# 「研」: 音読み 「ケン」 (= 「研究 / 研修 / 研磨 / イカ研」) が圧倒的。 動詞
# 「研ぐ (とぐ)」 は ひらがな後続。
[[kanji]]
char = "研"
default = "ケン"
[[kanji.match]]
next_starts_any = ["ぐ", "い", "が", "げ", "ご"]
reading = "と"

# 「体」: 接尾辞 「タイ」 (= 「実験体 / 個体 / 物体 / 死体 / 一体」) が漢字後続 / 単独
# 多用、 名詞 「からだ」 はひらがな助詞前 (= 「体が / 体に / 体を」)。 助数詞 「3 体」
# は別 simple counter rule (★round 19)。
[[kanji]]
char = "体"
default = "タイ"
# ★round 46、 prev 漢字 = 接尾辞 case (= 「実験体 / 抗体 / 単体 / 死体」) は 「タイ」 維持
# (= prev 漢字 match を最優先で書く、 next ひらがな / 漢字 ルールより 先頭)
[[kanji.match]]
prev_char_type = "漢字"
reading = "タイ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "からだ"
# 「体壊し / 体調 / 体力」 のうち jukugo は band 1000 で勝つので、 ここの次=漢字
# fallback は 「体+動詞 (= 壊/作/変)」 系で 「カラダ」 を選ぶ (★round 36)
[[kanji.match]]
next_char_type = "漢字"
reading = "からだ"

# 「系」: 接尾辞 「ケイ」 (= 「丼系 / 太陽系 / 体系 / 神経系 / 男系」) が圧倒的。
# 「かける」 は誤読、 unihan default は誤。
[[kanji]]
char = "系"
default = "ケイ"

# 「番」: 音読み 「バン」 (= 「N 番 / 当番 / 順番 / 番組 / 1 番」) が圧倒的。
# 「つがい」 (= 「一番 (ひとつがい)」 古語) は希少。
[[kanji]]
char = "番"
default = "バン"

# 「某」: 音読み 「ボウ」 (= 「某社 / 某有名 / 某氏 / 某月某日」) が圧倒的。
# 「それがし」 (= 古語 一人称) は希少。
[[kanji]]
char = "某"
default = "ボウ"

# 「勢」: 音読み 「セイ」 (= 「勢力 / 大勢 / 多勢 / 軍勢 / マニュ勢」) が圧倒的。
# 「いきおい」 (= 「勢いがある」 単独名詞) は希少 / 動詞活用は ひらがな後続。
[[kanji]]
char = "勢"
default = "セイ"
# next ひらがな → イキオ ルールは 「復帰勢でも → フッキイキオデモ」 等接尾辞 case で
# 誤読するため不採用、 「勢い / 勢いよく」 は jukugo 個別で対応 (= general.toml)。
# 「○○勢」 接尾辞は連濁で ゼイ (= 「復帰勢 → フッキゼイ / スティック勢 → スティックゼイ /
# マニュ勢 → マニュゼイ」)
[[kanji.match]]
prev_char_type = "漢字"
reading = "ゼイ"

[[kanji.match]]
prev_char_type = "カタカナ"
reading = "ゼイ"

# 「重」: 音読み 「ジュウ」 (= 「重要 / 体重 / 二重 / 厳重」) が圧倒的、 形容詞
# 「重い (おもい)」 は ひらがな後続で 「おも」 語幹。
[[kanji]]
char = "重"
default = "ジュウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "おも"

