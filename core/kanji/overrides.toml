[[kanji]]
char = "漆"
default = "シツ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も"]
reading = "うるし"

# 「泉」 default 「セン」 (= 源泉/温泉/冷泉/鉱泉/泉源)。
# 単独 + 助詞接続 → 「いずみ」 (= 「泉が/泉の」 等)
[[kanji]]
char = "泉"
default = "セン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も"]
reading = "いずみ"

# 「敷」 default 「し」 (= 動詞語幹、 「敷く/敷ける/敷かれる」)。
# 名詞 「敷地/座敷/屋敷/敷物/敷布」 は jukugo 個別 (= 連用形 名詞化 「しき」 で勝つ)
[[kanji]]
char = "敷"
default = "し"

# 「漢」 default 「カン」 (= 漢字/漢方/門外漢/羅漢/痴漢/和漢/巨漢)。
# unihan default 「から」 は古語 (= 「唐」 と被る)
[[kanji]]
char = "漢"
default = "カン"

# 「潔」 default 「ケツ」 (= 清潔/簡潔/純潔/不潔/高潔/廉潔)。
# 形容詞 「潔い」 = いさぎよい は okurigana 列挙で 「いさぎよ」 へ切替
[[kanji]]
char = "潔"
default = "ケツ"

[[kanji.match]]
next_starts_any = ["い", "く", "か", "け", "さ", "し"]
reading = "いさぎよ"

# 「潰」 default 「カイ」 (= 潰瘍/全潰/倒潰/胃潰瘍)。
# 動詞 「潰れる/潰す」 は okurigana 列挙で 「つぶ」 へ切替
[[kanji]]
char = "潰"
default = "カイ"

[[kanji.match]]
next_starts_any = ["れ", "す", "さ", "し", "せ", "そ"]
reading = "つぶ"

# 「澄」 default 「チョウ」 (= 清澄/澄明)。
# 動詞 「澄む/澄ます」 は okurigana 列挙で 「す」 へ切替
[[kanji]]
char = "澄"
default = "チョウ"

[[kanji.match]]
next_starts_any = ["む", "ま", "み", "ん", "め", "も", "す", "さ", "し", "せ", "そ"]
reading = "す"

# 「濃」 default 「ノウ」 (= 濃度/濃淡/濃厚/濃霧/濃縮)。
# 形容詞 「濃い」 は okurigana 列挙で 「こ」 へ切替
[[kanji]]
char = "濃"
default = "ノウ"

[[kanji.match]]
next_starts_any = ["い", "く", "か", "け", "さ"]
reading = "こ"

# 「瀬」 default 「せ」 (= 「瀬戸/早瀬/中瀬/急瀬」、 訓 dominant、 unihan 「ライ」 を訂正)
[[kanji]]
char = "瀬"
default = "せ"

# 「炉」 default 「ロ」 (= 暖炉/原子炉/炉端/香炉/火炉/溶鉱炉)。
# unihan default 「いろり」 は古語、 現代では熟語 dominant
[[kanji]]
char = "炉"
default = "ロ"

# 「煎」 default 「セン」 (= 煎茶/煎餅/焙煎)。
# 動詞 「煎る/煎じる」 は okurigana 列挙で 「い」 へ切替
[[kanji]]
char = "煎"
default = "セン"

[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ", "じ"]
reading = "い"

# 「煮」 default 「シャ」 (= 煮沸/雑煮/煮汁)。
# 動詞 「煮る」 は okurigana 列挙で 「に」 へ切替
[[kanji]]
char = "煮"
default = "シャ"

[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "に"

# 「潮」 default 「チョウ」 (= 潮汐/満潮/干潮/赤潮/潮流/風潮)。
# 単独 + 助詞接続 → 「しお」 (= 「潮が/潮の」 等)
[[kanji]]
char = "潮"
default = "チョウ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も"]
reading = "しお"

# 「丈」 default 「ジョウ」 (= 丈夫/気丈/方丈/丈尺)。
# 「丈高い/丈比べ」 → 「たけ」 (= 訓読み + okurigana 文脈)
[[kanji]]
char = "丈"
default = "ジョウ"

[[kanji.match]]
next_starts_any = ["高", "比"]
reading = "たけ"

# 「丘」 default 「キュウ」 (= 砂丘/丘陵/段丘/円丘)。
# 助詞接続 → 「おか」 (= 「丘が/丘の上」 等の単独使用)
[[kanji]]
char = "丘"
default = "キュウ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "へ", "や"]
reading = "おか"

# 「丙」 default 「ヘイ」 (= 丙種/甲乙丙丁)。
# 訓 「ひのえ」 は干支 jukugo (= 「丙午」 等) で対応
[[kanji]]
char = "丙"
default = "ヘイ"

# 「予」 default 「ヨ」 (= 予算/予定/予言/予感/予報/予想 圧倒的多数)。
# 「予め」 のみ okurigana 「め」 で 「あらかじ」 へ切替
[[kanji]]
char = "予"
default = "ヨ"

[[kanji.match]]
next_eq = "め"
reading = "あらかじ"

# 「丼」 default 「どんぶり」 (= 単独使用、 「丼が/丼の」 等)。
# 漢字 / カタカナ prefix → 「どん」 (= 「牛丼/親子丼/海鮮丼/天丼/カツ丼」)
[[kanji]]
char = "丼"
default = "どんぶり"

[[kanji.match]]
prev_char_type = "漢字"
reading = "どん"

[[kanji.match]]
prev_char_type = "カタカナ"
reading = "どん"

# 「事」 default 「ジ」 (= 事件/事実/事故/事業/仕事/家事/工事/事務/食事/返事 等大量)。
# 単独 + 助詞接続 → 「こと」 (= 「事が起こる/事の真相/事を起こす」 等)
[[kanji]]
char = "事"
default = "ジ"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も", "から", "まで", "や", "よ", "ね"]
reading = "こと"

# 「井」 default 「い」 (= 単独使用 「井さん」 / 姓 / 「井の中の蛙」)。
# jukugo 「天井/格天井」 は jukugo file の「ジョウ」 で対応 (= band 100 優先)。
[[kanji]]
char = "井"
default = "い"

# 「俸」 default 「ホウ」 (= 俸給/年俸/減俸/月俸/本俸/俸禄)。
# unihan の「ふち」 は古語訓読み、 現代日本語では音読み圧倒的多数 → default 訂正。
[[kanji]]
char = "俸"
default = "ホウ"

# 「匂」 default 「におい」 (= 名詞 「匂い/匂いがする」 + 単独使用)。
# 動詞 「匂う/匂わない/匂って/匂わせる/匂おう」 → 「う/わ/っ/お」 で 「にお」 へ切替。
[[kanji]]
char = "匂"
default = "におい"

[[kanji.match]]
next_starts_any = ["う", "わ", "っ", "お"]
reading = "にお"

# 「報」 default 「ホウ」 (= 報告/予報/速報/情報/応報/警報/月報)。
# 動詞 「報いる」 (= recompense) → okurigana 「い」 で 「むく」 へ切替。
# 動詞 「報じる」 は default 「ホウ」 のまま (= next が「じ」 で match なし)。
[[kanji]]
char = "報"
default = "ホウ"

[[kanji.match]]
next_starts_any = ["い"]
reading = "むく"

# 「帆」 default 「ほ」 (= 「帆を上げる/帆が立つ/白い帆」 等の訓読み単独使用)。
# 音読み 「ハン」 (= 帆船) は jukugo file で対応 (= band 100 優先)。
# 「帆立/帆桁/帆柱」 等の 「ホ」 訓 jukugo も jukugo file で別途登録済。
[[kanji]]
char = "帆"
default = "ほ"

# 「江」 default 「え」 (= 入江/江戸/江東/堀江/松江、 地名 / 訓読み圧倒的)。
# 古典熟語 「江湖 (コウコ)/松花江/長江」 の 「コウ」 は jukugo file で対応。
[[kanji]]
char = "江"
default = "え"

# 「沙」 default 「サ」 (= 沙汰/沙翁/長沙/沙弥/星沙、 音読み主流)。
# unihan 「すな」 は「砂」 と通用する古語、 現代日本語ではまれ → default 訂正。
[[kanji]]
char = "沙"
default = "サ"

# 「津」 default 「つ」 (= 津波/津軽/興津/会津、 訓読み圧倒的多数)。
# 音読み 「シン」 (= 津液、 古典的) は jukugo file で対応 (= band 100 優先)。
[[kanji]]
char = "津"
default = "つ"

# 「爵」 default 「シャク」 (= 爵位/伯爵/侯爵/公爵/男爵/子爵)。
# unihan 「さかずき」 は古代中国の儀礼用語、 現代日本語では「杯」 が一般的。
[[kanji]]
char = "爵"
default = "シャク"

# 「犠」 default 「ギ」 (= 犠牲/犠打/犠飛、 音読みのみ)。
# unihan 「いけにえ」 は「牲」 の訓読みで、 「犠」 単独訓読み用法はない → default 訂正。
[[kanji]]
char = "犠"
default = "ギ"

# 「献」 default 「ケン」 (= 献身/献金/献血/貢献/文献/奉献/献辞/献本)。
