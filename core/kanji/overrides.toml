# 「源」 default 「ゲン」 (= 源泉/起源/資源/根源/電源/震源/語源)。
# 単独 + 助詞接続 → 「みなもと」 (= 「源が/源の」 等)
[[kanji]]
char = "源"
default = "ゲン"

[[kanji.match]]
next_starts_any = ["は", "が", "を", "に", "の", "で", "と", "も"]
reading = "みなもと"

# 「湯」 default 「トウ」 (= 銭湯/熱湯/茶湯/湯気/湯飲み/温湯/洗湯)。
