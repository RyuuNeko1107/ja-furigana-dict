# 「穂」 default 「ほ」 (= 稲穂/穂先/瑞穂/穂/麦の穂、 訓読み圧倒的)。
# 音読み 「スイ」 (= 穂状/穂波) は古典的、 現代日本語ではほぼ使わない → default 訂正。
[[kanji]]
char = "穂"
default = "ほ"

# 「紋」 default 「モン」 (= 紋章/家紋/指紋/波紋/紋様/紋所、 音読み圧倒的)。
# unihan 「あや」 は古語訓読み、 現代日本語ではほぼ使わない → default 訂正。
