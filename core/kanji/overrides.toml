reading = "あと"

# 「後 3 試合 / 後 100 円」 等の副詞用法 = 数字後続で 「あと」
[[kanji.match]]
next_char_type = "英数"
reading = "あと"

# 「後、〜 / 後。〜」 文頭副詞用法 = 句読点後続で 「あと」
[[kanji.match]]
next_starts_any = ["、", "。", ",", "."]
reading = "あと"

[[kanji.match]]
prev_char_type = "ひらがな"
reading = "あと"

[[kanji.match]]
next_eq = "々"
reading = "あと"

