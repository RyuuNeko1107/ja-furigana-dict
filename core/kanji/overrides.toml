default = "シュウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "オワ"

[[kanji]]
char = "強"
default = "キョウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ツヨ"

[[kanji]]
char = "持"
default = "ジ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "モ"

[[kanji]]
char = "勝"
default = "ショウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "カ"

[[kanji]]
char = "変"
default = "ヘン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "カ"

[[kanji]]
