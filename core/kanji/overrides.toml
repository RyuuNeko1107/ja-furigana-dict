[[kanji]]
char = "麗"
default = "レイ"

# 「麗しい/麗しく/麗しかった」 = 形容詞 → うるわ
[[kanji.match]]
next_starts_any = ["し"]
reading = "うるわ"

# 「賭」 default 「ト」 (= 賭博/賭場)。
# 動詞 「賭ける」 は okurigana 「け」 で 「か」 へ切替 (= 賭け = カケ 名詞用法もカバー)
