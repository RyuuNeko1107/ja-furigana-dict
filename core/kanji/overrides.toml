# ─── 動詞 / 形容詞 1 系統絞り (★alpha.21、 実データ mining top 10 base-kanji) ──
#
# わんコメ実コメ 89k 件の dict_gap_mine 結果から、 頻度上位の動詞 / 形容詞活用語幹を
# `[[kanji]]` block で declarative にカバー。 共通設計:
# - default = 音読み (= 熟語 fallback)、 「使用」 「言語」 等の jukugo dict 1000 が
#   勝つので default は熟語の中で残りやすい音読みを選ぶ
# - next_char_type = ひらがな → 訓読み語幹 (= 動詞活用 「使う/使えた/使わない/使って」
#   を 「使(つか)」+「う/え/わ/って」 のように分解)
#
# 多義動詞 (行/入/落/出/何/主/分 等) は 1 系統に絞ると誤読リスク高、 別途 next_starts
# 精密化で後追い予定。 ここは「片方の読みが圧倒的多数」 な surface のみ。

[[kanji]]
char = "使"
default = "ツカイ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ツカ"

[[kanji]]
char = "言"
default = "ゲン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "イ"

[[kanji]]
char = "見"
default = "ケン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ミ"

[[kanji]]
char = "思"
default = "シ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "オモ"

[[kanji]]
char = "終"
default = "シュウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "オワ"

[[kanji]]
char = "強"
default = "キョウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ツヨ"

[[kanji]]
char = "持"
default = "ジ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "モ"

[[kanji]]
char = "勝"
default = "ショウ"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "カ"

[[kanji]]
char = "変"
default = "ヘン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "カ"

[[kanji]]
char = "寝"
default = "シン"
[[kanji.match]]
next_char_type = "ひらがな"
reading = "ネ"

# ─── 多義動詞 (★alpha.21 round 2、 行/入/落/出 を next_starts で精密分岐) ─────
#
# 1 字 [[kanji]] block で 2 つの訓読みを切り替える設計。 ひらがな送りがなの先頭文字
# (next_starts / next_starts_any) で 「どの活用語幹を使うか」 を declarative に書ける。
# default は熟語用音読み (= dict band 1000 で個別熟語 entry が勝つので、 dict 未登録の
# 漢字連続 case の fallback としてのみ使われる)。

[[kanji]]
char = "行"
default = "ギョウ"
# 「行く / 行か / 行け / 行こう / 行って」 = イ + 送りがな
[[kanji.match]]
next_starts_any = ["く", "か", "け", "こ", "っ"]
reading = "イ"
# 「行う / 行わ / 行え / 行おう / 行い」 = オコナ + 送りがな
[[kanji.match]]
next_starts_any = ["う", "わ", "え", "お", "い"]
reading = "オコナ"

[[kanji]]
char = "入"
default = "ニュウ"
# 「入って / 入る / 入り / 入ろう / 入らない」 = ハイ + 送りがな
[[kanji.match]]
next_starts_any = ["っ", "る", "り", "ろ", "ら"]
reading = "ハイ"
# 「入れる / 入れた / 入れて」 = イ + 送りがな
[[kanji.match]]
next_starts = "れ"
reading = "イ"

[[kanji]]
char = "落"
default = "ラク"
# 「落ちる / 落ちた / 落ちて / 落ちます」 = オチ + 送りがな
[[kanji.match]]
next_starts = "ち"
reading = "オチ"
# 「落とす / 落とした / 落として」 = オト + 送りがな
[[kanji.match]]
next_starts = "と"
reading = "オト"

[[kanji]]
char = "出"
default = "シュツ"
# 「出る / 出て / 出ない / 出よう / 出ろ」 = デ + 送りがな
[[kanji.match]]
next_starts_any = ["る", "て", "な", "よ", "ろ"]
reading = "デ"
# 「出す / 出した / 出して / 出さない / 出せ / 出そう」 = ダ + 送りがな
[[kanji.match]]
next_starts_any = ["す", "し", "さ", "せ", "そ"]
reading = "ダ"

# ─── default 修正 (★alpha.21 round 4、 mining 違和感解消) ──────────────────────

# 「的」: 接尾辞用法 (= 「全体的に / 基本的」) が圧倒的多数、 default を 「テキ」 に。
# 単独 「的」 = まと は dict / context match で個別 jukugo 化 (= 「弓的」 等)。
[[kanji]]
char = "的"
default = "テキ"

# 「次」: 「つぎ」 が圧倒的、 「つぐ」 動詞 「次ぐ」 は希少。 default を 「つぎ」 に。
[[kanji]]
char = "次"
default = "つぎ"

# ─── 単漢字 default 修正 (★alpha.21 round 5、 extended.toml fail 由来) ─────────

# 「手」: 単独 「て」 (= 「手が震える / 猫の手 / 手を貸す」) が圧倒的多数。
# 「シュ」 音読みは熟語 dict 1000 で覆う (= 「歌手 / 選手 / 助手」)。
[[kanji]]
char = "手"
default = "て"

# 「力」: 単独 「ちから」 + 接尾辞 「リョク」 (= 「免疫力 / 集中力 / 体力」)。
# 接尾辞用法が圧倒的、 単独は 「ちから」 名詞。 漢字後続 = 熟語末尾 → リョク。
[[kanji]]
char = "力"
default = "ちから"
[[kanji.match]]
prev_char_type = "漢字"
reading = "リョク"

# 「雅」: 形容動詞 「雅な / 雅やか」 で 「みやび」、 default 「つね」 は希少。
[[kanji]]
char = "雅"
default = "みやび"

# 「為」: 「為に / 為だ / 為になる」 で名詞 「ため」、 default 「おさめる」 は誤読が大半。
[[kanji]]
char = "為"
default = "ため"

# ─── 笑 (★alpha.21、 単独 「笑」 が「わらう」 動詞形で出る違和感を修正) ──────
#
# わんコメ実コメで 「笑」 単独 (= 文末 「コメ笑」 のような (笑) 代用) が
# 「わらう」 と動詞形で読まれる現象を、 名詞形 default + ひらがな後続で動詞語幹に
# 切り替える設計で対応:
# - default = 「わらい」 (= 名詞形、 「コメ笑」 → 「コメわらい」、 文末 silent 化は
#   caller / TTS postprocess で実施想定)
# - ひらがな後続 → 「わら」 (= 動詞語幹、 「笑+う/える/った/わない」 等の活用に対応)
#
# 熟語 (= 笑顔 / 微笑 / 苦笑 等) は dict band 1000 が勝つので、 ここの [[kanji]] block
# は band 100 fallback として作用、 熟語 path を破壊しない。
[[kanji]]
char = "笑"
default = "わらい"

[[kanji.match]]
next_char_type = "ひらがな"
reading = "わら"

