# ─── round 19 (= round 18 後の追加改善) ─────────────────────────────────────

# 「万」: 「マン」 接尾辞 (= 「N 万 / 万円 / 万人」) 圧倒的、 「よろず」 古語。
[[kanji]]
char = "万"
default = "マン"

# 「龍」: 現代用法 「リュウ」 (= 「龍 / 龍王 / 龍神」)、 「たつ」 は名前用 / 古語。
[[kanji]]
char = "龍"
default = "リュウ"

# 「増」: 接尾辞 「ゾウ」 (= 「スペ増 / 急増 / 倍増 / 増量」) 圧倒的、 「ます」 動詞は
# Lindera 1 token で reading 維持。
[[kanji]]
char = "増"
default = "ゾウ"

# 「術」: 接尾辞 「ジュツ」 (= 「技術 / 美術 / 護身術 / 芸術」) 圧倒的、 「すべ」 名詞 は
# 古語 / 慣用句 ("術 (すべ) もない") のみ。
[[kanji]]
char = "術"
default = "ジュツ"

# 「四」: 現代 spoken で 「ヨン」 接頭辞主流 (= 「四駆 / 四角 / 四季」)、 「ヨ」 古読み。
# 「四日 = ヨッカ / 四月 = シガツ / 四人 = ヨニン」 等の特殊読みは jukugo / counter 経由。
[[kanji]]
char = "四"
default = "ヨン"

# 「間」: 名詞 「あいだ」 単独 + 助詞前 (= 「間に / 間の / 間が」)、 接尾辞 「カン」 は
# prev 漢字 / カタカナ (= 「時間 / 期間 / 中間」 等) で切替。 default 「カン」 だと Lindera
# 1 token 「間に」 が band 50 で 「カンニ」 になるため、 default を 「あいだ」 にして
# 接尾辞 case のみ match 切替。
#
# 「マ」 系 (= 茶の間 / 板の間 / 応接間の / 広い間 等) と、 「○の間 + 助詞」 → アイダ は
# 旧 unihan/joyo.toml の [entries."間"] (4 match block) から merge (round XX)。 順序は
# 具体 (= 名詞列挙) → 一般 (= prev_char_type) の優先順。
[[kanji]]
char = "間"
default = "あいだ"

# 「○○ + 間 + の」 (= 前置 noun + 茶間の / 奥間の / 応接間の 等) → マ
[[kanji.match]]
reading = "マ"
next_eq = "の"
prev_ends_any = [
  "奥",
  "書院造",
  "書院造り",
  "数寄屋",
  "茶",
  "板",
  "客",
  "応接",
  "座敷",
  "板の",
  "板敷きの",
]

# 「○○の + 間」 (= 茶の間 / 奥の間 / 板の間 等) → マ
[[kanji.match]]
reading = "マ"
prev_ends_any = [
  "奥の",
  "板の",
  "茶の",
  "次の",
  "二の",
  "客の",
]

# 形容詞 連体形 + 間 (= 「広い間 / 狭い間 / 明るい間 / 暗い間」) → マ
[[kanji.match]]
reading = "マ"
prev_ends_any = [
  "広い",
  "狭い",
  "明るい",
  "暗い",
]

# 「○○の間 + 助詞」 → アイダ (= ギャルの間では / 仲間の間 / 友達の間 等、 round 36)
[[kanji.match]]
reading = "アイダ"
next_starts_any = ["は", "に", "が", "を", "で"]
prev_eq = "の"

# 接尾辞 case: prev=漢字 → カン (= 時間 / 期間 / 中間 等)
[[kanji.match]]
prev_char_type = "漢字"
reading = "カン"

# 接尾辞 case: prev=カタカナ → カン
[[kanji.match]]
prev_char_type = "カタカナ"
reading = "カン"

# 「種」: default 「たね」 (= 「種を / 種が / 種の」 名詞主流)、 接尾辞 「シュ」 は
# prev 漢字 / カタカナ / 英数 (= 「種類 / 一種 / ブキ種 / N 種」) で切替。
[[kanji]]
char = "種"
default = "たね"

[[kanji.match]]
prev_char_type = "漢字"
reading = "シュ"

[[kanji.match]]
prev_char_type = "カタカナ"
reading = "シュ"

[[kanji.match]]
prev_char_type = "英数"
reading = "シュ"


# ─── 接尾辞 系 (= 漢字 + 接尾辞 = 熟語 構造の覆い) ────────────────────────────
#
# 設計: 接尾辞として使われる漢字は 「漢字 + 接尾辞」 で無限の組み合わせを生む
# (= 「事務局/放送局/結局/対局」 等)、 jukugo 個別登録は現実的でないため
# [[kanji]] block の prev_char_type = "漢字" で覆う。
# default は standalone 用 reading (= kun または共通 on-yomi)。

# 「局」 default 「キョク」 (= 事務局/放送局/結局/対局/薬局/郵便局)。
# joyo unihan の 「つぼね」 は古語、 現代日本語ではほぼ使われない
[[kanji]]
char = "局"
default = "キョク"

# 「館」 default 「カン」 (= 図書館/旅館/会館/水族館/領事館/美術館)。
# joyo unihan の 「たち」 は古語、 現代日本語では人名のみ
[[kanji]]
char = "館"
default = "カン"

# 「業」 default 「ギョウ」 (= 業務/事業/工業/製造業/作業/営業)。
# 「ゴウ」 (= 業火/罪業) は jukugo 個別、 「わざ」 は古語/慣用
[[kanji]]
char = "業"
default = "ギョウ"

# 「論」 default 「ロン」 (= 議論/理論/論文/結論/反論/世論)。
# joyo unihan の 「あげつらう」 は動詞古語
[[kanji]]
char = "論"
default = "ロン"

# 「室」 default 「シツ」 (= 教室/病室/寝室/会議室/浴室/居室)。
# joyo unihan の 「むろ」 は jukugo 個別 (= 「室咲き / 氷室」)
[[kanji]]
char = "室"
default = "シツ"

# 「課」 default 「カ」 (= 人事課/総務課/経理課/課題/課程)
[[kanji]]
char = "課"
default = "カ"

# 「院」 default 「イン」 (= 病院/学院/退院/上院/下院/医院/寺院)
[[kanji]]
char = "院"
default = "イン"

# 「期」 default 「キ」 (= 短期/長期/期間/学期/今期/任期)
[[kanji]]
char = "期"
default = "キ"

# 「学」 default 「ガク」 (= 数学/科学/物理学/学問/医学/文学)
[[kanji]]
char = "学"
default = "ガク"

# 「道」 default 「ミチ」、 漢字直前なら 「ドウ」 (= 柔道/書道/北海道/剣道/茶道)
[[kanji]]
char = "道"
default = "ミチ"

[[kanji.match]]
prev_char_type = "漢字"
reading = "ドウ"

# 「店」 default 「ミセ」、 漢字直前なら 「テン」 (= 書店/喫茶店/支店/開店/商店)
[[kanji]]
char = "店"
default = "ミセ"

[[kanji.match]]
prev_char_type = "漢字"
reading = "テン"

# 「場」 default 「バ」、 漢字直前なら 「ジョウ」 (= 競技場/野球場/工場/会場/球場)
[[kanji]]
char = "場"
default = "バ"

[[kanji.match]]
prev_char_type = "漢字"
reading = "ジョウ"

# 「軍」 default 「グン」 (= 軍隊/軍人/陸軍/海軍/空軍/将軍/援軍)。
# joyo unihan の 「いくさ」 は 「戦」 と混同した古語、 現代日本語は グン
[[kanji]]
char = "軍"
default = "グン"

# 「府」 default 「フ」 (= 京都府/大阪府/政府/府知事/府県)
[[kanji]]
char = "府"
default = "フ"

# 「区」 default 「ク」 (= 渋谷区/区別/区分/区切/管区)
[[kanji]]
char = "区"
default = "ク"

# 「町」 default 「マチ」 (= 町並み/町中/○○町=○○マチ)。
# 「町長=チョウチョウ」 「町内=チョウナイ」 等の チョウ case は jukugo 個別管理
[[kanji]]
char = "町"
default = "マチ"

# 「村」 default 「ムラ」 (= 村人/○○村=○○ムラ)。
# 「村長=ソンチョウ」 「漁村=ギョソン」 「農村=ノウソン」 等の ソン case は jukugo 個別管理
[[kanji]]
char = "村"
default = "ムラ"

# 「社」 default 「シャ」 (= 会社/社員/社内/社外/社訓/社長/社会/支社/本社/出社)。
# 「やしろ」 (= 古語/神社) は 「神社=ジンジャ」 等の jukugo 個別
[[kanji]]
char = "社"
default = "シャ"

# 「接」 default 「セツ」 (= 接続/接触/接戦/接客/直接/間接/応接)。
# 「つぐ」 (= 動詞 「接ぐ」) は希少
[[kanji]]
char = "接"
default = "セツ"

# 「庫」 default 「コ」 (= 倉庫/書庫/車庫/冷蔵庫/金庫/在庫/文庫/格納庫)。
# 「くら」 は 「蔵」 字、 「庫」 では稀
[[kanji]]
char = "庫"
default = "コ"

# 「訓」 default 「クン」 (= 訓練/教訓/家訓/社訓/訓示/訓辞)。
# 「おしえ」 は古語/動詞、 現代では稀
[[kanji]]
char = "訓"
default = "クン"

# 「編」 default 「ヘン」 (= 編集/編成/編入/再編/長編/前編/後編/短編)。
# 「あむ」 (= 動詞 「編む」) は jukugo 個別
[[kanji]]
char = "編"
default = "ヘン"

# 「職」 default 「ショク」 (= 職員/職業/職場/職務/退職/専門職/職人)。
# 「つかさ」 (= 古語/官職) は希少
[[kanji]]
char = "職"
default = "ショク"

# 「処」 default 「ショ」 (= 処理/処分/対処/処置/処方/処罰)。
# 「おる」 (= 動詞古語) は希少
[[kanji]]
char = "処"
default = "ショ"

# 「機」 default 「キ」 (= 機械/機器/機会/機関/機能/機構/危機/動機/航空機)。
# 「はた」 (= 古語/織機) は jukugo 個別
[[kanji]]
char = "機"
default = "キ"

# 「蔵」 default 「ゾウ」 (= 冷蔵/在庫蔵/貯蔵/秘蔵/愛蔵/所蔵/内蔵)。
# 「くら」 は 「酒蔵=サカグラ」 等 jukugo 個別
[[kanji]]
char = "蔵"
default = "ゾウ"

# 「雛」 default 「ひな」 (= 雛祭/雛形/雛人形/雛壇/雛菊/雛鳥)。
# on-yomi 「スウ」 は 「育雛=イクスウ」 等の専門用語のみで希少
[[kanji]]
char = "雛"
default = "ひな"

# 「鷹」 default 「たか」 (= 鷹狩/白鷹/雀鷹/鷹見)。
# on-yomi 「オウ/ヨウ」 case = 「鷹揚=オウヨウ」、 連濁 「鷹匠=タカジョウ」 は jukugo 個別
[[kanji]]
char = "鷹"
default = "たか"

# 「鳩」 default 「はと」 (= 鳩時計/土鳩/伝書鳩/鳩派/鳩胸)。
# on-yomi 「キュウ」 case = 「鳩首/鳩舎/鳩合」 は jukugo 個別
[[kanji]]
char = "鳩"
default = "はと"

# 「乗」 default 「ジョウ」 (= 乗車/乗客/乗算/乗用車/乗務員/便乗/搭乗/試乗/騎乗)。
# 動詞 「乗る/乗せる/乗り換え」 は okurigana 列挙で 「の」 へ切替
[[kanji]]
char = "乗"
default = "ジョウ"

# 「乗る/乗らない/乗った/乗って/乗れば/乗ろう/乗り○○ (= 連用形名詞化)」 = 自動詞 → の
[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "の"

# 「乗せる/乗せない/乗せた/乗せて/乗せれば/乗せろ/乗せよう」 = 他動詞 → の
[[kanji.match]]
next_starts_any = ["せ"]
reading = "の"

# 「並」 default 「なみ」 (= 街並/人並/月並/世間並/十人並/並み/並みの)。
# 動詞 「並ぶ/並べる」 は okurigana 列挙で 「なら」、 漢字直前の熟語頭は 「ヘイ」
[[kanji]]
char = "並"
default = "なみ"

# 「並ぶ/並ばない/並んで/並べば/並ぼう/並び○○」 = 自動詞 → なら
# (= 他動詞 「並べる/並べた/並べて」 も okurigana が被るので同じ match で吸収)
[[kanji.match]]
next_starts_any = ["ぶ", "ば", "び", "ん", "べ", "ぼ"]
reading = "なら"

# 漢字直前 = 熟語頭 → ヘイ (= 「並列/並行/並進/並立/並走/並用」)
[[kanji.match]]
next_char_type = "漢字"
reading = "ヘイ"

# 「亜」 default 「ア」 (= 亜流/亜種/亜熱帯/亜麻/亜鉛/亜細亜/東亜/亜美)。
# 古語 「つぐ」 (= 動詞 「亜ぐ」) は現代日本語ではほぼ用例なし
[[kanji]]
char = "亜"
default = "ア"

# 「住」 default 「ジュウ」 (= 住所/住居/住宅/住民/住職/移住/定住/在住)。
# 動詞 「住む/住まう/住み込む」 は okurigana 列挙で 「す」 へ切替
[[kanji]]
char = "住"
default = "ジュウ"

# 「住む/住まない/住みません/住んで/住めば/住もう/住み○○」 = 動詞 → す
[[kanji.match]]
next_starts_any = ["む", "ま", "み", "ん", "め", "も"]
reading = "す"

# 「依」 default 「イ」 (= 依存/依頼/依拠/依然/帰依)。
# 動詞 「依る/依って」 は okurigana 列挙で 「よ」 へ切替
[[kanji]]
char = "依"
default = "イ"

# 「依る/依らない/依って/依れば/依ろう」 = 動詞 → よ
[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "よ"

# 「億」 default 「オク」 (= 1 億/数億/億万長者/億単位)。
# unihan default 「ああ」 は感嘆詞用例で実用ではほぼ用いない
[[kanji]]
char = "億"
default = "オク"

# 「儀」 default 「ギ」 (= 儀式/礼儀/葬儀/流儀/行儀/律儀/儀礼/地球儀)。
# unihan default 「のり」 は古語、 現代日本語では用例少
[[kanji]]
char = "儀"
default = "ギ"

# 「佳」 default 「カ」 (= 佳作/佳境/絶佳/佳人/佳節/佳麗)。
# unihan default 「よい」 は古語、 現代では形容詞 「良い」 を使う
[[kanji]]
char = "佳"
default = "カ"

# 「克」 default 「コク」 (= 克服/克明/克己/超克/相克)。
# unihan default 「かつ」 は古語動詞、 「打ち克つ」 等 jukugo 個別
[[kanji]]
char = "克"
default = "コク"

# 「児」 default 「ジ」 (= 児童/幼児/小児/孤児/育児/胎児/園児)。
# unihan default 「こ」 は単漢字 「子」 と被る、 「児」 は熟語 dominant
[[kanji]]
char = "児"
default = "ジ"

# 「共」 default 「キョウ」 (= 共産/共有/共通/共同/共感/共生/反共/公共)。
# 単独 + 助詞接続は 「とも」 へ切替 (= 共に/共と/共の)
[[kanji]]
char = "共"
default = "キョウ"

# 「共に/共と/共の/共は/共が/共を/共で」 = 単独 + 助詞接続 → とも
[[kanji.match]]
next_starts_any = ["に", "と", "の", "は", "が", "を", "で", "も", "や", "へ", "か", "ま", "よ"]
reading = "とも"

# 「○の共/○と共」 = 助詞 直後 → とも
[[kanji.match]]
prev_ends_any = ["の", "が", "は", "を", "に", "で", "と", "も"]
reading = "とも"

# 「凝」 default 「ギョウ」 (= 凝視/凝固/凝集/凝縮/凝結)。
# 動詞 「凝る/凝らす」 は okurigana 列挙で 「こ」 へ切替
[[kanji]]
char = "凝"
default = "ギョウ"

# 「凝る/凝らない/凝った/凝って/凝れば/凝ろう/凝らす/凝り○○」 = 動詞 → こ
[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "こ"

# 「刺」 default 「シ」 (= 刺激/刺繍/風刺/名刺/突刺)。
# 動詞 「刺す/刺さる」 は okurigana 列挙で 「さ」 へ切替
[[kanji]]
char = "刺"
default = "シ"

# 「刺す/刺さない/刺した/刺して/刺せば/刺そう/刺さる/刺し○○」 = 動詞 → さ
[[kanji.match]]
next_starts_any = ["す", "さ", "し", "せ", "そ", "っ"]
reading = "さ"

# 「効」 default 「コウ」 (= 効果/効率/有効/効能/無効/失効)。
# 動詞 「効く/効かす」 は okurigana 列挙で 「き」 へ切替
[[kanji]]
char = "効"
default = "コウ"

# 「効く/効かない/効いた/効いて/効けば/効こう」 = 動詞 → き
[[kanji.match]]
next_starts_any = ["く", "か", "き", "っ", "け", "こ"]
reading = "き"

# 「去」 default 「キョ」 (= 去年/退去/撤去/除去/逝去)。
# 動詞 「去る」 は okurigana 列挙で 「さ」 へ切替
[[kanji]]
char = "去"
default = "キョ"

# 「去る/去らない/去った/去って/去れば/去ろう/去り○○」 = 動詞 → さ
[[kanji.match]]
