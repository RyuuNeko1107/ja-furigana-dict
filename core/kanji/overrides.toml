reading = "ナン"

# 「銃」: spoken default ジュウ (= 「銃で / 銃を / 銃の」)、 訓読み 「ツツ」 は古語、
# 単独 「銃」 でも spoken は 「ジュウ」 圧倒的 (= 「銃声 / 銃口 / 銃身」 等 jukugo に
# 加え単独でも ジュウ 優先)
[[kanji]]
char = "銃"
default = "ジュウ"

# 漢数字 5/7/9/10 の default を音読みに統一 (= 助数詞 / 数値表現の現代 spoken 主流)。
# 和語数詞用法 (= 「五日 / 七日 / 九日 / 十日」 = イツカ / ナノカ / ココノカ / トオカ) は
# jukugo basic で band 100 登録済、 ここの default 変更で覆われる。

[[kanji]]
char = "五"
default = "ゴ"

[[kanji]]
char = "七"
default = "シチ"

[[kanji]]
char = "九"
default = "キュウ"

[[kanji]]
char = "十"
default = "ジュウ"

# 「者」: default 音読み 「シャ」 (= 「医者 / 学者 / 患者 / 編者」 等)。 動詞連体形 + 者
# (= 「戦う者 / 行く者 / 知る者」 形式名詞用法) は prev token 末尾が動詞語尾のとき 「モノ」。
# 「強者 / 若者」 等 漢字 + 者 = モノ は jukugo に band 100 で個別登録。
[[kanji]]
char = "者"
default = "シャ"

[[kanji.match]]
prev_ends_any = ["う", "る", "く", "ぐ", "つ", "す", "ぬ", "ぶ", "む", "ふ"]
reading = "モノ"

# 「偽」: default 接頭辞 「ニセ」 (= 「偽物 / 偽札 / 偽情報」)。 動詞 「偽る」 は ら 行
# 後続で 「イツワ」 stem に分岐。 音読み 「ギ」 (= 「真偽 / 偽造 / 偽装」) は jukugo で覆う。
[[kanji]]
char = "偽"
default = "ニセ"

[[kanji.match]]
next_starts_any = ["る", "ら", "り", "っ", "れ", "ろ"]
reading = "イツワ"

# 「雑」: default 接頭辞 「ザツ」 (= 「雑談 / 雑食 / 雑用 / 雑コラ」)。
# 動詞用法 (= 「雑える」) は希少、 現代では 「混ぜる」 字。 jukugo 経由 「雑魚 = ザコ /
# 雑炊 = ゾウスイ」 等は band 100 で覆われる。
[[kanji]]
char = "雑"
default = "ザツ"

# 「超」: default 接頭辞 「チョウ」 (= 「超絶 / 超人 / 超強い / 超能力」)。
# 動詞 「超える / 超す」 は え / す / さ / し / せ / そ 後続で 「コ」 stem。
[[kanji]]
char = "超"
default = "チョウ"

[[kanji.match]]
next_starts_any = ["え", "す", "さ", "し", "せ", "そ"]
reading = "コ"

# 「弁」: default 接尾辞 / 接頭辞 「ベン」 (= 「関西弁 / 方言 / 弁当 / 弁護士 / 雄弁」)。
# 動詞 「弁える (わきまえる)」 は え 後続で 「ワキマ」 stem。
[[kanji]]
char = "弁"
default = "ベン"

[[kanji.match]]
next_starts = "え"
reading = "ワキマ"

# 「奨」: default 「ショウ」 (= 「奨学金 / 推奨 / 奨励」)。 動詞 「奨める」 は next め で
# 「ススメ」 stem (= 通常 「勧める」 字、 「奨める」 は稀)。
[[kanji]]
char = "奨"
default = "ショウ"

[[kanji.match]]
next_starts = "め"
reading = "ススメ"

# 「恭」: default 「キョウ」 (= 「恭敬 / 恭順」)。 形容詞 「恭しい」 は next し で
# 「ウヤウヤ」 stem。
[[kanji]]
char = "恭"
default = "キョウ"

[[kanji.match]]
next_starts = "し"
reading = "ウヤウヤ"

# 「慮」: default 「リョ」 (= 「考慮 / 配慮 / 遠慮 / 思慮」)。 動詞 「慮る」 は next る で
# 「オモンパカ」 stem。
[[kanji]]
char = "慮"
default = "リョ"

[[kanji.match]]
next_starts = "る"
reading = "オモンパカ"

# 「承」: default 「ショウ」 (= 「承認 / 継承 / 了承 / 伝承」)。 動詞 「承る」 は next る で
# 「ウケタマワ」 stem。
[[kanji]]
char = "承"
default = "ショウ"

[[kanji.match]]
next_starts = "る"
reading = "ウケタマワ"

# 「辱」: default 「ジョク」 (= 「屈辱 / 恥辱 / 凌辱」)。 動詞 「辱める」 は next め で
# 「ハズカシ」 stem。
[[kanji]]
char = "辱"
default = "ジョク"

[[kanji.match]]
next_starts = "め"
reading = "ハズカシ"

# 「主」: default 「ぬし」 (= 配信文脈で 「主」 単独は主催者意)、 副詞 / 形容動詞用法
# 「主に / 主な」 は next 「に / な」 で 「オモ」、 音読み 「シュ」 は jukugo dict 1000
# (= 「主婦 / 主人 / 君主」) で覆われる前提。
[[kanji]]
char = "主"
default = "ぬし"

[[kanji.match]]
next_starts_any = ["に", "な"]
reading = "オモ"

# 「中」: default 「ナカ」 (= 「中央 / 中身 / 街の中」)、 接尾辞 「N 中」 (= 「作業中 /
# 勉強中 / 配信中」 等の 「進行中」 意) は prev 漢字 / カタカナ で 「チュウ」。
# 音読み 「チュウ」 を持つ jukugo (= 「中学 / 中国 / 中華 / 集中」) は dict 1000 で勝つ。
[[kanji]]
char = "中"
default = "ナカ"

[[kanji.match]]
prev_char_type = "漢字"
reading = "チュウ"

[[kanji.match]]
prev_char_type = "カタカナ"
reading = "チュウ"

# 「件」: default 「ケン」 (= 「件数 / N 件 / 案件 / 用件 / 一件」)、 訓読み 「くだり」 は
# 古語 / 文章語で希少。
[[kanji]]
char = "件"
default = "ケン"

# 「弾」: default 「ダン」 (= 「弾丸 / 爆弾 / N 発の弾 / 弾性」 接尾辞 / 名詞)、 動詞
# 「弾く」 は next 「く / い / か / け」 で 「ひ」 stem。 「弾む」 は next 「む / ん / ま」
# で 「はず」 stem (= 「弾んだ」 「弾まない」)。 「弾 = タマ」 は jukugo 個別。
[[kanji]]
char = "弾"
default = "ダン"

[[kanji.match]]
next_starts_any = ["く", "い", "か", "け", "こ"]
reading = "ひ"

[[kanji.match]]
next_starts_any = ["む", "ん", "ま"]
reading = "はず"

# 「量」: default 「リョウ」 (= 「分量 / 大量 / 容量 / 重量 / 質量」)、 動詞 「量る」 は
# next 「る / っ / ら / り」 で 「ハカ」 stem。
[[kanji]]
char = "量"
default = "リョウ"

[[kanji.match]]
next_starts_any = ["る", "っ", "ら", "り"]
reading = "ハカ"

# 「床」: default 「ゆか」 (= 「床がきれい / 床に座る / 床暖房」 一般用法)、
# 「床屋 / 床の間 / 寝床」 等の 「とこ」 用法は jukugo 個別登録に逃がす。
[[kanji]]
char = "床"
default = "ゆか"

# 「形」: default 「ケイ」 (= 「変形 / 図形 / 形成 / 三角形 / N 型」)、 名詞 「形」 単独
# / 助詞前 (= 「形が / 形を / 形の」) は 「カタチ」、 動詞 「形作る」 は 「カタ」。
# 文脈で多義、 prev / next で精密分岐は複雑なので default は熟語接尾辞優先 ケイ、
# 名詞用法は次ひらがな助詞で カタチ に切替。
[[kanji]]
char = "形"
default = "ケイ"

[[kanji.match]]
next_starts_any = ["が", "を", "に", "の", "は", "も"]
reading = "カタチ"

# 「値」: default 接尾辞 「チ」 (= 「数値 / 経験値 / 価値 / 平均値 / シード値 / 偏差値」)、
# 「値段 / 値する / 値打ち」 等の訓読み 「ね / あたい」 は jukugo dict 1000 で覆う。
[[kanji]]
char = "値"
default = "チ"

# 「酷」: default 「ひどい」 (= 「酷い目 / 酷くなる / 酷すぎる」 一般用法)、 訓読み 「むごい」
# は古風で配信文脈には不適、 unihan default 「きびしい」 は完全な誤分類。 音読み 「コク」
# (= 「過酷 / 残酷 / 酷使」) は jukugo で覆う。
[[kanji]]
char = "酷"
default = "ひど"

[[kanji.match]]
next_starts_any = ["い", "く", "か", "さ"]
reading = "ひど"


