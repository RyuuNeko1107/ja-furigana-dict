# 単漢字 surface の default reading override
#
# `resolve_reading` の Step 3.5 (jukugo lookup の後、 Lindera reading の前) で評価され、
# 「土 unihan = つち」 が Lindera 「ド」 reading に override される問題等を救う。
#
# 全 unihan を Lindera より先に評価すると副作用大 ([issue #15] R20 試行で 6 件
# corpus regression を確認済み: 米国産 → コメコクサン になる等) のため、
# **明示的に override したい単漢字だけをここに集める** 設計。
#
# - key: **必ず 1 字 surface** (lib 側で 1 字以外は silent skip、 validate.py が CI で reject)
# - value: 全角カタカナ ヨミ (慣習: 訓=ひら / 音=カタ だが override 用は明確化のためカタカナ)
# - 50 音順 推奨 (PR diff が読みやすい)
#
# 関連 issue: <https://github.com/RyuuNeko1107/ja-furigana/issues/15>

[meta]
description = "単漢字 default reading override (issue #15 の限定解)"

[entries]

# 「土」: unihan = つち (訓) だが Lindera は 「ド」 (音) で返すため override
"土" = "ツチ"
