# 源氏物語 (紫式部、 平安中期、 著作権切れ)
#
# 出典:
# - 新潮日本古典集成『源氏物語』 (新潮社、 石田穣二・清水好子 校注)
# - 岩波文庫『源氏物語』 (山岸徳平 校注 / 柳井滋 ほか校注)
# - 小学館 新編日本古典文学全集『源氏物語』
# - 大辞泉 (https://daijisen.jp/) / コトバンク (https://kotobank.jp/)
#
# 採録方針:
# - 公式 (定本 / 学術注釈) に読みが確定しているもののみ
#   二次創作読み・ファン推測は不可
# - 全 surface ≥2 文字 (1 字 surface は不可)
# - 「葵」「蛍」「薫」「幻」 等の 1 字巻名は unihan に既存のため除外
# - 「の」が挿入される表記 (葵の上 / 桐壺の更衣 / 頭の中将 / 匂の宮 等) は
#   surface に「の」が含まれない場合に揺れが生じるため除外
# - 巻名読みが一般語と同一の重複 (夕顔=ユウガオ, 朝顔=アサガオ, 鈴虫=スズムシ,
#   横笛=ヨコブエ, 薄雲=ウスグモ, 夕霧=ユウギリ) は jukugo 既存ファイル優先で除外
# - 「源氏物語」自体は jukugo/literature.toml に既存のため除外
# - 「紫式部」自体は jukugo/personal_names.toml に既存のため除外
#
# 構造方針:
# - 人物 / 巻名 / 場所 のセクションに分割 (1 surface は 1 セクションに集約)
# - 人物名と巻名が同一表層 (玉鬘 / 末摘花 / 浮舟) のものは「人物」側に登録

[meta]
role = "works"
description = "源氏物語 (紫式部): 登場人物 / 巻名 / 場所 (平安中期、 古典定本ベース)"

[entries]

