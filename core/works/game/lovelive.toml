# IPADIC 正読のため非登録。高坂=こうさか は たかさか(別姓/地名) と homograph のためフルネーム。

[meta]
schema_version = "2"
role = "works"
description = "ラブライブ! (サンライズ): キャラクター名"

[entries]

"西木野" = "ニシキノ"          # 西木野真姫。default にしきや
"桜内" = "サクラウチ"          # 桜内梨子。default さくらない
"高海" = "タカミ"              # 高海千歌。default こうかい
"高坂穂乃果" = "コウサカホノカ"  # bare 高坂 は たかさか と homograph
