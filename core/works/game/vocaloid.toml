# ボーカロイド / 合成音声ソフト のキャラクター名
#
# 出典: VOCALOID / UTAU / CeVIO / VOICEROID 等の公式キャラクター名。
# 初音ミク/可不 等カタカナ・正読は非登録、難読の姓・名のみ。神威=かむい は
# しんい/かもい と homograph のため bare 不採録 (神威がくぽはカタカナ部含む)。

[meta]
schema_version = "2"
role = "works"
description = "ボーカロイド/合成音声: キャラクター名 (公式読み)"

[entries]

"鏡音" = "カガミネ"            # 鏡音リン・レン (default かがみおん)
"巡音" = "メグリネ"            # 巡音ルカ (default じゅんおん)
"結月" = "ユヅキ"              # 結月ゆかり (default けつげつ)
"紲星" = "キズナ"              # 紲星あかり。紲=きずな (default きずなせい)
"重音" = "カサネ"              # 重音テト (default じゅうおん)
"歌愛" = "カアイ"              # 歌愛ユキ (default うたあい)
"波音" = "ナミネ"              # 波音リツ (default なみおん)
"琴葉茜" = "コトノハアカネ"    # 琴葉=ことのは (default ことよう)
"小春六花" = "コハルリッカ"    # 六花=りっか (default ろくか)
"夏色花梨" = "ナツイロカリン"  # 夏色=なついろ/花梨=かりん (default なつしょく)
"歌手音" = "ウタネ"          # 歌手音ピコ (default かしゅおん)
"雪歌" = "ユキウタ"          # 雪歌ユフ (default ゆきか)
"桃音" = "モモネ"            # 桃音モモ (default ももおん)
