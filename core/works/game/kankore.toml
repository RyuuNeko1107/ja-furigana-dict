# 艦隊これくしょん -艦これ- (DMM/角川) の艦娘名 (旧日本海軍艦名)
#
# 出典: 『艦これ』艦娘名 = 旧海軍艦名。金剛/榛名/霧島/愛宕/熊野 等は IPADIC 正読で非登録。
# 神通=じんづう/最上=さいじょう/川内=かわうち は homograph のため非登録。

[meta]
schema_version = "2"
role = "works"
description = "艦これ: 艦娘名 (旧海軍艦名)"

[entries]

"鳥海" = "チョウカイ"    # 鳥海山と同 (default とりうみ)
"島風" = "シマカゼ"      # 風=かぜ (default しまふう)
"雪風" = "ユキカゼ"      # 風=かぜ (default ゆきふう)
"三隈" = "ミクマ"        # 三隈川 (default さんくま)
"蒼龍" = "ソウリュウ"    # 蒼=そう (default あおりゅう)
"瑞鶴" = "ズイカク"      # 鶴=かく (default ずいつる)
"翔鶴" = "ショウカク"    # 鶴=かく (default しょうつる)
"龍驤" = "リュウジョウ"        # 空母。驤=じょう (default あがる)
"大鳳" = "タイホウ"            # 空母。大=たい (default だい)
