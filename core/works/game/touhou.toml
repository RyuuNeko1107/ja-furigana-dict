# 東方Project (上海アリス幻樂団) のキャラクター名・場所・用語
#
# 出典 (一次):
# - 上海アリス幻樂団 公式 (http://www16.big.or.jp/~zun/)
# - 公式書籍『東方求聞史紀』『東方求聞口授』『東方文花帖』『東方香霖堂』等
# - 各作品の Music Room コメント / おまけ.txt の ZUN 自身の記述
# - 公式 25 周年記念サイト (https://touhou-x.jp/character/)
#
# 出典 (二次、 公式読みの裏取り用 web reference):
# - 東方Project キャラクター一覧と読み方
#   https://imimatome.com/touhoummd/kyara/638/
# - 東方ダンマクカグラ攻略Wiki - 東方Project キャラクター一覧
#   https://danmakuwiki.com/%E6%9D%B1%E6%96%B9project%E3%81%AE%E3%82%AD%E3%83%A3%E3%83%A9%E3%82%AF%E3%82%BF%E3%83%BC%E4%B8%80%E8%A6%A7
# - ピクシブ百科事典 (https://dic.pixiv.net/) — 個別キャラ確認用
#   (例: 飯綱丸龍 = イイズナマルメグム / 豫母都日狭美 = ヨモツヒサミ /
#        三頭慧ノ子 = ミツガシラエノコ 等の特殊読み)
# - 東方元ネタwiki 2nd (https://seesaawiki.jp/toho-motoneta_2nd/)
# - ニコニコ大百科 東方項目 (https://dic.nicovideo.jp/) — 個別キャラ
#
# 採録方針:
# - **公式に読みが確定しているキャラ / 場所 / 用語のみ**
#   (二次創作読みやファン推測は原則除外、 ただし 「広く一般的な通称」 として定着
#    していれば採録可 — 例: 「河城荷取」 は official が「河城にとり」 だが 当て字
#    としてコミュニティで圧倒的多数派)
# - 表層が完全に漢字のもの中心 (「鈴仙・優曇華院・イナバ」 「古明地さとり」
#   「因幡てゐ」 「黒谷ヤマメ」 のような カタカナ / ひらがな混じりは除外)
# - **単漢字 (1 文字) は絶対に入れない** — unihan.toml と重複するため
#   (例: 「橙」「燐」「空」「霍」「戎」「龍」「文」「椛」「雛」「星」 等は除外)
# - 全 surface ≥2 文字
# - **古典的読みは現代読みが無い場合のみ** (TTS = 現代口頭用途を想定)
#
# 構造方針:
# - フルネーム (e.g., 博麗霊夢) と姓単独 (e.g., 博麗) と名単独 (e.g., 霊夢) の
#   3 通りを入れる (CONTRIBUTING の人物名推奨に従う、 「博麗の巫女」 のように
#   姓だけ書かれる文脈・ 「霊夢」 のように名だけ書かれる文脈に対応)
# - 場所 / 作品タイトル / 用語も同じファイルに混在 (作品 1 つで 1 ファイル方針)
# - 各 section 内は **50音順 (読みのカナ順)** で並べる
# - キャラクター section は家系ブロック単位 (家系名読みで sort)、 家系内は
#   フルネーム → 姓 → 名 の順

[meta]
role = "works"
description = "東方Project (上海アリス幻樂団): キャラクター名 / 場所 / 用語 (公式読みベース)"

