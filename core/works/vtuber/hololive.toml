# ホロライブプロダクション (カバー株式会社) の所属タレント名
#
# 出典 (一次):
# - ホロライブ公式サイト タレント一覧 (https://hololive.hololivepro.com/talents)
#
# 出典 (二次、 公式読みの裏取り用):
# - 各タレント公式 YouTube チャンネル概要
# - ピクシブ百科事典 / ニコニコ大百科 のホロライブ項目
#
# 採録方針 (works 共通):
# - **公式に読みが確定している名前のみ**
# - **単漢字 (1 文字) は絶対に入れない**
# - 全 surface ≥2 文字
# - 姓単独 (配信コメントで姓だけで言及される) を中心に採録
# - section 内は 50 音順 (読みのカナ順)
#
# 備考:
# - 「百鬼 (= 百鬼あやめ)」 の姓「百鬼」 は jukugo「百鬼夜行 (ひゃっきやこう)」 と
#   衝突するため bare では採録しない (フルネームで言及される場合のみ別途検討)

[meta]
schema_version = "2"
role = "works"
description = "ホロライブプロダクション (カバー): タレント名 (公式読みベース)"

[entries]
# 2026-06-19 probe 補充。homograph 姓 (百鬼/大神/白銀/雪花) は bare 不採録、
# フルネームで disambiguate。独自姓 (虎金妃/響咲) は bare で安全。
"虎金妃" = "こがねい"  # 虎金妃笹丸 (default とらきんひ)
"響咲" = "ひびきさき"  # 響咲リオナ (default きょうさ)
"百鬼あやめ" = "ナキリアヤメ"  # bare 百鬼 は 百鬼夜行 と衝突のためフルネームで
"大神ミオ" = "オオカミミオ"    # bare 大神 は おおがみ(姓) と homograph
"白銀ノエル" = "シロガネノエル"  # bare 白銀 は はくぎん と homograph
"雪花ラミィ" = "ユキハナラミィ"  # bare 雪花 は せっか(雪片) と homograph
"綺々羅々" = "ききらら"  # 綺々羅々ヴィヴィ (本番で「あやあやらら」誤読)
"戌神" = "いぬがみ"    # 戌神ころね (本番で「いぬしん」誤読)
"兎田" = "うさだ"      # 兎田ぺこら (本番で「うさいだ」誤読)
"尾丸" = "おまる"      # 尾丸ポルカ (本番で「びがん」誤読)
"獅白" = "ししろ"      # 獅白ぼたん (本番で「ししはく」誤読)
"角巻" = "つのまき"    # 角巻わため (本番で「かくまき」誤読)
"宝鐘" = "ほうしょう"  # 宝鐘マリン (本番で「たからしょう」誤読)
"星街" = "ほしまち"    # 星街すいせい (本番で「せいがい」誤読)
"桃鈴" = "ももすず"    # 桃鈴ねね (本番で「ももりん」誤読)

# 2026-06-19 probe 補充 (ReGLOSS / ホロスターズ。フルネームで読み固定)
"火威青" = "ヒオドシアオ"        # ReGLOSS。青=あお (default せい)
"水宮枢" = "ミズミヤカナメ"      # ReGLOSS。枢=かなめ (default すう)
"音乃瀬奏" = "オトノセカナデ"    # ReGLOSS。奏=かなで (default そう)
"轟はじめ" = "トドロキハジメ"    # ReGLOSS。轟=とどろき (default ごう)
"荒咬オウガ" = "アラガミオウガ"  # ホロスターズ。荒咬=あらがみ (default こうかむ)
"岸堂天真" = "ガンドウテンマ"    # ホロスターズ。岸堂=がんどう/天真=てんま
"奏手イヅル" = "カナデイヅル"    # ホロスターズ。奏手=かなで (default そうしゅ)

# 拡充 v11 (2026-06-12、 916k corpus 誤読検出由来、 公式読み)
# 白上=しらかみ / 大空=おおぞら / 沙花叉=さかまた / 不知火=しらぬい / 姫森=ひめもり /
# 博衣=はくい / 常闇=とこやみ は正読。 白銀=はくぎん / 雪花=せっか は一般語との
# homograph (百鬼 と同方針) で bare 非採録。
"天音" = "あまね"      # 天音かなた (default てんおん)
"風真" = "かざま"      # 風真いろは (default ふうしん)
"紫咲" = "しさき"      # 紫咲シオン (default むらさきさ)
"儒烏風亭" = "じゅうふうてい"  # 儒烏風亭らでん (default じゅからすふうてい)
"鷹嶺" = "たかね"      # 鷹嶺ルイ (「嶺」 みね→ね、 default たかみね)
"火威" = "ひおどし"    # 火威青 (default ひい)
"癒月" = "ゆづき"      # 癒月ちょこ (default ゆげつ)
"水宮" = "みずみや"    # 水宮枢 (default みずきゅう)

# (旧) 白上さん/戌神様 の suffix workaround entry は lib 0.1.10 の
# NameBoundaryPass (人名+敬称 token 衝突補正) が引き受けたため削除済。
# 「白上さん」 は IPADIC 姓、 「戌神様」 は上記 戌神 entry が結合照会の source

# 姓 + 家 (= ケ、 「〜家の人々」 用法)。 公式名ではないが 桃鈴 entry の派生で読み一意、
# 916k corpus で 20+ 出現 (lib match_hits tie-break 導入で 家=カ match に割れた分の補正)。
# NameBoundaryPass は 敬称 (さん/様/氏 等) のみ対象で 「家」 は扱わないため entry で対応
"桃鈴家" = "ももすずけ"
# 2026-06-19 probe 補充 (癒月=ゆづき は既登録で正、百鬼=ひゃっき homograph)
"潤羽" = "ウルハ"                # 潤羽るしあ (default じゅんう)
"潤羽るしあ" = "ウルハルシア"
"輪堂千速" = "リンドウチハヤ"  # 千速=ちはや (default せんそく)
"水無世" = "ミナセ"            # 水無世燐央 (default みずなしせい)
"水無世燐央" = "ミナセレオ"    # 燐央=れお
"緋八" = "ヒバチ"              # 緋八マナ。八=ばち 連濁 (default ひはち)
