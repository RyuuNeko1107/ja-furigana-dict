# ホロライブプロダクション (カバー株式会社) の所属タレント名
#
# 出典 (一次):
# - ホロライブ公式サイト タレント一覧 (https://hololive.hololivepro.com/talents)
#
# 出典 (二次、 公式読みの裏取り用):
# - 各タレント公式 YouTube チャンネル概要
# - ピクシブ百科事典 / ニコニコ大百科 のホロライブ項目
#
# 採録方針 (works 共通):
# - **公式に読みが確定している名前のみ**
# - **単漢字 (1 文字) は絶対に入れない**
# - 全 surface ≥2 文字
# - 姓単独 (配信コメントで姓だけで言及される) を中心に採録
# - section 内は 50 音順 (読みのカナ順)
#
# 備考:
# - 「百鬼 (= 百鬼あやめ)」 の姓「百鬼」 は jukugo「百鬼夜行 (ひゃっきやこう)」 と
#   衝突するため bare では採録しない (フルネームで言及される場合のみ別途検討)

[meta]
schema_version = "2"
role = "works"
description = "ホロライブプロダクション (カバー): タレント名 (公式読みベース)"

