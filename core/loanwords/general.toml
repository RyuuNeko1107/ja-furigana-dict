# 外来語 (一般 / メディア / ゲーミング / SNS / 略語)
#
# it.toml は IT 専門用語 (= Linux/Docker 等)、 こちらは一般英語 + ASCII 略語。
# 配信 / production signal 由来の spoken 形固定 entry。
#
# - **完全一致のみ**: lib chunks/split() の階層 4.7 で lookup
# - **正規化**: case-fold + 全角→半角 は lib 側、 entry は canonical (大文字始まり) で
# - reading は カタカナ統一 (lib が hiragana mode で自動変換)
# - alphabet 順に並べる (PR diff readable)

[meta]
schema_version = "2"
role = "loanwords"
description = "一般英語 / メディア / ゲーミング / SNS 略語 (ASCII surface)"

