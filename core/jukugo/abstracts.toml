# 抽象概念 / 古典教養 / 美意識 / 仏教用語の難読読み
#
# 日本文化特有の抽象概念 (侘 / 寂 / 風流) や仏教 / 儒教用語 (浄土 / 阿弥陀)、
# 古典文学用語 (和歌 / 俳句) など、Lindera default で読み崩れやすいもの。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[entries]

# ── ア行 ──
"阿弥陀" = "アミダ"

# ── カ行 ──
"諧謔" = "カイギャク"
"観音" = "カンノン"
"雅趣" = "ガシュ"
"機嫌" = "キゲン"
"機微" = "キビ"

# ── サ行 ──
"釈迦" = "シャカ"
"修行" = "シュギョウ"
"浄土" = "ジョウド"
"仁義" = "ジンギ"
"川柳" = "センリュウ"

# ── タ行 ──
"短歌" = "タンカ"
"忠孝" = "チュウコウ"

# ── ナ行 ──
"涅槃" = "ネハン"
"念仏" = "ネンブツ"

# ── ハ行 ──
"俳句" = "ハイク"
"般若" = "ハンニャ"
"風韻" = "フウイン"
"風雅" = "フウガ"
"風流" = "フウリュウ"
"法華経" = "ホケキョウ"
"菩薩" = "ボサツ"

# ── マ行 ──
"枕詞" = "マクラコトバ"

# ── ヤ行 ──
"幽玄" = "ユウゲン"
"余韻" = "ヨイン"

# ── ラ行 ──
"礼儀" = "レイギ"
"連歌" = "レンガ"
"廉恥" = "レンチ"

# ── ワ行 ──
"和歌" = "ワカ"
