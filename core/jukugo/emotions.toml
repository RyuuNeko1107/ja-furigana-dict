# 感情 / 心理用語の難読読み
#
# 文学的 / 心理学的な感情語を中心に。一般語 (嬉しい / 悲しい) は Lindera default で
# 動くので除外、難読 (憂鬱 / 焦燥 / 嫉妬 / 憧憬 等) のみ。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[entries]

# ── ア行 ──
"唖然" = "アゼン"
"鬱憤" = "ウップン"
"怨念" = "オンネン"

# ── カ行 ──
"歓喜" = "カンキ"
"喜悦" = "キエツ"
"郷愁" = "キョウシュウ"
"苦渋" = "クジュウ"
"屈辱" = "クツジョク"
"苦悩" = "クノウ"
"苦悶" = "クモン"
"激昂" = "ゲッコウ"
"困憊" = "コンパイ"
"困惑" = "コンワク"

# ── サ行 ──
"嫉妬" = "シット"
"羞恥" = "シュウチ"
"憧憬" = "ショウケイ"
"憔悴" = "ショウスイ"
"焦燥" = "ショウソウ"
"嫉み" = "ソネミ"

# ── タ行 ──
"達観" = "タッカン"
"諦観" = "テイカン"
"陶酔" = "トウスイ"

# ── ナ行 ──
"妬み" = "ネタミ"

# ── ハ行 ──
"悲哀" = "ヒアイ"
"憤怒" = "フンヌ"
"法悦" = "ホウエツ"
"望郷" = "ボウキョウ"
