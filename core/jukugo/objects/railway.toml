# 鉄道専門用語 (線路 / 駅 / 運行 / 車両)
#
# vehicles.toml が「乗り物の種類」を扱うのに対し、 こちらは鉄道インフラ・運行・
# 車両構造に特化。 vehicles.toml と既存 general.toml / specialized.toml に
# 入っている語 (新幹線 / 在来線 / 路面電車 / 地下鉄 / 駅舎 / 駅員 / 駅長 / 駅前 /
# 操車場 / 機関区 / 軌道 / 線路 / 踏切 / 食堂車 / 寝台車 / 運転士 / 始発 /
# 終電 / 遅延 / 連結 等) は重複させない。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

