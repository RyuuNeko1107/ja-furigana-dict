# 建築 / 建造物の用語 (難読読み)
#
# 和風建築 (鳥居 / 灯籠 / 瓦 / 襖) と現代建築 (鉄筋コンクリート 等) を含む。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "建築 / 建造物 / 寺社建築 / 城郭 / 庭園"

