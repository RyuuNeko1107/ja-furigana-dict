# 色名 / 染色 / 模様の難読読み
#
# 日本の伝統色名は熟字訓 / 当て字が多く Lindera default で読み崩れがち。
# Web デザイン / 着物 / 陶芸 / 工芸品の用途で頻出。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "色名 / 染色 / 模様 / 古典色 / 鉱物色"

[entries]

# (50 音順に並べる)
"浅葱色" = "アサギイロ"
"烏羽色" = "カラスバイロ"
"紅色" = "ベニイロ"

