# 政治・行政用語の難読読み
#
# 議会・選挙・政策・外交の専門用語を中心に。proper_nouns.toml は中央官庁・大学
# などの固有名詞、ここは抽象的な政治用語。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[entries]

