# 楽器 / 古典芸能 / 武道 / 伝統文化の難読読み
#
# 日本の伝統文化は外来語と違って Lindera default で誤読されがちな語が多い。
# 楽器・能楽・歌舞伎・武道などをここに集約。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

