# 固有名詞 (会社名・作品名・ブランド名等)
#
# 地名 (place_names.toml) / 人名 (personal_names.toml) 以外の固有名詞をここに。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨 (PR diff が読みやすい)
#
# 方針:
# - 公的に読みが認知されているもの (大学 / 中央官庁 / 元号 / 歴史的事象) を中心に seed
# - 私企業 / アニメ作品 / ブランド名のうち「公的読みが定まっていない」ものは避ける
#   (CONTRIBUTING.md「誤読をデフォルト化しない」方針)

[meta]
schema_version = "2"
role = "jukugo"
description = "固有名詞 (大学 / 中央官庁 / 元号 / 歴史的事象、PR 募集中)"

