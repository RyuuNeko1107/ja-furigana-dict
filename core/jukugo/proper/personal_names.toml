"菅田将暉" = "スダマサキ"  # 俳優 (公人)。 default スゲタショウキ
"谷郷" = "タニゴウ"        # 谷郷元昭 (カバー株式会社 CEO、公人)。 default ヤゴウ
"勝海舟" = "カツカイシュウ"
"北里柴三郎" = "キタザトシバサブロウ"
"坂本龍馬" = "サカモトリョウマ"
"佐々木" = "ササキ"
