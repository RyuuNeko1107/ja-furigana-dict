# 水田: default は田んぼ用法 (スイデン)、 人名 suffix 文脈のみ姓 (ミズタ)。
# 旧 「ミズタ 無条件」 は田んぼ用法を犠牲にしていた (corpus 実測では田んぼが過半)
"水田" = { reading = "スイデン", match = [ { next_starts_any = ["さん", "くん", "ちゃん", "君", "様", "氏"], reading = "ミズタ" } ] }
