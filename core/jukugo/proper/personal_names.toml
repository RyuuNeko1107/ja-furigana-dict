# ★round 43、 主要 姓 ranking 50 (= Lindera 経由でも band 1000 で確実勝ち)
"川田" = "カワダ"
# 水田: default は田んぼ用法 (スイデン)、 人名 suffix 文脈のみ姓 (ミズタ)。
# 旧 「ミズタ 無条件」 は田んぼ用法を犠牲にしていた (corpus 実測では田んぼが過半)
"水田" = { reading = "スイデン", match = [ { next_starts_any = ["さん", "くん", "ちゃん", "君", "様", "氏"], reading = "ミズタ" } ] }
"水田わさび" = "ミズタワサビ"  # 声優 (ドラえもん)。 フルネーム言及用
"猗窩座" = "アカザ"  # 鬼滅の刃 上弦の参、 固有名詞

# F. 同字異義 / 漢語熟語と衝突する主要姓
# 「○○ さん」 等で頻出する人名表記、 Lindera default や漢語熟語と
# 衝突する surface に対して 名字読みを band 1000 で固定。 「水田 = スイデン」 等
# 漢語熟語と人名の衝突あるが、 一般文脈では人名読み dominant、 simple jukugo
# で人名読み優先。 田んぼ用法は文末 / 文脈で TTS は意味伝わる

# 拡充: 難読苗字 / 中国古典人名 (default 連結で取れないもの)
