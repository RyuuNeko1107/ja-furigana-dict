# 人名 (姓・名・著名人のフルネーム等)
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨 (PR diff が読みやすい)
#
# 方針:
# - 公的に読みが固定されている人物 (歴史 / 古典文学 / 啓蒙期) を中心に seed
# - Lindera default で誤読されやすい姓 / 異体字を含む姓を加える (ワタナベ / サイトウ等)
# - 現存の私人を「読みの曖昧化」リスク回避のため避ける (これは PR で個別に追加)

[meta]
schema_version = "2"
role = "jukugo"
description = "人名 (戦国 / 平安 / 江戸 / 明治大正 / 古典作家、現代私人除く)"

[entries]

# 50 音順 (著名人フルネーム + 姓 を混在で並べる)
"浦原" = "ウラハラ"  # 姓。 Lindera は「浦原さん」等で 原→ゲン (ウラゲン) に誤読 (浦原単体は うらはら)
# stream-comments VV 比較 (8000 sample) で検出した人名 (default で音読みに倒れる)
"冨安" = "トミヤス"      # 冨安健洋 (サッカー)。 default トミアン
"三笘" = "ミトマ"        # 三笘薫 (サッカー)。 default サンチョウ
