"吉良" = "キラ"          # 姓 (吉良上野介/吉良吉影/吉良イヅル)。 default キチリョウ
"習近平" = "シュウキンペイ"  # 中国国家主席 (公人)。 default シュウチカラ
"元太" = "ゲンタ"        # 名 (名探偵コナン 小嶋元太 等)。 default モトタイ
"大谷翔平" = "オオタニショウヘイ"  # 野球。 default オオヤショウヘイ (大谷単体は おおや/おおたに 両用のためフルネームで)
