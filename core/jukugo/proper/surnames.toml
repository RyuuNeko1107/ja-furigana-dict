# 難読姓 (苗字) の読み
#
# personal_names.toml は歴史上の人物のフルネーム / 名 が中心。
# 「姓 (苗字) 単体」 の難読 (東海林 / 栗花落 / 五十嵐 等) は別ファイルで整理する。
# 同姓で複数読みが定着しているものは代表読み 1 つを採録 (コメントで併記)。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 姓は音寄りでもカタカナ表記)
# - 読み 50 音順 を推奨
# - 1 字 surface (林 / 東 等) は unihan / kanji 領域なので入れない。

[meta]
schema_version = "2"
role = "jukugo"
description = "難読姓 (苗字) の読み (姓単体、代表読み)"

