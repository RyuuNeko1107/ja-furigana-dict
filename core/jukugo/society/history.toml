# 歴史用語の難読読み
#
# personal_names.toml (人物名) / proper_nouns.toml (元号 / 官庁) と分離し、
# 制度・事件・文化的概念などの「歴史用語」を独立ファイルに整理する。
# 古代〜現代の日本史を中心に。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ
# - 読み 50 音順 を推奨

