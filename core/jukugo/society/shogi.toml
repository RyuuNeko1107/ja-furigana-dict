# 将棋用語 (戦法・囲い・用語)
#
# 出典: 将棋の一般的な戦法・囲い名。将棋配信で頻出。〜飛車=びしゃ 連濁。
# 歩兵=ほへい/龍馬=りょうま と homograph、単漢字駒(歩/飛/角)は非登録。

[meta]
schema_version = "2"
role = "jukugo"

[entries]

"美濃囲い" = "ミノガコイ"      # 囲い=がこい 連濁 (default かこい)
"入玉" = "ニュウギョク"        # 玉=ぎょく (default にゅうだま)
"振り飛車" = "フリビシャ"      # 飛車=びしゃ 連濁
"四間飛車" = "シケンビシャ"
"三間飛車" = "サンケンビシャ"  # default みつま
"中飛車" = "ナカビシャ"
"向かい飛車" = "ムカイビシャ"
"居飛車" = "イビシャ"          # 居=い (default きょ)
"矢倉" = "ヤグラ"              # 倉=ぐら 連濁 (default やくら)
"角換わり" = "カクガワリ"      # 角=かく (default かど)
"相掛かり" = "アイガカリ"      # 掛かり=がかり 連濁
"横歩取り" = "ヨコフドリ"      # 歩=ふ/取り=どり
