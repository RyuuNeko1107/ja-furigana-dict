# 経済金融 (商品 / 市場 / 会計 / 税務 / 保険)
#
# specialized.toml の経済領域より深い、 金融商品・会計帳簿・税務手続・保険商品に
# 特化した seed。 specialized.toml / general.toml に既存の語 (株式 / 株主 / 国債 /
# 債券 / 関税 / 法人税 / 消費税 / 流動資産 / 為替 / 金利 / 投資 / 融資 / 配当 /
# 景気 / 不況 / 暗号通貨 / 円高 / 円安 / 経常収支 / 物価 / 株式市場 / 為替市場 /
# 金融市場 / 取引所 等) は重複させない。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "経済金融 (商品 / 市場 / 会計 / 税務 / 保険)"

[entries]

# ── ア行 (金融商品 / 市場) ──

