"株式市場価値" = "カブシキシジョウカチ"
"教育ローン" = "キョウイクローン"

# ── サ行 ──
"資本市場" = "シホンシジョウ"
"質権" = "シチケン"
"住宅ローン" = "ジュウタクローン"
"商品市場" = "ショウヒンシジョウ"
"先取特権" = "サキドリトッケン"

# ── タ行 ──

# ── ナ行 ──

# ── ハ行 ──
"保険会社" = "ホケンガイシャ"

# ── マ行 ──

# ── ヤ行 ──

# ── ラ行 ──

# ── 帳簿系 ──

# ── 補足 (税務手続) ──

# === 拡充: default 連結で取れないもののみ ===
"信用買い" = "シンヨウガイ"        # 「買」 default カイ → ガイ 連声
"含み損" = "フクミゾン"            # 「損」 default ソン → ゾン 連声
"売買高" = "バイバイダカ"          # 「高」 default コウ → ダカ 連声
"板情報" = "イタジョウホウ"        # 「板」 default ハン → イタ
"成行" = "ナリユキ"                # 全 訓読み 熟字訓
"自己資本" = "ジココシホン"        # 「己」 default キ → コ
"自己資本比率" = "ジココシホンヒリツ"  # 同上

# === 拡充 v10 (2026-06-12、 batch-read で誤読確認済のみ) ===
"気配値" = "ケハイネ"              # default けはいち → ね (相場用語)
"値嵩" = "ネガサ"                  # default ちかさ → ねがさ (値嵩株)
"付け払い" = "ツケバライ"          # 「払」 default はらい → ばらい 連濁
