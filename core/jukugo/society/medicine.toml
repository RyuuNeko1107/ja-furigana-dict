# 医学 / 医療の難読読み
#
# specialized.toml が医学 / 軍事 / 法学 / 経済 / IT / 工学を雑居させているため、
# 医学 / 医療 (病名 / 症状 / 解剖 / 処置) を独立ファイルに切り出す seed。
# 既存 specialized.toml / nature の body_parts.toml と重複する語は入れない。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 読み 50 音順 を推奨
# - Lindera default で読み下せる平易な語 (肺炎 / 麻酔 等) は除外、難読のみ。

[meta]
schema_version = "2"
role = "jukugo"
description = "医学 / 医療 (病名 / 症状 / 解剖 / 処置の難読)"

