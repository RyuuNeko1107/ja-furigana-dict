# 法律 / 司法の難読読み
#
# specialized.toml の「法学」部分を独立ファイルに整理した seed。
# 民法 / 商法 / 訴訟法 / 刑事法 / 会社法 / 相続法 の難読を中心に。
# Lindera default で読み下せる平易な語 (法律 / 裁判 / 弁護士 等) は除外。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ
# - 読み 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "法律 / 司法 (民法 / 刑法 / 訴訟 / 会社法 / 相続)"

