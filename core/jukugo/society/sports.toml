# スポーツ用語の難読読み (近代スポーツ / 競技 / 用語)
#
# 既存 arts.toml に武道 (柔道 / 剣道 / 弓道 / 空手 / 相撲 / 蹴鞠 / 合気道 /
# 居合道 / 杖道 / 古武術 / 鍛錬 / 稽古 / 門弟 / 師範) がある。
# ここは近代スポーツ / 競技 / 大会 / 練習用語。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "近代スポーツ / 球技 / 陸上 / 水泳 / 体操 / 大会"

