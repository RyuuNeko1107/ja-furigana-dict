# 祭事・年中行事 (2026-06-19 probe)。祭=まつり/さい の suffix homograph 中心。
# 有名祭は まつり (祇園祭/葵祭/天神祭 は ja 正)。文化祭/体育祭=さい は非干渉。
"時代祭" = "ジダイマツリ"      # 京都三大祭。default じだいさい
"神田祭" = "カンダマツリ"      # 江戸三大祭。default かんださい
"三社祭" = "サンジャマツリ"    # 浅草。三社=さんじゃ (default さんしゃさい)
"山王祭" = "サンノウマツリ"    # 江戸三大祭。default さんのうさい
"御柱祭" = "オンバシラマツリ"  # 諏訪。御柱=おんばしら (default ごはしらさい)
"竿灯" = "カントウ"            # 秋田竿燈まつり。竿=かん 音。★compat で 燈→灯 正規化のため key=竿灯 (燈 入力も hit)
"獅子舞" = "シシマイ"          # 舞=まい (default ししぶ)
"御祓い" = "オハライ"          # 御=お prefix (default ごはらい)
# 2026-06-19 probe 補充 (仏教は大半成熟、5件)
"阿頼耶識" = "アラヤシキ"      # 頼=ら (default あらいや)
"准胝観音" = "ジュンテイカンノン"  # 准胝=じゅんてい
"虚空蔵" = "コクウゾウ"        # 虚空=こくう (default こくぞう)
"吉祥天" = "キッショウテン"    # 吉祥=きっしょう (default きちじょう、吉祥寺=きちじょうじ は非干渉)
"荼枳尼天" = "ダキニテン"      # 荼枳尼=だきに
