# 既存 abstracts.toml に「浄土 / 阿弥陀 / 観音 / 菩薩 / 釈迦 / 涅槃 / 法華経 /
# 般若 / 念仏 / 修行 / 仁義 / 礼儀 / 忠孝 / 廉恥」がある。重複しない範囲で
# 神道 / キリスト教 / イスラム教 / 宗教概念を網羅。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "神道 / 仏教 / キリスト教 / イスラム / 儀礼"

