# 妖怪・伝承の名 (民俗)
#
# 出典: 日本の妖怪・伝承。配信の怪談/オカルト/ゲーム文脈で頻出。
# 白沢=はくたく は しらさわ(姓)と、芥子=けし は からし と homograph のため非登録。

[meta]
schema_version = "2"
role = "jukugo"

[entries]

"妖狐" = "ヨウコ"          # 狐=こ (default ようきつね)
"火車" = "カシャ"          # 妖怪 (default ひしゃ)
"濡女" = "ヌレオンナ"      # default ぬじょ
"塗壁" = "ヌリカベ"        # default とへき
"砂掛" = "スナカケ"        # 砂掛婆 (default すなかい)
"子泣爺" = "コナキジジイ"  # default こきゅうじい
"垢嘗" = "アカナメ"        # default あかしょう
"口裂" = "クチサケ"        # 口裂け女 (default くちれつ)
"一目連" = "イチモクレン"  # 妖怪/神 (default ひとめれん)
"輪入道" = "ワニュウドウ"  # 輪=わ (default りんにゅうどう)
"唐瓜" = "カラウリ"        # 鬼灯の冷徹の唐瓜 (default とううり)
