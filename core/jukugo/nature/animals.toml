# 動植物 / 魚介の難読読み
#
# Lindera default では誤読されやすい動植物名 (熟字訓を多く含む) の seed。
# 一般語のうち動植物カテゴリだけ別ファイル化したもの (general.toml が肥大化しないよう)。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "動植物 / 魚介 / 鳥 / 昆虫 / 茸 / 海藻の難読"

[entries]

# (50 音順に並べる)
"海豹" = "アザラシ"
"馬酔木" = "アセビ"
"榎茸" = "エノキタケ"
"蜉蝣" = "カゲロウ"
# 銀杏 は general.toml で イチョウ default、ナッツは銀杏炒り等の compound 化
"浜茄子" = "ハマナス"
"海星" = "ヒトデ"
"不如帰" = "ホトトギス"
"舞茸" = "マイタケ"
"百合" = "ユリ"


# ア行
"金雀枝" = "エニシダ"
"五加木" = "ウコギ"

# カ行
# 翡翠 (カワセミ) は general.toml の "翡翠" = "ヒスイ" (鉱物・色) と
# cross-file で衝突するため、context rule (rules/context/homonyms.toml)
# で 「翡翠 + が + 水辺/枝/木/池」 等の用法だけ カワセミ に切り替える。
