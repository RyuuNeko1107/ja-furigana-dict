# 地名 (国名・都道府県名・市区町村名・駅名・著名スポット等)
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨 (PR diff が読みやすい)

[meta]
schema_version = "2"
role = "jukugo"
description = "地名 (47 都道府県 / 主要都市 / 駅 / 寺社仏閣 / 観光地)"

[entries]
"青島" = "あおしま"      # 地名(宮崎/愛知)・姓。Lindera は青島ビール由来で「チンタオ」に倒すが日本語文脈では あおしま dominant
# 三輪=みわ (奈良)。三輪車/三輪バイク=さんりん は別 (干渉せず) (2026-06-19)
"三輪明神" = "みわみょうじん"
"三輪素麺" = "みわそうめん"
"三輪そうめん" = "みわそうめん"
# 斎宮=さいくう (伊勢、近鉄駅)。斎宮跡=さいくうあと (旧 いつきせき 破損)
"斎宮跡" = "さいくうあと"
"円覚寺" = "エンガクジ"
"羽田" = "ハネダ"  # 地名/姓。 default は ハタ に倒れる (羽田空港は既に正だが単体/羽田ぴゅーん等で誤)
# 行政区「北区」は キタク 固定。 北 [[kanji]] block は prev 漢字 → ホク (敗北/東北) なので、
# 「岡山市北区」 等で 北→ホク に倒れる (北区 単体は default きた で キタク)。 jukugo で文脈非依存に固定。
"北区" = "キタク"
"高野山" = "コウヤサン"
"斑鳩" = "いかるが"  # 奈良の地名/法隆寺所在。斑鳩町 は正だが単体「斑鳩の里」等で が 脱落し いかる に
"神保町" = "ジンボウチョウ"
"鶴岡八幡宮" = "ツルガオカハチマングウ"
"天神橋筋" = "テンジンバシすじ"  # 大阪の通り名/商店街。「筋」は通り名で すじ (御堂筋と同型)、default きん 回避
"四つ橋筋" = "よつばしすじ"      # 大阪の通り。default よっつはしきん 回避
"西船橋駅" = "ニシフナバシエキ"

# --- 検証ループ補強 (proper noun + 一般語の固定読み) ---


# 旧国名 (= 律令制 五畿七道) - Lindera default で誤読されやすい
"下野" = "シモツケ"
"河内" = "カワチ"
"豊前" = "ブゼン"
"日向国" = "ヒュウガノクニ"
"陸奥国" = "ムツノクニ"
"出羽国" = "デワノクニ"
"陸前" = "リクゼン"
"常陸国" = "ヒタチノクニ"

# 外国名 (= 当て字 / 明治期表記)
"英吉利" = "イギリス"
"伊太利亜" = "イタリア"
"阿弗利加" = "アフリカ"
"希臘" = "ギリシャ"
"羅馬" = "ローマ"
"伯林" = "ベルリン"
"紐育" = "ニューヨーク"
"桑港" = "サンフランシスコ"
"亜爾然丁" = "アルゼンチン"
"濠太剌利" = "オーストラリア"
"土耳古" = "トルコ"
"葡萄牙" = "ポルトガル"
"西班牙" = "スペイン"
"和蘭" = "オランダ"
"瑞典" = "スウェーデン"
"瑞西" = "スイス"
"欧羅巴" = "ヨーロッパ"
"越南" = "ベトナム"
"比律賓" = "フィリピン"
"馬来" = "マレー"
"波斯" = "ペルシャ"

# 日本地名 (難読)
"八街" = "ヤチマタ"      # 千葉県
"幟町" = "ノボリチョウ"  # 広島市
"厚別" = "アツベツ"      # 札幌市

# 旧国名 (default 連結で取れないもののみ)
"下総" = "シモウサ"      # default シモフサ

# 拡充 v10 (2026-06-12、 batch-read で誤読確認済)
"安曇野" = "アズミノ"    # 「野」 default の → や に崩れる (長野県、 安曇=あずみ は正読)

# 拡充 (2026-06-19 自作例文 probe)
"代々木" = "ヨヨギ"      # 東京の地名/駅 (代々木公園/上原/体育館)。default だいだいもく に破損
"代々木上原" = "ヨヨギウエハラ"  # 小田急/メトロ駅。上原 が うえげん に破損

# 駅名・地名 probe (2026-06-19)。麻布=あさぬの(布地、clothes.toml)と homograph のため
# bare 麻布 は触らず、地名は固有表層で固定 (あざぶ)。
"麻布十番" = "アザブジュウバン"  # 港区/メトロ駅。麻布 が あさぬの に破損
"西麻布" = "ニシアザブ"
"麻布台" = "アザブダイ"          # 麻布台ヒルズ
"人形町" = "ニンギョウチョウ"    # 中央区/メトロ駅。町=ちょう (default まち)
"門前仲町" = "モンゼンナカチョウ"  # 江東区/メトロ駅 (もんなか)。町=ちょう
"烏丸" = "カラスマ"              # 京都の通り/駅 (烏丸御池/烏丸通)。default 丸=まる で からすまる
"二子玉川" = "フタコタマガワ"    # 東急駅。official ふたこ (連濁 ふたご は誤)
"茅場町" = "カヤバチョウ"        # 中央区/メトロ駅。町=ちょう (default まち)
"千歳烏山" = "チトセカラスヤマ"  # 京王駅。default せんさいうざん に全壊

# 難読駅名 第3弾 (2026-06-19 probe)。未登録だと ノ/ヶ が literal 残留する語も固定。
"鮫洲" = "サメズ"            # 京急駅。洲=しゅう に化け
"雑色" = "ゾウシキ"          # 京急駅。default ざっしょく
"馬喰町" = "バクロチョウ"    # JR駅。町=ちょう
"曳舟" = "ヒキフネ"          # 東武/京成駅。default えいしゅう
"荏原中延" = "エバラナカノブ"  # 東急駅。延=のべ に化け (中延 単体は正)
"洗足" = "センゾク"          # 東急駅。足=ぞく 連濁 (default せんそく)
"竹ノ塚" = "タケノツカ"      # 東武駅。ノ が literal 残留
"幡ヶ谷" = "ハタガヤ"        # 京王駅。ヶ 残留 + 谷=こく (市ヶ谷は登録済で正)

# 難読駅名 第4弾 (2026-06-19 関西/名古屋/福岡 probe)
"富田林" = "トンダバヤシ"    # 近鉄駅 (大阪)。default とみたはやし
"河堀口" = "コボレグチ"      # 近鉄駅 (大阪)。default かほりぐち
"土師ノ里" = "ハジノサト"    # 近鉄駅 (大阪)。ノ 残留
"千種" = "チクサ"            # 名古屋の区/駅。default せんしゅ
"矢場町" = "ヤバチョウ"      # 名古屋地下鉄駅。町=ちょう
"大曽根" = "オオゾネ"        # 名古屋駅。曽根=ぞね 連濁 (default おおそね)
# 馬出 bare は architecture.toml=うまだし (城郭の馬出し) と homograph のため触らず、
# 福岡の駅は固有表層で固定
"馬出九大病院前" = "マイダシキュウダイビョウインマエ"  # 福岡市営地下鉄駅

# 難読駅名 第6弾 (2026-06-19 西鉄/名鉄/仙台/広島 probe)
# homograph (前原=まえはら姓/横川=よこかわ群馬/筑紫=つくし古名) は default 委ね
"春日原" = "カスガバル"      # 西鉄駅 (福岡)。原=ばる が げん に化け (白木原は正)
"聚楽園" = "ジュラクエン"    # 名鉄駅 (愛知)。聚=じゅ (default しゅう)
"太田川" = "オオタガワ"      # 名鉄駅 (愛知)。川=せん に化け (おおたせん)
"台原" = "ダイノハラ"        # 仙台地下鉄駅。default だいはら (の脱落)
"紙屋町" = "カミヤチョウ"    # 広島の繁華街/電停。町=ちょう (default まち)
"江波" = "エバ"              # 広島電鉄終点。連濁 (default えは)
