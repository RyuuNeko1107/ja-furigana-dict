# 地名 (国名・都道府県名・市区町村名・駅名・著名スポット等)
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨 (PR diff が読みやすい)

[meta]
schema_version = "2"
role = "jukugo"
description = "地名 (47 都道府県 / 主要都市 / 駅 / 寺社仏閣 / 観光地)"

[entries]
"青島" = "あおしま"      # 地名(宮崎/愛知)・姓。Lindera は青島ビール由来で「チンタオ」に倒すが日本語文脈では あおしま dominant
# 三輪=みわ (奈良)。三輪車/三輪バイク=さんりん は別 (干渉せず) (2026-06-19)
"三輪明神" = "みわみょうじん"
"三輪素麺" = "みわそうめん"
"三輪そうめん" = "みわそうめん"
# 斎宮=さいくう (伊勢、近鉄駅)。斎宮跡=さいくうあと (旧 いつきせき 破損)
"斎宮跡" = "さいくうあと"
"円覚寺" = "エンガクジ"
"羽田" = "ハネダ"  # 地名/姓。 default は ハタ に倒れる (羽田空港は既に正だが単体/羽田ぴゅーん等で誤)
# 行政区「北区」は キタク 固定。 北 [[kanji]] block は prev 漢字 → ホク (敗北/東北) なので、
# 「岡山市北区」 等で 北→ホク に倒れる (北区 単体は default きた で キタク)。 jukugo で文脈非依存に固定。
"北区" = "キタク"
"高野山" = "コウヤサン"
"斑鳩" = "いかるが"  # 奈良の地名/法隆寺所在。斑鳩町 は正だが単体「斑鳩の里」等で が 脱落し いかる に
"神保町" = "ジンボウチョウ"
"鶴岡八幡宮" = "ツルガオカハチマングウ"
"天神橋筋" = "テンジンバシすじ"  # 大阪の通り名/商店街。「筋」は通り名で すじ (御堂筋と同型)、default きん 回避
"四つ橋筋" = "よつばしすじ"      # 大阪の通り。default よっつはしきん 回避
"西船橋駅" = "ニシフナバシエキ"

