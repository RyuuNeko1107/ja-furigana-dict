# === Detailed entries (★A2 alpha.11 migration、 inline match block 持ち) ===

[entries."寒気"]
reading = "カンキ"

[[entries."寒気".match]]
reading = "サムケ"
next_eq = "が"
next2_starts_any = [
  "する",
  "し",
]

[[entries."寒気".match]]
reading = "サムケ"
next_eq = "を"
next2_starts_any = [
  "覚",
  "感",
  "催",
]

[[entries."寒気".match]]
reading = "サムケ"
prev_ends_any = [
  "背筋",
  "悪寒",
]

