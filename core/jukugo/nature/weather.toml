# 気象 / 天候の難読読み
#
# Lindera default では誤読されやすい気象用語 (熟字訓 / 当て字を多く含む) の seed。
# 単漢字 (霙 / 霰 / 雹 / 嵐 / 凪 / 霧 / 露 / 霜 / 雷 / 虹 等) は core/unihan.toml に
# 既存のため、ここでは熟語のみ採用。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 (読みのカナ順) を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "気象 / 天候 / 季語的気象 / 二十四節気 / 海洋気象"

