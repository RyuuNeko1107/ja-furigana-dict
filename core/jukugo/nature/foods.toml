# 食べ物 / 料理の難読読み
#
# Lindera default では誤読されやすい食べ物名 (熟字訓を多く含む) の seed。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
description = "食べ物 / 料理 / 和菓子 / 郷土料理 / 食材 / 調味料"

