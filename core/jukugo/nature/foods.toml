# 拡充 (= VV n=500 mining 由来)
"ピリ辛" = "ピリカラ"    # 「辛」 default シン → カラ (spoken)

# 拡充 v13 (2026-06-12、 Wikipedia コーパス ground-truth 照合由来、 batch-read で誤読確認済)
"京野菜" = "キョウヤサイ"  # default きょうのさい (京+野菜 が誤分割)
"葉野菜" = "ハヤサイ"      # 「葉」 default よう → は (葉物野菜)

# (bare entry 群を root [entries] に戻すため、 section を末尾へ移動)
[entries."最中"]
reading = "モナカ"

[[entries."最中".match]]
reading = "サイチュウ"
next_eq_any = ["に", "だ", "で"]

[[entries."最中".match]]
reading = "サイチュウ"
next_starts_any = ["だった", "です", "であ"]

[[entries."最中".alt]]
reading = "サイチュウ"
sense = "in-the-middle-of"
weight = 45
