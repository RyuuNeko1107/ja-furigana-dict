# 植物 / 花の難読読み (熟字訓中心)
#
# animals.toml は「動植物」を名乗りつつ実態は動物 / 魚介 / 鳥 / 昆虫 / 茸 が中心。
# 花卉 / 樹木 / 草本の難読 (向日葵 / 山茶花 / 杜若 等) は別ファイルで整理する。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 読み 50 音順 を推奨
# - animals.toml (馬酔木 等) / foods.toml / general.toml と重複しない範囲。
#   1 字 surface (椿 / 楓 / 菫 等) は unihan / kanji 領域なので入れない。

[meta]
schema_version = "2"
role = "jukugo"
