# 数学の難読読み
#
# science.toml が天文/物理/化学/生物/地学を担当しているため、
# 数学 (解析 / 線形代数 / 集合論 / 統計 / 確率 等) を独立ファイルに切り出す。
# Lindera default で読み下せる平易な語 (数学 / 計算 / 関数 等) は除外。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ
# - 読み 50 音順 を推奨

[meta]
schema_version = "2"
role = "jukugo"
