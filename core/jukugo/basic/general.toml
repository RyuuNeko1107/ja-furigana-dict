# ─── 動詞 base form (Lindera/IPADIC が分解 or 誤 default する動詞を救う) ──
# - 「淹れる」: Lindera が「淹 (名詞)」 +「れる (受身助動詞)」 と分解する (issue #13)
# - 「点ける」: Lindera が「点 (名詞・テン)」 +「ける (助動詞)」 と分解する (issue #14)
# - 「摘む」: IPADIC default が ツマム を返すが ツム が標準 (issue #17)
#
# merge_with_dict が「淹+れる」 → surface「淹れる」 全体を最長一致で探し、
# jukugo に hit すれば固定読みが採用される。
"淹れる" = "イレル"
"点ける" = "ツケル"
"摘む" = "ツム"

# ─── 単漢字 unihan が Lindera reading に override される問題の phrase 救済 (issue #15) ──
