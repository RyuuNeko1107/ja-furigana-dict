# === match_hits condition weighting (lib 0.1.11) 連動 sweep (2026-06-12) ===
# 既存 simple entry の detailed 化 2 件。 reading は不変、 match block は同点 path の
# 等化用 (= broad hit を持つ split path と hits を揃え、 既存の first-found 勝者 =
# 正しい読みを温存する)。 match reading が default と同値なのは意図的。

# 「3頭身/8頭身」 で 数字+頭 (counter トウ) + 身 の split path が hit を持つため、
# 数字/漢数字 直前の文脈 match で等化
[entries."頭身"]
reading = "トウシン"

[[entries."頭身".match]]
prev_char_type = "英数"
reading = "トウシン"

[[entries."頭身".match]]
prev_char_type = "漢字"
reading = "トウシン"

# 「〜所以外」 で 所以 (Lindera compound ゆえん) + 外 (ガイ match) の split path が
# hit を持つため、 漢字直前の文脈 match で等化
[entries."以外"]
reading = "イガイ"

[[entries."以外".match]]
prev_char_type = "漢字"
reading = "イガイ"

# 「0期生/2期生/5期生」 (VTuber/アイドル用語) で 数字+期 (counter キ) + 生 の
# split path が hit を持つため、 数字/漢数字 直前の文脈 match で等化
[entries."期生"]
reading = "キセイ"

[[entries."期生".match]]
prev_char_type = "英数"
reading = "キセイ"

[[entries."期生".match]]
prev_char_type = "漢字"
