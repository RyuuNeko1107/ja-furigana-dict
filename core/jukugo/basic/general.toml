# 「が無い/が無かった/がない/がなかった」 で否定 → 「ヒトケ」 (= 人気が無い場所)
# next_logical_token は char-class 連続を 1 pseudo-token として返すので、
# 「がない」 全体を next_eq_any で列挙する (= next_eq "が" だと "がない" ≠ "が" で失敗)
[[entries."人気".match]]
reading = "ヒトケ"
next_eq_any = ["がない", "がなかった"]

[[entries."人気".match]]
reading = "ヒトケ"
next_eq_any = ["のない", "のなかった"]

[[entries."人気".match]]
reading = "ヒトケ"
next_eq_any = ["が"]
next2_starts_any = ["無"]

[[entries."人気".match]]
reading = "ヒトケ"
next_eq_any = ["の"]
next2_starts_any = ["無"]

