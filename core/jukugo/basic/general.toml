# ─── 単漢字 unihan が Lindera reading に override される問題の phrase 救済 (issue #15) ──
# 「鋸 unihan = のこぎり」「土 unihan = つち」 が登録されているが、 Lindera が
# 「鋸 → ノコ」「土 → ド」 で返すため、 単独 surface では Lindera reading が
# 優先される (resolve_reading の Step 4)。 本質的解決は Phase 6+ で再検討
# (priority 単純反転は副作用大、 corpus regression で確認済み)。
# 当面は頻出 phrase を jukugo で固定して救う方針 (R15 の畔道 / R16 の山道 / 川魚 と同 pattern)。
"鋸の歯" = "ノコギリノハ"
