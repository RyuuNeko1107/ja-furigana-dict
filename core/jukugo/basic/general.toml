# 尚更 = ナオサラ (同上)
[entries."尚更"]
reading = "ナオサラ"

# 彼方此方 = アチコチ (= かなたこれかた と破損)
[entries."彼方此方"]
reading = "アチコチ"

# 直向き = ヒタムキ (直 default ちょく で ちょくむき に化ける)
[entries."直向き"]
reading = "ヒタムキ"

# 足 は counter 化すると「一足=ひとあし / 二足=にそく」 が衝突するため counter 不採用。
# 固定熟語の 二足歩行/四足歩行 のみ jukugo で ニソク/ヨンソク
[entries."二足歩行"]
reading = "ニソクホコウ"

[entries."四足歩行"]
reading = "ヨンソクホコウ"

# 「X色 = Xいろ」 で 色=いろ になる訓色名のうち Lindera 未収録で しょく に化ける分。
# (山吹色/茜色/瑠璃色 等は Lindera token で既に いろ。 原色/景色/白色 は しょく/けしき で別)
[entries."桜色"]
reading = "サクライロ"

[entries."虹色"]
reading = "ニジイロ"

[entries."萌黄色"]
reading = "モエギイロ"

[entries."柑子色"]
reading = "コウジイロ"

[entries."黄土色"]
reading = "オウドイロ"

# 乾物 = カンブツ (= 干した食品。 IPADIC が ヒモノ と誤マッピング、 干物=ひもの とは別語)
[entries."乾物"]
reading = "カンブツ"

# 依代 = ヨリシロ (= 神霊が宿る物、 神道用語)。 IPADIC は 依=イ + 代=ダイ で いだい
[entries."依代"]
reading = "ヨリシロ"

# 七竈 = ナナカマド (= 樹木名・姓。 IPADIC は 七シチ+竈カマド で しちかまど)
[entries."七竈"]
reading = "ナナカマド"

# 弥が上にも = イヤガウエ にも (実況「弥が上にも盛り上がる」 等。 IPADIC は やがうえ)
[entries."弥が上"]
reading = "イヤガウエ"

# 弥次馬 = ヤジウマ (野次馬 の異表記。 IPADIC は やじば)
[entries."弥次馬"]
reading = "ヤジウマ"

# 一番目 = イチバンメ (二番目以降は counter で ばんめ だが 一番目 だけ 一番(Lindera)+目もく に化け)
[entries."一番目"]
