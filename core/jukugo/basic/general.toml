# 「十分待った/経った/過ぎた」 = 時間 10 分の意味 → ジュッ プン
# (= next pseudo-token は char-class 連続なので 「待」「経」「過」 1 字を見れば足りる、
#  「待っ」「待ち」 等の活用形は次の char が ひらがな になって token 切れる)
