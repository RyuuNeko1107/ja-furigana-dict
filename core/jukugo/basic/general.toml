# 一般熟語・四字熟語等
#
# 一般語彙のみ。固有名詞は proper_nouns.toml、地名は place_names.toml、
# 人名は personal_names.toml に分けて配置する。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨 (PR diff が読みやすい)

[meta]
schema_version = "2"
role = "jukugo"
description = "二字・三字の一般熟語 (季節 / 行事 / 慣用句 含む)"

[entries]

