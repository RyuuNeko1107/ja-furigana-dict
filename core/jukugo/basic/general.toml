[entries."就中"]
reading = "ナカンズク"

# 愈々 = イヨイヨ (愈 単独が full読み「いよいよ」 で 々 が二重化 → イヨイヨイヨイヨ)
[entries."愈々"]
reading = "イヨイヨ"

# 尚且つ = ナオカツ (尚 default ショウ で しょうかつ に化ける)
