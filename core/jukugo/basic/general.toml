"発売日" = "ハツバイビ"  # 日=び 連濁 (default はつばいにち/はつばいひ で揺れ、VV比較で検出 2026-06-19)
# 例文 probe で検出した文脈依存の一般語ミス (2026-06-20)
"歪な" = "イビツナ"      # 歪な形=いびつな (default ひずむな。歪む=ゆがむ/歪曲=わいきょく は別)
