# 形相 = ギョウソウ (= 顔つき・ありさま、 一般語) が default。 ケイソウ は
# アリストテレス哲学の「形相 (=エイドス)」 専門語で稀。 IPADIC は default ケイソウ
[entries."形相"]
reading = "ギョウソウ"

[[entries."形相".alt]]
reading = "ケイソウ"
sense = "philosophy-form"
weight = 8

# 追従 = ツイジュウ (= つき従う) が一般、 「追従笑い (= へつらい笑い)」 では
# ツイショウ。 四字熟語「阿諛追従 = アユツイショウ」 と同系
[entries."追従笑い"]
reading = "ツイショウワライ"

# 籠 の prev_char_type=漢字→ロウ heuristic 誤爆救済 (= 鳥籠/虫籠 は訓+訓 で カゴ)
[entries."鳥籠"]
reading = "トリカゴ"

[entries."虫籠"]
reading = "ムシカゴ"

# 籠城 は籠が先頭で default カゴ に化ける (= かごじょう) → ロウジョウ
[entries."籠城"]
reading = "ロウジョウ"

# 仄暗い = ほのぐらい (= 仄 が IPADIC で「かたむく」 と誤読される)
