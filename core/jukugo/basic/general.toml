# 一般熟語・四字熟語等
#
# 一般語彙のみ。固有名詞は proper_nouns.toml、地名は place_names.toml、
# 人名は personal_names.toml に分けて配置する。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨 (PR diff が読みやすい)

[meta]
schema_version = "2"
role = "jukugo"
description = "二字・三字の一般熟語 (季節 / 行事 / 慣用句 含む)"

[entries]

# === redundancy scan 後復活: [[kanji]] match 上書きや動詞活用 catch ===
"手術後" = "シュジュツゴ"     # 「後」 next 助詞 → アト match を上書きするため必須
"行っ" = "イッ"                # 「行ってた/行った」 動詞活用、 [[kanji]] match 不足
"行かない" = "イカナイ"        # 否定形
"入れ" = "イレ"                # 「俺入れん?」 等の動詞活用
"入れん" = "イレン"            # 「俺入れん」 lexer split 回避

