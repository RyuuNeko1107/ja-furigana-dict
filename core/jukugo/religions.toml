# 宗教用語の難読読み (神道 / 仏教 / キリスト教 / イスラム教 / その他)
#
# 既存 abstracts.toml に「浄土 / 阿弥陀 / 観音 / 菩薩 / 釈迦 / 涅槃 / 法華経 /
# 般若 / 念仏 / 修行 / 仁義 / 礼儀 / 忠孝 / 廉恥」がある。重複しない範囲で
# 神道 / キリスト教 / イスラム教 / 宗教概念を網羅。
#
# - key (表層): ダブルクォート必須
# - value (読み): ひらがな または 全角カタカナ (慣習: 訓=ひら / 音=カタ)
# - 50 音順 を推奨

[entries]

# ── ア行 ──
"異端" = "イタン"
"位牌" = "イハイ"
"因果" = "インガ"

# ── カ行 ──
"戒律" = "カイリツ"
"神主" = "カンヌシ"
"教義" = "キョウギ"
"教会" = "キョウカイ"

# ── サ行 ──
"座禅" = "ザゼン"
"信仰" = "シンコウ"
"神社" = "ジンジャ"
"神道" = "シントウ"
"神話" = "シンワ"
"真言宗" = "シンゴンシュウ"
"修道院" = "シュウドウイン"
"巡礼" = "ジュンレイ"
"殉教" = "ジュンキョウ"
"浄土真宗" = "ジョウドシンシュウ"
"注連縄" = "シメナワ"
"聖書" = "セイショ"
"洗礼" = "センレイ"
"禅宗" = "ゼンシュウ"

# ── タ行 ──
"大仏" = "ダイブツ"

# ── ハ行 ──
"仏壇" = "ブツダン"
"仏像" = "ブツゾウ"
"仏陀" = "ブッダ"

# ── マ行 ──
"木魚" = "モクギョ"

# ── ヤ行 ──
"八百万" = "ヤオヨロズ"

# ── ラ行 ──
