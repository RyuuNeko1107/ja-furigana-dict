# 「仕様上諦める」リスト
#
# ja-furigana は決定論的 lookup + Lindera 形態素解析 + ルール TOML の組み合わせで、
# 機械学習による文脈推論は持たない。以下は本質的に「機械学習なしでは困難」な領域なので
# 無理に対応しない。期待値も書かない。
#
# このリストの存在自体が「ここまでは諦めてる」というドキュメント。
# 機械学習を入れるなら別 crate (`ja-furigana-ml`?) として feature 切替か別物として作る方針。

# ---------------------------------------------------------------------------
# 古文 / 文語
# ---------------------------------------------------------------------------

[[case]]
input = "いとをかし"
mode = "hiragana"
out_of_scope_reason = "枕草子等の古典日本語。現代語前提なので対応外"

[[case]]
input = "つれづれなるままに"
mode = "hiragana"
out_of_scope_reason = "古文。形態素解析器も近現代日本語前提"

# ---------------------------------------------------------------------------
# 高度な文脈推論 (機械学習領域)
# ---------------------------------------------------------------------------

[[case]]
input = "彼は人気のない場所に行った"
mode = "hiragana"
out_of_scope_reason = "「人気」が「にんき」か「ひとけ」か文意でしか決まらない。文脈モデル必要"

[[case]]
input = "彼は人気がある"
mode = "hiragana"
out_of_scope_reason = "↑と同じ語、こちらは「にんき」。決定論では片方しか取れない"

[[case]]
input = "今日は風邪を引いて寝込んだ"
mode = "hiragana"
out_of_scope_reason = "「今日 (こんにち) は良い時代」vs「今日 (きょう) は風邪」、長文文脈推論が必要"

# ---------------------------------------------------------------------------
# 同形異音語 (heteronym): 機械学習なしでは曖昧
# ---------------------------------------------------------------------------

[[case]]
input = "牧場で牛を見た"
mode = "hiragana"
out_of_scope_reason = "「牧場」は ぼくじょう / まきば の二通りあり、文意で決まらない"

[[case]]
input = "市場に行く"
mode = "hiragana"
out_of_scope_reason = "「市場」は しじょう / いちば、口語と書面で違う、機械学習領域"

[[case]]
input = "目下の問題"
mode = "hiragana"
out_of_scope_reason = "「目下」は もっか (= 現在) / めした (= 部下) の異音、文脈モデル必要"

# ---------------------------------------------------------------------------
# 命名されたばかりの新語 / 商標
# ---------------------------------------------------------------------------

[[case]]
input = "Arc Browser"
mode = "hiragana"
out_of_scope_reason = "海外プロダクト名のラテン字 → カタカナ。商標は公式表記がないと機械的に決められない"

[[case]]
input = "X (旧 Twitter)"
mode = "hiragana"
out_of_scope_reason = "1 字略称の発音は文脈依存 (エックス / ツイッター)、商標で決まる範囲外"

# ---------------------------------------------------------------------------
# 方言 / 訛り
# ---------------------------------------------------------------------------

[[case]]
input = "せやな"
mode = "hiragana"
out_of_scope_reason = "関西弁。発音は「せやな」のまま OK だが、辞書としては方言扱いで非対応"

# ---------------------------------------------------------------------------
# 略語 / アルファベット読み
# ---------------------------------------------------------------------------

[[case]]
input = "USBは便利"
mode = "tts"
out_of_scope_reason = "USB の各文字読み (ゆーえすびー) はルール化可能だが、AI / WHO / NASA 等で読み方が分岐する。網羅困難"
