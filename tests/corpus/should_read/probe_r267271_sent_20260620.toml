# 2026-06-20 R267-271 例文 probe (造語/文脈/四字/副詞)。
# ネット造語(切り抜き/投げ銭/解釈一致/養分)・四字熟語・副詞・難読動詞は文脈で大半成熟。
# semantic homograph(大手を振る/身代/猫を被る/下手に出る/託ける)は ML/default 領域で見送り。

[[case]]
input = "彼は反故紙を捨てた"
mode = "hiragana"
expected = "かれはほごがみをすてた"
note = "反故紙=ほごがみ (紙=がみ、default ほごし)"

[[case]]
input = "彼は雪洞に火を灯す"
mode = "hiragana"
expected = "かれはぼんぼりにひをともす"
note = "雪洞=ぼんぼり (default せつどう)"

[[case]]
input = "彼は唯唯諾諾と従う"
mode = "hiragana"
expected = "かれはいいだくだくとしたがう"
note = "唯唯=いい (々無し形、default ただただ)"

[[case]]
input = "彼は努々忘れない"
mode = "hiragana"
expected = "かれはゆめゆめわすれない"
note = "努々=ゆめゆめ (default どど)"

[[case]]
input = "彼は界隈の古株だ"
mode = "hiragana"
expected = "かれはかいわいのふるかぶだ"
note = "ネット造語 成熟確認 (古株=ふるかぶ)"
