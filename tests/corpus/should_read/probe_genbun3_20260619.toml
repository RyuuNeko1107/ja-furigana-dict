# 2026-06-19 自作例文 round 3 由来の dict 改善 回帰 lock。
# 畳語「々」(副詞/形容詞/四字熟語) + 的 homograph。詳細: cands4_20260619.txt の DIFF triage。
# ★々 は重複漢字へ早期展開されるため kanji.match next_eq="々" が死ぬ → full surface jukugo で固定。

# ─── 畳語副詞 (々) ───
[[case]]
input = "渋々承知する"
mode = "hiragana"
expected = "しぶしぶしょうちする"
note = "旧 じゅうじゅう"

[[case]]
input = "益々盛り上がる"
mode = "hiragana"
expected = "ますますもりあがる"
note = "旧 えきえき (益 next_eq=々→ます は死 match)"

