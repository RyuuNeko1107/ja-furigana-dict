# 自然文 corpus 拡張版 (★0.1.0 stable cut 前の large-scale 投入)
#
# 既存 sentences.toml (49 case) を超える幅広い domain で、 ja-furigana の
# production readiness を実証する。 期待 reading は **表記読み** 維持 (= 助詞
# は / へ / を そのまま、 発音処理は TTS engine 任せ)。
#
# カテゴリ:
# - 一般会話 (~25 case)
# - 専門分野: IT / 医療 / 法律 / 経済 (~25 case)
# - 文芸 / 古典 (~15 case)
# - 数字 / 単位 / 日付 (~20 case)
# - 慣用句 / ことわざ (~15 case)

[meta]
schema_version = "2"
role = "corpus"

# =========================================================================
# === 一般会話 (= SNS / web text / 日常 narration 想定) ====================
# =========================================================================

