# 2026-06-19 名作アニメキャラ名 (幽白/るろ剣/犬夜叉/セーラームーン/エヴァ)。
# 緋村剣心/蔵馬/弥勒/桔梗/土方十四郎(=とうしろう銀魂) 等は登録済/正読。
# 日暮=ひぐれ(夕暮れ)/神威=しんい は homograph で見送り。

[[case]]
input = "浦飯幽助"
mode = "hiragana"
expected = "うらめしゆうすけ"
note = "幽白 (default うらはんゆうじょ)"

[[case]]
input = "志々雄真実"
mode = "hiragana"
expected = "ししおまこと"
note = "るろ剣 (々破損)"

[[case]]
input = "四乃森蒼紫"
mode = "hiragana"
expected = "しのもりあおし"
note = "るろ剣"

[[case]]
input = "神谷薫"
mode = "hiragana"
expected = "かみやかおる"
note = "るろ剣 (薫=かおる)"

[[case]]
input = "殺生丸"
mode = "hiragana"
expected = "せっしょうまる"
note = "犬夜叉 (丸=まる)"

[[case]]
input = "地場衛"
mode = "hiragana"
expected = "ちばまもる"
note = "セーラームーン"

[[case]]
input = "綾波"
mode = "hiragana"
expected = "あやなみ"
note = "エヴァ 綾波レイ (波=なみ)"

[[case]]
input = "真希波"
mode = "hiragana"
expected = "まきなみ"
note = "エヴァ 真希波マリ"
