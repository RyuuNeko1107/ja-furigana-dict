# 2026-06-19 ラブライブ/アイマス キャラ名 probe。絢瀬/東條/如月/四条 等は登録済/正読。
# bare 高坂 は こうさか/たかさか homograph のためフルネームで登録。

[[case]]
input = "西木野"
mode = "hiragana"
expected = "にしきの"
note = "西木野真姫 (default にしきや)"

[[case]]
input = "桜内"
mode = "hiragana"
expected = "さくらうち"
note = "桜内梨子 (default さくらない)"

[[case]]
input = "高坂穂乃果"
mode = "hiragana"
expected = "こうさかほのか"
note = "bare 高坂 は たかさか と homograph"

[[case]]
input = "速水奏"
mode = "hiragana"
expected = "はやみかなで"
note = "デレマス 奏=かなで (default そう)"

[[case]]
input = "桑山千雪"
mode = "hiragana"
expected = "くわやまちゆき"
note = "シャニマス (default せんせつ)"

[[case]]
input = "緋田美琴"
mode = "hiragana"
expected = "あけたみこと"
note = "シャニマス 緋田=あけた"

[[case]]
input = "浅倉透"
mode = "hiragana"
expected = "あさくらとおる"
note = "シャニマス 透=とおる"
