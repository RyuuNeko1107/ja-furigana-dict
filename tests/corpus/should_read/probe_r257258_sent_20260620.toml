# 2026-06-20 R257-258 例文 probe。専門語(競売/建蔽率/相殺/逝去)・体/動詞は文脈で大半成熟。
# 拳=こぶし default flip、腑=ふ(unihan誤り修正)。踵を返す=きびす/項=うなじ は semantic homograph。

[[case]]
input = "彼は拳を握り締めた"
mode = "hiragana"
expected = "かれはこぶしをにぎりしめた"
note = "拳=こぶし default (拳銃=けんじゅう は jukugo)"

[[case]]
input = "拳銃を構える"
mode = "hiragana"
expected = "けんじゅうをかまえる"
note = "拳銃=けんじゅう (flip後も jukugo で正)"

[[case]]
input = "彼は腑に落ちない顔をした"
mode = "hiragana"
expected = "かれはふにおちないかおをした"
note = "腑=ふ (旧 はらわた)"

[[case]]
input = "五臓六腑に染み渡る"
mode = "hiragana"
expected = "ごぞうろっぷにしみわたる"
note = "五臓六腑=ろっぷ (腑修正後も jukugo で正)"

[[case]]
input = "彼は競売物件を落札した"
mode = "hiragana"
expected = "かれはけいばいぶっけんをらくさつした"
note = "専門語 成熟確認"
