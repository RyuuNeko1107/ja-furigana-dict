# 2026-06-19 主要駅名・地名 probe 由来の回帰 lock。
# 著名地名でも破損する (代々木=だいだいもく の続き)。麻布=あさぬの(布地)と
# homograph のため地名は固有表層で固定。町=ちょう/まち は地名ごとに分岐。

[[case]]
input = "麻布十番"
mode = "hiragana"
expected = "あざぶじゅうばん"
note = "旧 あさぬのじゅうばん"

[[case]]
input = "西麻布"
mode = "hiragana"
expected = "にしあざぶ"

[[case]]
input = "人形町"
mode = "hiragana"
expected = "にんぎょうちょう"
note = "旧 にんぎょうまち (町=ちょう)"

[[case]]
input = "門前仲町"
mode = "hiragana"
expected = "もんぜんなかちょう"
note = "旧 もんぜんなかまち"

[[case]]
input = "茅場町"
mode = "hiragana"
expected = "かやばちょう"
note = "旧 かやばまち"

[[case]]
input = "烏丸御池"
mode = "hiragana"
expected = "からすまおいけ"
note = "烏丸=からすま (旧 からすまる)"

[[case]]
input = "二子玉川"
mode = "hiragana"
expected = "ふたこたまがわ"
note = "official ふたこ (旧 ふたご 連濁誤)"

[[case]]
input = "千歳烏山"
mode = "hiragana"
expected = "ちとせからすやま"
note = "旧 せんさいうざん (全壊)"

# 正読維持の確認 (まち の地名は触らない)
[[case]]
input = "椎名町"
mode = "hiragana"
expected = "しいなまち"
note = "町=まち (人形町=ちょう と分岐、ja 正読)"
