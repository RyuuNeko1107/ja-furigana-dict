# 2026-06-18 自作例文 probe round 18 (自然文 validation + 七竈)。
#
# 配信コメント風の自然文は ja 全て正読を確認 (上手すぎる=うま / 上手だね=じょうず の
# 文脈分け、神がかって=かみ も正)。やや珍しい 2 字熟語も大半正読 (早苗/案山子/東雲/
# 海原/微温湯/天邪鬼/百日紅/合歓/凌霄花/木通/御神籤=おみくじ)。実バグは 七竈 のみ。
#
# - 七竈=ななかまど (樹木名・姓。IPADIC は しちかまど)。

[[case]]
input = "七竈の紅葉"
mode = "hiragana"
expected = "ななかまどのこうよう"
note = "旧 しちかまど"

[[case]]
input = "七人の侍"
mode = "hiragana"
expected = "しちにんのさむらい"
note = "数詞 七 は維持"

# ─── 自然文の文脈分け (ガード) ───
[[case]]
input = "流石に上手すぎる"
mode = "hiragana"
expected = "さすがにうますぎる"

[[case]]
input = "相変わらず上手だね"
mode = "hiragana"
expected = "あいかわらずじょうずだね"

[[case]]
input = "今のプレー神がかってた"
mode = "hiragana"
expected = "いまのプレーかみがかってた"
