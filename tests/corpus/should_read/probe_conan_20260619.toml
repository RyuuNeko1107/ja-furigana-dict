# 2026-06-19 名探偵コナン キャラ名 probe。服部平次/工藤新一/灰原哀/阿笠博士 等は既正。
# 目暮=めぐれ (メグレ警視のパロディ、既存 目暮警部=メグレ に合わせる)。

[[case]]
input = "目暮十三"
mode = "hiragana"
expected = "めぐれじゅうぞう"
note = "目暮=めぐれ (default めぼ)"

