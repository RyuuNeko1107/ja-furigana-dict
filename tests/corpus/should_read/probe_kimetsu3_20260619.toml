# 2026-06-19 鬼滅 用語・地名・柱 probe。水柱=みずばしら/全集中/血鬼術 等は既正。

[[case]]
input = "那田蜘蛛山"
mode = "hiragana"
expected = "なたぐもやま"
note = "default なでんくも"

[[case]]
input = "鎹鴉"
mode = "hiragana"
expected = "かすがいがらす"
note = "鴉=がらす 連濁 (default からす)"

[[case]]
input = "縁壱零式"
mode = "hiragana"
expected = "よりいちぜろしき"
note = "縁壱=よりいち/零式=ぜろしき"

[[case]]
input = "炎柱"
mode = "hiragana"
expected = "えんばしら"
note = "柱=ばしら 連濁 (default はしら)"

[[case]]
input = "風柱"
mode = "hiragana"
expected = "かぜばしら"
note = "風=かぜ/柱=ばしら (default ふうはしら)"
