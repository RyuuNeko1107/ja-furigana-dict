# 2026-06-18 自作例文 probe round 7 (単漢字訓 standalone)。
# 連声 (観音/反応/天皇/因縁/順応/帰依/出納/建立) と 物体系難読 (柵/鋸/鎬/鉋/罠/砦/楔)
# は ja が既に全て正読を確認 (= この vein は成熟)。本 round の実バグは 庇 のみ。
#
# - 庇: default ヒ (庇護/庇蔭) + 動詞 庇う→かば は既存。 名詞「庇の下/庇が長い」 =
#       ひさし を next_starts_any 助詞→ひさし で追加。

[[case]]
input = "庇の下で雨宿り"
mode = "hiragana"
expected = "ひさしのしたであまやどり"
note = "旧 ひのした"

[[case]]
input = "庇が長い"
mode = "hiragana"
expected = "ひさしがながい"

[[case]]
input = "庇護する"
mode = "hiragana"
expected = "ひごする"
note = "ヒ ガード"

[[case]]
input = "上司を庇う"
mode = "hiragana"
expected = "じょうしをかばう"
note = "動詞 かば ガード"

# ─── ja が元から正読 (回帰ガード) ───
[[case]]
input = "柵を越える"
mode = "hiragana"
expected = "さくをこえる"

[[case]]
input = "鎬を削る"
mode = "hiragana"
expected = "しのぎをけずる"

[[case]]
input = "鋸で切る"
mode = "hiragana"
expected = "のこぎりできる"
