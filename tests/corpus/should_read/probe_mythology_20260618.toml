# 2026-06-18 自作例文 probe round 15 (神話/宗教語彙、 ゲーム/アニメ頻出)。
# 連濁複合 (裏口/泣き声/親心/折り紙/旅人/小川/夜空/力技/神業) と宗教語の大半は
# ja 既に正読。実バグは記紀神話系 2 語。
#
# - 禍津神=まがつかみ (IPADIC は かつしん)。
# - 幽世=かくりよ (現世=うつしよ の対。IPADIC は ゆうよ)。

[[case]]
input = "禍津神"
mode = "hiragana"
expected = "まがつかみ"
note = "旧 かつしん"

[[case]]
input = "幽世と現世"
mode = "hiragana"
expected = "かくりよとげんせ"
note = "幽世 旧 ゆうよ"

