# 2026-06-19 自作例文 round 10 由来の dict 改善 回帰 lock。
# の+単漢字 homograph (境/糧)。詳細: probe12。
# ★戦闘/ゲーム漢語 (殲滅/潰走/膠着/矜持/完封…) は ja 全正、homograph 2件のみ。

# ─── 境 = さかい (「〜の境」、 国境/境界/心境 は キョウ 維持) ───
[[case]]
input = "生死の境をさまよう"
mode = "hiragana"
expected = "せいしのさかいをさまよう"
note = "旧 きょう"

[[case]]
input = "夢と現実の境"
mode = "hiragana"
expected = "ゆめとげんじつのさかい"

# 回帰ガード: 境 compound = キョウ
[[case]]
input = "国境の町"
mode = "hiragana"
expected = "こっきょうのまち"

[[case]]
input = "心境の変化"
mode = "hiragana"
expected = "しんきょうのへんか"

# ─── 糧 = かて (「〜の糧 / 生きる糧」、 食糧/兵糧 は リョウ 維持) ───
[[case]]
input = "心の糧になる"
mode = "hiragana"
expected = "こころのかてになる"
note = "旧 りょう"

[[case]]
input = "生きる糧"
mode = "hiragana"
expected = "いきるかて"
note = "prev=る (動詞連体形) も かて"

# 回帰ガード: 糧 compound = リョウ
[[case]]
input = "食糧難に苦しむ"
mode = "hiragana"
expected = "しょくりょうなんにくるしむ"

[[case]]
input = "兵糧攻め"
mode = "hiragana"
expected = "ひょうろうぜめ"
