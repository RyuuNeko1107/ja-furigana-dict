# 2026-06-19 北海道・東北 難読地名 probe 由来の回帰 lock。
# ja はアイヌ語系を驚異的に正読 (倶知安=くっちゃん/弟子屈=てしかが/占冠=しむかっぷ/
# 神居古潭=かむいこたん/音威子府=おといねっぷ/及位=のぞき/椴法華=とどほっけ/象潟=きさかた)。
# 実バグは 八幡平 のみ (雄勝=おがち/おがつ は homograph)。

[[case]]
input = "八幡平"
mode = "hiragana"
expected = "はちまんたい"
note = "岩手/秋田の高原・市 (旧 やわただいら)"

[[case]]
input = "音威子府"
mode = "hiragana"
expected = "おといねっぷ"
note = "成熟確認 (アイヌ語系)"

[[case]]
input = "及位"
mode = "hiragana"
expected = "のぞき"
note = "成熟確認 (超難読)"
