# 2026-06-18 自作例文 probe round 8 (数字+助数詞 counter)。
# counter regex は dict (simple.keys + counter keys) から動的構築、kanji_numeral
# フラグが漢数字 bare regex を gate する (patterns.rs build_counter_regexes)。
#
# - 艘: simple.toml→objects.toml へ移動 (kanji_numeral opt-in)。三艘=さんふね を解消。
#       1/8/10 促音 (いっそう/はっそう)、六艘=ろくそう。
# - 斤: 新規 counter。1/6/8/10 促音 (いっきん/ろっきん/はっきん)。
# - 俵: 新規 counter。1/6/8/10 促音+半濁 (いっぴょう/ろっぴょう)、3 連濁 (さんびょう)。
# - 足: counter 化は「一足=ひとあし / 二足=にそく」 衝突で不採用。二足歩行/四足歩行 のみ jukugo。

# ─── 艘 ───
[[case]]
input = "一艘の船"
mode = "hiragana"
expected = "いっそうのふね"
note = "旧 いちふね"

[[case]]
input = "三艘並ぶ"
mode = "hiragana"
expected = "さんそうならぶ"

[[case]]
input = "六艘"
mode = "hiragana"
expected = "ろくそう"

# ─── 斤 ───
[[case]]
input = "一斤のパン"
mode = "hiragana"
expected = "いっきんのパン"
note = "旧 いちきん"

[[case]]
input = "六斤"
mode = "hiragana"
expected = "ろっきん"

# ─── 俵 ───
[[case]]
input = "一俵の米"
mode = "hiragana"
expected = "いっぴょうのこめ"
note = "旧 いちひょう"

[[case]]
input = "三俵"
mode = "hiragana"
expected = "さんびょう"

[[case]]
input = "六俵"
mode = "hiragana"
expected = "ろっぴょう"

[[case]]
input = "土俵入り"
mode = "hiragana"
expected = "どひょういり"
note = "土 は数字でないので counter 非発火ガード"

# ─── 足 (jukugo 固定、counter 不採用) ───
[[case]]
input = "二足歩行"
mode = "hiragana"
expected = "にそくほこう"
note = "旧 にあし"

[[case]]
input = "一足先に"
mode = "hiragana"
expected = "ひとあしさきに"
note = "足 を counter 化しないので ひとあし 維持"
