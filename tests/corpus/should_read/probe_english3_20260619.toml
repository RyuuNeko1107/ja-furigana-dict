# 2026-06-19 アルファベット/英単語 round 3 由来の回帰 lock。
# 日常英単語 (果物/動物/物/場所/時間) の passthrough ギャップ補充 (general.toml)。
# user 指摘: berry/apple 等の簡単な英単語も配信に出る。

# ─── 果物 ───
[[case]]
input = "berryが好き"
mode = "hiragana"
expected = "ベリーがすき"

[[case]]
input = "strawberryのケーキ"
mode = "hiragana"
expected = "ストロベリーのケーキ"

[[case]]
input = "bananaを買う"
mode = "hiragana"
expected = "バナナをかう"

[[case]]
input = "lemonは酸っぱい"
mode = "hiragana"
expected = "レモンはすっぱい"

# ─── 動物 ───
[[case]]
input = "elephantは大きい"
mode = "hiragana"
expected = "エレファントはおおきい"

[[case]]
input = "pandaが可愛い"
mode = "hiragana"
expected = "パンダがかわいい"

# ─── 物 / 場所 / 時間 ───
[[case]]
input = "houseに帰る"
mode = "hiragana"
expected = "ハウスにかえる"

[[case]]
input = "bedで寝る"
mode = "hiragana"
expected = "ベッドでねる"

[[case]]
input = "timeがない"
mode = "hiragana"
expected = "タイムがない"

[[case]]
input = "knifeで切る"
mode = "hiragana"
expected = "ナイフできる"
