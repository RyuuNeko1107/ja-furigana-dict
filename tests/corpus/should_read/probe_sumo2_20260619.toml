# 2026-06-19 力士四股名 第2弾 probe。照ノ富士/玉鷲/宇良/魁聖 等は正読。
# 明生=あきお/豊山=とよやま/東龍=とうりゅう は homograph 見送り。

[[case]]
input = "翔猿"
mode = "hiragana"
expected = "とびざる"
note = "default しょうえん"

[[case]]
input = "豊昇龍"
mode = "hiragana"
expected = "ほうしょうりゅう"
note = "横綱"

[[case]]
input = "琴ノ若"
mode = "hiragana"
expected = "ことのわか"
note = "ノ=の"

[[case]]
input = "逸ノ城"
mode = "hiragana"
expected = "いちのじょう"
note = "ノ=の/城=じょう"

[[case]]
input = "佐田の海"
mode = "hiragana"
expected = "さだのうみ"
note = "佐田=さだ (default さた)"
