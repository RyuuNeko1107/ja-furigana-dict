# 2026-06-20 R264 歌舞伎名跡 例文 probe。團十郎/仁左衛門/吉右衛門/玉三郎/海老蔵/猿之助 等は成熟。

[[case]]
input = "尾上菊五郎が大役を演じる"
mode = "hiragana"
expected = "おのえきくごろうがたいやくをえんじる"
note = "尾上=おのえ (default おがみ)"

[[case]]
input = "偲ぶ会だ"
mode = "hiragana"
expected = "しのぶかいだ"
note = "会=かい (default 会=あ 誤適用)"

[[case]]
input = "片岡仁左衛門の舞台を見た"
mode = "hiragana"
expected = "かたおかにざえもんのぶたいをみた"
note = "仁左衛門=にざえもん 成熟確認"

[[case]]
input = "中村吉右衛門が見得を切る"
mode = "hiragana"
expected = "なかむらきちえもんがみえをきる"
note = "吉右衛門=きちえもん 成熟確認"
