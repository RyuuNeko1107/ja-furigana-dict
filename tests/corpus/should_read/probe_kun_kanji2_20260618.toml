# 2026-06-18 自作例文 probe round 4 (単漢字訓 standalone / 送り仮名 / 文語)。
#
# - 唇: default シン (口唇/読唇/唇音) + 助詞続き standalone → くちびる
# - 露: default つゆ + prev漢字→ロ は既存。 送り仮名「わ」 続き「露わ=あらわ」 を
#       next_starts_any=["わ"]→あら で追加 (露 が あら、 +わ で あらわ)
# - 就中 = なかんずく (文語、 IPADIC は シュウチュウ)

# ─── 唇 ───
[[case]]
input = "唇を尖らせる"
mode = "hiragana"
expected = "くちびるをとがらせる"
note = "旧 しん"

[[case]]
input = "唇が荒れる"
mode = "hiragana"
expected = "くちびるがあれる"

[[case]]
input = "口唇ヘルペス"
mode = "hiragana"
expected = "こうしんヘルペス"
note = "音読み熟語ガード"

[[case]]
input = "読唇術"
mode = "hiragana"
expected = "どくしんじゅつ"

# ─── 露わ ───
[[case]]
input = "怒りを露わにする"
mode = "hiragana"
expected = "いかりをあらわにする"
note = "旧 つゆわ"

[[case]]
input = "露わな感情"
mode = "hiragana"
expected = "あらわなかんじょう"

[[case]]
input = "朝露が光る"
mode = "hiragana"
expected = "あさつゆがひかる"
note = "つゆ ガード"

[[case]]
input = "暴露される"
mode = "hiragana"
expected = "ばくろされる"
note = "ロ ガード"

# ─── 就中 ───
[[case]]
input = "就中これが良い"
mode = "hiragana"
expected = "なかんずくこれがよい"
note = "旧 しゅうちゅう"
