# 2026-06-19 便 suffix homograph 例文 由来の回帰 lock。
# 便=びん (交通/配送サービス) vs べん (便利/排泄)。
# 非数値 suffix の びん 化けを jukugo + prev=の で補正。

# ─── 便 = びん (交通/配送 suffix) ───
[[case]]
input = "最終便に乗る"
mode = "hiragana"
expected = "さいしゅうびんにのる"
note = "旧 さいしゅうべん"

[[case]]
input = "国際便で送る"
mode = "hiragana"
expected = "こくさいびんでおくる"

[[case]]
input = "定期便の運航"
mode = "hiragana"
expected = "ていきびんのうんこう"

[[case]]
input = "夜行便のバス"
mode = "hiragana"
expected = "やこうびんのバス"

[[case]]
input = "次の便を待つ"
mode = "hiragana"
expected = "つぎのびんをまつ"
note = "prev=の → びん"

# 回帰ガード: 便 = べん (便利/排泄/方便)
[[case]]
input = "便利な店"
mode = "hiragana"
expected = "べんりなみせ"

[[case]]
input = "小便と大便"
mode = "hiragana"
expected = "しょうべんとだいべん"

[[case]]
input = "方便を使う"
mode = "hiragana"
expected = "ほうべんをつかう"

# 回帰ガード: 便 = びん の既存正読
[[case]]
input = "宅配便が届く"
mode = "hiragana"
expected = "たくはいびんがとどく"
