# 2026-06-19 料理・食べ物名 probe 由来の回帰 lock (中華料理)。
# ja は和食・熟字訓 (炒飯/酢豚/稲荷寿司/茶碗蒸し/天麩羅/善哉…) は成熟、
# kanji default で全壊する中華系のみ補充。青椒肉絲 は compat(絲→糸) 正規化に注意。

[[case]]
input = "担々麺"
mode = "hiragana"
expected = "たんたんめん"
note = "旧 たんだんめん (々 連濁誤)"

[[case]]
input = "八宝菜"
mode = "hiragana"
expected = "はっぽうさい"
note = "旧 はちたからさい"

[[case]]
input = "回鍋肉"
mode = "hiragana"
expected = "ほいこーろー"
note = "旧 かいなべにく"

[[case]]
input = "青椒肉絲"
mode = "hiragana"
expected = "ちんじゃおろーす"
note = "旧 あおはじかみにくし。絲→糸 compat 正規化で key=青椒肉糸"
