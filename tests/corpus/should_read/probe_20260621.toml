# 2026-06-21 例文 probe で検出した実バグ回帰 lock。
#
# 1) 語り草 = カタリグサ: 動詞連用形+草 の連濁落ち (default かたりくさ)。
#    道草=みちくさ は token 化で正のため非干渉。general.toml に jukugo 登録。
# 2) 足 counter (履物のペア): counter 不在で 六足=ろくあし/二足のわらじ=にあし 化け。
#    rules/numbers/counters/objects.toml に 足=ソク (s系 1/8/10 促音) 追加。
#    body 部位の 二足歩行/四足 は jukugo override が band 100 で counter に優先。

[[case]]
input = "彼は語り草になった"
mode = "hiragana"
expected = "かれはかたりぐさになった"
note = "草=ぐさ 連濁 (default かたりくさ)"

[[case]]
input = "彼は道草を食う"
mode = "hiragana"
expected = "かれはみちくさをくう"
note = "道草=みちくさ (連濁なし、語り草と非干渉の確認)"

[[case]]
input = "靴を六足揃える"
mode = "hiragana"
expected = "くつをろくそくそろえる"
note = "足=そく counter (旧 ろくあし)"

[[case]]
input = "二足のわらじを履く"
mode = "hiragana"
expected = "にそくのわらじをはく"
note = "二足=にそく (旧 にあし)"

[[case]]
input = "靴を一足買う"
mode = "hiragana"
expected = "くつをいっそくかう"
note = "一足=いっそく 促音"

[[case]]
input = "二足歩行する動物"
mode = "hiragana"
expected = "にそくほこうするどうぶつ"
note = "二足歩行 jukugo override が counter に優先 (非回帰)"

# 3) s/t行 suffix の助数詞で 6 が誤って sokuonize list に混入 → 六で誤促音。
#    六は k/p行のみ促音化する。戦/着/節/通/週/食/首 の 7 件を [1,8,0] に修正。
[[case]]
input = "六戦して五勝した"
mode = "hiragana"
expected = "ろくせんしてごしょうした"
note = "戦=せん s行、六戦=ろくせん (旧 ろっせん)"

[[case]]
input = "服を六着持っている"
mode = "hiragana"
expected = "ふくをろくちゃくもっている"
note = "着=ちゃく t行、六着=ろくちゃく (旧 ろっちゃく)"

[[case]]
input = "六節からなる楽曲"
mode = "hiragana"
expected = "ろくせつからなるがっきょく"
note = "節=せつ s行、六節=ろくせつ (旧 ろっせつ)"

[[case]]
input = "手紙を六通書いた"
mode = "hiragana"
expected = "てがみをろくつうかいた"
note = "通=つう t行、六通=ろくつう (旧 ろっつう)"

[[case]]
input = "六週間入院した"
mode = "hiragana"
expected = "ろくしゅうかんにゅういんした"
note = "週=しゅう s行、六週=ろくしゅう (旧 ろっしゅう)"

[[case]]
input = "一日六食食べる"
mode = "hiragana"
expected = "いちにちろくしょくたべる"
note = "食=しょく s行、六食=ろくしょく (旧 ろっしょく)"

[[case]]
input = "和歌を六首詠む"
mode = "hiragana"
expected = "わかをろくしゅよむ"
note = "首=しゅ s行、六首=ろくしゅ (旧 ろっしゅ)"

# 4) 未登録 counter の新規追加。
[[case]]
input = "薬を六包飲む"
mode = "hiragana"
expected = "くすりをろっぽうのむ"
note = "包=ぽう p行 counter 新規 (旧 ろくほう)"

[[case]]
input = "六弦のギターを弾く"
mode = "hiragana"
expected = "ろくげんのギターをひく"
note = "弦=げん counter 新規 (旧 ろくつる)"

[[case]]
input = "四拍子の曲を演奏する"
mode = "hiragana"
expected = "よんびょうしのきょくをえんそうする"
note = "拍子=びょうし 連濁 counter 新規 (旧 よんひょうし)"

[[case]]
input = "小包を送る"
mode = "hiragana"
expected = "こづつみをおくる"
note = "包 counter は非数字の 小包=こづつみ を破壊しない (非回帰)"

# 5) 何 + 助数詞: 未登録 counter が 何=なに (訓) に化けていた。jukugo 個別列挙で修正
#    (何は数詞でなく counter rule 不可、何本=ナンボン 等と同じ方式)。
[[case]]
input = "全部で何番だ"
mode = "hiragana"
expected = "ぜんぶでなんばんだ"
note = "何番=なんばん (旧 なにばん)"

[[case]]
input = "これは何円ですか"
mode = "hiragana"
expected = "これはなんえんですか"
note = "何円=なんえん (旧 なにえん)"

[[case]]
input = "テストは何点だった"
mode = "hiragana"
expected = "テストはなんてんだった"
note = "何点=なんてん (旧 なにてん)"

[[case]]
input = "前から何番目に並ぶ"
mode = "hiragana"
expected = "まえからなんばんめにならぶ"
note = "何番目=なんばんめ (何番 jukugo が序数 目をブロックする問題を明示登録で解消)"

[[case]]
input = "手紙を何通書いた"
mode = "hiragana"
expected = "てがみをなんつうかいた"
note = "何通=なんつう (旧 なにつう)"

[[case]]
input = "鳥が何羽いる"
mode = "hiragana"
expected = "とりがなんばいる"
note = "何羽=なんば 連濁 (旧 なにう、三羽=さんばと同型)"

[[case]]
input = "三番目の人"
mode = "hiragana"
expected = "さんばんめのひと"
note = "番は非 jukugo で counter経路、三番目=さんばんめ (非回帰)"

# 6) 数 + 助数詞: 大半 default 正、漏れた counter のみ (数=すう、連濁なし)。
[[case]]
input = "数行のコードを書く"
mode = "hiragana"
expected = "すうぎょうのコードをかく"
note = "数行=すうぎょう (旧 すうこう)"

[[case]]
input = "船が数艘浮かぶ"
mode = "hiragana"
expected = "ふねがすうそううかぶ"
note = "数艘=すうそう (旧 すうふね)"

[[case]]
input = "鳥が数羽飛ぶ"
mode = "hiragana"
expected = "とりがすうわとぶ"
note = "数羽=すうわ (旧 すうう)"

# 7) 幾 + 助数詞/数詞: 幾=き 化け。現代語で幾は常に いく (例外 幾何=きか)。
[[case]]
input = "幾千の星が輝く"
mode = "hiragana"
expected = "いくせんのほしがかがやく"
note = "幾千=いくせん (旧 きせん)"

[[case]]
input = "幾万の兵が集まる"
mode = "hiragana"
expected = "いくまんのへいがあつまる"
note = "幾万=いくまん (旧 きまん)"

[[case]]
input = "幾何学模様を描く"
mode = "hiragana"
expected = "きかがくもようをかく"
note = "幾何=きか は longest-match で保全 (幾X 追加の非回帰確認)"

# 8) 連濁複合語 multi-suffix sweep の漏れ 2件。
[[case]]
input = "彼を道連れにする"
mode = "hiragana"
expected = "かれをみちづれにする"
note = "道連れ=みちづれ (連れ=つれ→づれ、旧 ミチズレ は誤登録)"

[[case]]
input = "大海原を渡る船"
mode = "hiragana"
expected = "おおうなばらをわたるふね"
note = "大海原=おおうなばら (大=おお、旧 だいうなばら)"

[[case]]
input = "靴擦れができた"
mode = "hiragana"
expected = "くつずれができた"
note = "擦れ=すれ→ずれ は ず が正 (道連れ修正の非干渉確認)"

# 9) 畳語形容詞 sweep の漏れ (々 の誤連濁)。
[[case]]
input = "錚々たる顔ぶれが集う"
mode = "hiragana"
expected = "そうそうたるかおぶれがつどう"
note = "錚々=そうそう (々 を連濁して そうぞう 化けていた)"

# 10) 時/時間 counter: replacements (4→ヨ/7→シチ/9→ク) を持つのに kanji_numeral 未指定で
#     漢数字に発火せず。四時=よじ/九時=くじ が よんじ/きゅうじ 化けていた。
[[case]]
input = "朝四時に起きる"
mode = "hiragana"
expected = "あさよじにおきる"
note = "四時=よじ (旧 よんじ、kanji_numeral 追加)"

[[case]]
input = "夜九時に寝る"
mode = "hiragana"
expected = "よるくじにねる"
note = "九時=くじ (旧 きゅうじ)"

[[case]]
input = "七時の電車に乗る"
mode = "hiragana"
expected = "しちじのでんしゃにのる"
note = "七時=しちじ (非回帰)"

[[case]]
input = "四時間かかる作業"
mode = "hiragana"
expected = "よじかんかかるさぎょう"
note = "四時間=よじかん (旧 よんじかん)"

[[case]]
input = "九時間も寝た"
mode = "hiragana"
expected = "くじかんもねた"
note = "九時間=くじかん (旧 きゅうじかん)"

[[case]]
input = "何時間も待った"
mode = "hiragana"
expected = "なんじかんもまった"
note = "何時間=なんじかん (何は数字でないので非干渉)"

# 11) 大+和語 = おお (default だい 化け)。大+漢語 (大失敗/大混乱) は だい で正。
[[case]]
input = "大仕事を任される"
mode = "hiragana"
expected = "おおしごとをまかされる"
note = "大仕事=おおしごと (旧 だいしごと)"

[[case]]
input = "大喧嘩になった"
mode = "hiragana"
expected = "おおげんかになった"
note = "大喧嘩=おおげんか (旧 だいけんか)"

[[case]]
input = "大舞台に立つ"
mode = "hiragana"
expected = "おおぶたいにたつ"
note = "大舞台=おおぶたい (旧 だいぶたい)"

[[case]]
input = "大外れの予想"
mode = "hiragana"
expected = "おおはずれのよそう"
note = "大外れ=おおはずれ (大当たり=おおあたりと対、旧 だいはずれ)"

[[case]]
input = "大混乱に陥る"
mode = "hiragana"
expected = "だいこんらんにおちいる"
note = "大+漢語 は だい で正 (大混乱=だいこんらん、非回帰)"

# 12) 小+漢語 = しょう (default こ 化け)。小+和語 (小道/小銭) は こ で正。
[[case]]
input = "小休止を取る"
mode = "hiragana"
expected = "しょうきゅうしをとる"
note = "小休止=しょうきゅうし (旧 こきゅうし)"

[[case]]
input = "小冊子を配る"
mode = "hiragana"
expected = "しょうさっしをくばる"
note = "小冊子=しょうさっし (旧 こさっし)"

[[case]]
input = "小市民的な暮らし"
mode = "hiragana"
expected = "しょうしみんてきなくらし"
note = "小市民=しょうしみん (旧 こしみん)"

[[case]]
input = "大番狂わせを起こす"
mode = "hiragana"
expected = "おおばんくるわせをおこす"
note = "大番狂わせ=おおばんくるわせ (大+和語、旧 だいばんくるわせ)"

[[case]]
input = "小作人の家"
mode = "hiragana"
expected = "こさくにんのいえ"
note = "小作人=こさくにん は確立読み (しょう化しない、非回帰)"
