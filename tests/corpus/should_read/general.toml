# 一般単語の回帰 case (既存 should_read.toml で未カバーの部分を補強)
#
# 既存 should_read.toml には基本的な 一般熟語 / 場所 / 助数詞 等の単語単独 case が
# 大量にあるが、 **多 target の sentence-level case** + **新規 jukugo 拡充分** を
# こちらで補う。 新 schema [[case.targets]] を活用して 1 例文で多 lock。
#
# 対象 source: core/jukugo/<genre>/*.toml (basic / humanities / nature / objects /
# proper / society 全 6 区分)、 + 派生作品系 (genji_monogatari 等)。

# ─── 四字熟語 (sentence + multi target) ────────────────────────────────

[[case]]
input = "彼の演奏は一意専心の境地に達していた"
mode = "hiragana"
expected = "かれのえんそうはいちいせんしんのきょうちにたっしていた"
note = "一意専心 = イチイセンシン (専心 = センシン)、 境地 = キョウチ"

[[case.targets]]
surface = "一意専心"
reading = "いちいせんしん"

[[case.targets]]
surface = "境地"
reading = "きょうち"


[[case]]
input = "前途洋々たる若者の門出を祝う"
