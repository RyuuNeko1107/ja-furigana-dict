# 2026-06-19 銀魂キャラ probe。故事成語(塞翁が馬/四面楚歌/推敲/杞憂/画竜点睛/杜撰/忖度)は全成熟。
# 近藤勲=いさお(銀魂) は 近藤勇=いさみ(新選組) と別。

[[case]]
input = "星海坊主"
mode = "hiragana"
expected = "ほしかいぼうず"
note = "神楽の父 (default せいうみ)"

[[case]]
input = "万事屋"
mode = "hiragana"
expected = "よろずや"
note = "万事屋銀ちゃん (default ばんじや)"

[[case]]
input = "近藤勲"
mode = "hiragana"
expected = "こんどういさお"
note = "真選組局長、勲=いさお"

[[case]]
input = "志村妙"
mode = "hiragana"
expected = "しむらたえ"
note = "妙=たえ (default みょう)"

[[case]]
input = "鬼兵隊"
mode = "hiragana"
expected = "きへいたい"
note = "鬼=き (default おに)"
