# 2026-06-19 将棋用語 probe。穴熊/棒銀/詰将棋/王手/飛車(単独)は正読。歩兵=ほへい/龍馬=りょうま homograph 見送り。

[[case]]
input = "美濃囲い"
mode = "hiragana"
expected = "みのがこい"
note = "囲い=がこい 連濁 (default かこい)"

[[case]]
input = "振り飛車"
mode = "hiragana"
expected = "ふりびしゃ"
note = "飛車=びしゃ 連濁"

[[case]]
input = "居飛車"
mode = "hiragana"
expected = "いびしゃ"
note = "居=い (default きょ)"

[[case]]
input = "入玉"
mode = "hiragana"
expected = "にゅうぎょく"
note = "玉=ぎょく (default にゅうだま)"

[[case]]
input = "角換わり"
mode = "hiragana"
expected = "かくがわり"
note = "角=かく (default かど)"
