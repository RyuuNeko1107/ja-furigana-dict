# 2026-06-19 suffix homograph 例文 由来の回帰 lock。
# 〜中/〜間/〜方/〜物 suffix は ja 大半成熟 (背中/夜中/谷間/居間/床の間/味方/夕方/
# 食べ物/荷物=にもつ/果物 全正)。を文脈で再分割する2語のみ補正。

[[case]]
input = "行き方を調べる"
mode = "hiragana"
expected = "いきかたをしらべる"
note = "旧 いきほう (を で再分割)。読み方/書き方は正"

[[case]]
input = "家中を探す"
mode = "hiragana"
expected = "いえじゅうをさがす"
note = "旧 かちゅう (江戸の家臣団は古語)"

# 回帰ガード: 方=ほう/かた、中=ちゅう/なか の正読
[[case]]
input = "方法を探す"
mode = "hiragana"
expected = "ほうほうをさがす"

[[case]]
input = "読み方を習う"
mode = "hiragana"
expected = "よみかたをならう"

[[case]]
input = "授業中に寝る"
mode = "hiragana"
expected = "じゅぎょうちゅうにねる"

[[case]]
input = "背中が痛い"
mode = "hiragana"
expected = "せなかがいたい"

# 成熟確認: 〜間/〜物
[[case]]
input = "床の間に飾る"
mode = "hiragana"
expected = "とこのまにかざる"

[[case]]
input = "荷物を運ぶ"
mode = "hiragana"
expected = "にもつをはこぶ"
