# 2026-06-18 自作例文 probe round 19 (弥 系 + 古語は低価値と確認)。
#
# - 弥が上=いやがうえ (「弥が上にも盛り上がる」 実況頻出。IPADIC は やがうえ)。
# - 弥次馬=やじうま (野次馬 の異表記。IPADIC は やじば)。
#
# 古語/文語 (忝く/頓に=とみに/況んや=いわんや/宜なるかな=むべ/惟うに) は配信用途で
# 低価値につき保留。弥生=やよい/弥栄=やさか/野次馬=やじうま は ja 正読。

[[case]]
input = "弥が上にも盛り上がる"
mode = "hiragana"
expected = "いやがうえにももりあがる"
note = "旧 やがうえ"

[[case]]
input = "弥次馬根性"
mode = "hiragana"
expected = "やじうまこんじょう"
note = "旧 やじば"

# ─── ガード ───
[[case]]
input = "野次馬が集まる"
mode = "hiragana"
expected = "やじうまがあつまる"

[[case]]
input = "弥生時代"
mode = "hiragana"
expected = "やよいじだい"

[[case]]
input = "弥栄を祈る"
mode = "hiragana"
expected = "やさかをいのる"
