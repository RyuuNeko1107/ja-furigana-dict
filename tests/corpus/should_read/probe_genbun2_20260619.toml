# ─── 虎視眈々 = コシタンタン (々 畳字形) ───
[[case]]
input = "虎視眈々と狙う"
mode = "hiragana"
expected = "こしたんたんとねらう"
note = "旧 とらしにらむにらむ (眈々 の 々 で眈=にらむ破損、眈眈 形は正)"

# ─── 末 = すえ (「〜の末」 文脈、 prev=の) ───
[[case]]
input = "交渉の末に妥結"
mode = "hiragana"
expected = "こうしょうのすえにだけつ"
note = "旧 まつ。 prev=の の standalone 末 → すえ"

[[case]]
input = "苦労の末に決断"
mode = "hiragana"
expected = "くろうのすえにけつだん"

# 回帰ガード: 末期/末路 は 2 字 token で 末 standalone でないため マツ 維持
