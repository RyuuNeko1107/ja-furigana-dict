# 2026-06-18 自作例文 probe round 11 (訓色名 + 色=いろ)。
# 「X色」 で 色=いろ になる訓色名のうち Lindera 未収録で しょく に化けていた分を jukugo 化。
# 山吹色/茜色/瑠璃色/紫色 等は Lindera token で既に いろ。 原色/景色/白色 は しょく/けしき。
# 複合動詞 (取り扱う/立ち振る舞い) や 気障=きざ は ja 元から正読。

[[case]]
input = "桜色の花びら"
mode = "hiragana"
expected = "さくらいろのはなびら"
note = "旧 さくらしょく"

[[case]]
input = "虹色に輝く"
mode = "hiragana"
expected = "にじいろにかがやく"
note = "旧 にじしょく"

[[case]]
input = "萌黄色の服"
mode = "hiragana"
expected = "もえぎいろのふく"
note = "旧 もえぎしょく"

[[case]]
input = "黄土色の壁"
mode = "hiragana"
expected = "おうどいろのかべ"
note = "旧 おうどしょく"

[[case]]
input = "柑子色"
mode = "hiragana"
expected = "こうじいろ"

# ─── しょく/けしき 維持ガード ───
[[case]]
input = "原色を使う"
mode = "hiragana"
expected = "げんしょくをつかう"

[[case]]
input = "景色が良い"
mode = "hiragana"
expected = "けしきがよい"

[[case]]
input = "白色矮星"
mode = "hiragana"
expected = "はくしょくわいせい"

[[case]]
input = "山吹色"
mode = "hiragana"
expected = "やまぶきいろ"
