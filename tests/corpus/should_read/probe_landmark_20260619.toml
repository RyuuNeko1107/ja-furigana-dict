# 2026-06-19 城・温泉地・山岳名 probe 由来の回帰 lock。
# 大半は ja 正読 (姫路城/松本城/竹田城/会津若松城/道後温泉/由布院/登別/洞爺湖/玉造温泉/
# 月山=がっさん/羊蹄山=ようていざん/鳥海山/槍ヶ岳/八ヶ岳/開聞岳 全正)。岳=がく/だけ 中心に補充。

[[case]]
input = "首里城"
mode = "hiragana"
expected = "しゅりじょう"
note = "首=くび に化け (くびりじょう)"

[[case]]
input = "穂高岳"
mode = "hiragana"
expected = "ほたかだけ"
note = "岳=がく + 穂高=ほだか 連濁誤"

[[case]]
input = "剱岳"
mode = "hiragana"
expected = "つるぎだけ"
note = "岳=がく に化け"

[[case]]
input = "白馬岳"
mode = "hiragana"
expected = "しろうまだけ"
note = "白馬=しろうま (はくばでない)、岳=がく"
