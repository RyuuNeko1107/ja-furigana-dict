# 2026-06-20 R278-279 例文 probe。生物/食は全成熟。温める=あたた(IPADICぬくめる固定の修正)。

[[case]]
input = "スープを温める"
mode = "hiragana"
expected = "すーぷをあたためる"
note = "温める=あたためる (default ぬくめる)"

[[case]]
input = "料理を温めて食べる"
mode = "hiragana"
expected = "りょうりをあたためてたべる"
note = "温めて=あたためて"

[[case]]
input = "温もりを感じる"
mode = "hiragana"
expected = "ぬくもりをかんじる"
note = "温もり=ぬくもり (温める修正後も保全)"

[[case]]
input = "彼は通草を採った"
mode = "hiragana"
expected = "かれはあけびをとった"
note = "通草=あけび 成熟確認"

[[case]]
input = "彼は塩梅を見る"
mode = "hiragana"
expected = "かれはあんばいをみる"
note = "塩梅=あんばい 成熟確認"
