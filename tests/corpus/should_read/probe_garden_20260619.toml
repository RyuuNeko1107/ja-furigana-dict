# 2026-06-19 庭園・観光施設・宿場町 第12弾。
# 兼六園/後楽園/通天閣/道頓堀/白川郷/合掌造り/倉敷美観地区 等は ja 正読。
# 鶴舞公園=つるま/つるまい 両義は見送り。〜宿=じゅく は宿場町固有。

[[case]]
input = "偕楽園"
mode = "hiragana"
expected = "かいらくえん"
