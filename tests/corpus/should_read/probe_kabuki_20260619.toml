expected = "かえんだいこ"
note = "太鼓=だいこ 連濁 (default たいこ)"

[[case]]
input = "黄金餅"
mode = "hiragana"
expected = "こがねもち"
note = "落語、黄金=こがね (default おうごん)"

[[case]]
input = "三人吉三"
