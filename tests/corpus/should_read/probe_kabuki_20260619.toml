# 2026-06-19 歌舞伎・落語 演目 probe。連獅子/勧進帳/菅原伝授手習鑑/鰍沢/厩火事 等は正読。
# 女形=おんながた valid、暫=1字 見送り。

[[case]]
input = "寿限無"
mode = "hiragana"
expected = "じゅげむ"
