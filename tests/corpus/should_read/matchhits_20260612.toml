# match_hits condition weighting round (2026-06-12)
#
# lib 0.1.11 の match_hits tie-break ([[match]] / [[kanji.match]] の hit condition 数を
# Score::match_hits に重み付き累積) で改善した読みの固定 + 連動 dict sweep
# (複数人/村社会/期生 等の entry 追加、 頭身/以外 の等化 match) の regression。
# 916k corpus A/B diff (217 行) の実測由来。 経緯は workspace の
# .scratch/match-hits-condition-weighting/ 参照。
#
# 注意: 「今日中/5日間/正体現した」 等の改善 case は lib 0.1.11+ (match_hits 累積)
# が前提。 lib 0.1.10 以前 + 本 dict では fail する (CI は validate のみなので影響なし)。

[meta]
schema_version = "2"
role = "corpus"
description = "match_hits tie-break round (2026-06-12): broad match 改善固定 + 連動 sweep entry"

# ─── lib match_hits tie-break による改善の固定 ─────────────────

