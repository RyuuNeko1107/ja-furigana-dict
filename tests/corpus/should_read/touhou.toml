# 東方Project キャラクター名 / 場所 / 用語の回帰テスト
#
# core/works/game/touhou.toml の登録 entries が想定通り読まれるかの lock。
# 特に **非自明な読み** (公式読みが一般読みと違うケース) を中心に網羅:
#
# - 紅 = ホン (一般 ベニ / クレナイ ではなく Chinese-style)
# - 八意 = ヤゴコロ (一般読みなし、 古典固有)
# - 龍 = メグム (飯綱丸龍 character-specific)
# - 橙 = チェン (八雲橙 character-specific)
# - 「○○の××」 のような の particle 入り読み (藤原妹紅 / 物部布都 / 蘇我屠自古 / 等)
# - 雷鼓 = ライコ (堀川雷鼓)、 駒草 = コマクサ (駒草山如) 等の character-specific
#
# 詳細は core/works/game/touhou.toml の出典 list 参照。
#
# 形式: 推奨は 1 例文 → 複数 target を [[case.targets]] で列挙する形 (1 例文で
# 多 lock、 失敗時に「どの target が外れたか」 個別に表示される)。

# ─── 主人公 (基本) ──────────────────────────────────────────────────────

[[case]]
input = "博麗霊夢"
mode = "hiragana"
expected = "はくれいれいむ"
note = "TH 主人公 1。 博麗 = ハクレイ、 霊夢 = レイム"

[[case.targets]]
surface = "博麗"
reading = "はくれい"

[[case.targets]]
surface = "霊夢"
reading = "れいむ"


[[case]]
input = "霧雨魔理沙"
mode = "hiragana"
expected = "きりさめまりさ"
note = "TH 主人公 2。 霧雨 = キリサメ"

[[case.targets]]
surface = "魔理沙"
reading = "まりさ"


