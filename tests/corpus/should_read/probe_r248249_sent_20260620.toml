# 2026-06-20 R248-249 例文 probe (文脈依存の一般語ミス)。
# 例文化により、辻褄/顛末/矜持/鬱蒼/不貞腐れ 等多数の一般語が文脈で正読と確認(成熟)。
# 文脈依存の実バグ3件のみ補足。

[[case]]
input = "歪な形の器が並んでいる"
mode = "hiragana"
expected = "いびつなかたちのうつわがならんでいる"
note = "歪な=いびつな (default ひずむな)"

[[case]]
input = "凸凹道を車でゆっくり進む"
mode = "hiragana"
expected = "でこぼこみちをくるまでゆっくりすすむ"
note = "凸凹=でこぼこ (default おうとつ)"

[[case]]
input = "彼女は嫋やかに微笑んだ"
mode = "hiragana"
expected = "かのじょはたおやかにほほえんだ"
note = "嫋やか=たおやか (二重化 たおやかやか を修正)"

[[case]]
input = "怪我の功名で新境地を開いた"
mode = "hiragana"
expected = "けがのこうみょうでしんきょうちをひらいた"
note = "成熟確認 (功名=こうみょう)"

[[case]]
input = "祭りの神輿が町内を練り歩く"
mode = "hiragana"
expected = "まつりのみこしがちょうないをねりあるく"
note = "成熟確認 (神輿=みこし)"
