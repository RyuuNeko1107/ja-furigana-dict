# 2026-06-19 相撲決まり手 probe。上手投げ/寄り切り/鯖折り/極め出し/掬い投げ 等は正読。叩き込み=たたきこみ homograph 見送り。

[[case]]
input = "河津掛け"
mode = "hiragana"
expected = "かわづがけ"
note = "掛け=がけ 連濁 (default かわづかけ)"

[[case]]
input = "居反り"
mode = "hiragana"
expected = "いぞり"
note = "居=い (default きょそり)"

[[case]]
input = "内掛け"
mode = "hiragana"
expected = "うちがけ"
note = "内=うち/掛け=がけ (default ないかけ)"

[[case]]
input = "撞木反り"
mode = "hiragana"
expected = "しゅもくぞり"
note = "反り=ぞり 連濁"
