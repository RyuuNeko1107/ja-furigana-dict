# 2026-06-19 ヒロアカ残りキャラ probe (クラス1-A/敵連合)。荼毘=だび 等は既正。

[[case]]
input = "麗日お茶子"
mode = "hiragana"
expected = "うららかおちゃこ"
note = "麗日=うららか (default れいにち)"

