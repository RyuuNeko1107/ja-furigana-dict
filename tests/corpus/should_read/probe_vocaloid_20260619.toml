# 2026-06-19 ボカロ/合成音声 probe。初音ミク/可不 等は既正。
# 神威=しんい/かもい・氷山=ひょうざん・星界=せいかい homograph は見送り。

[[case]]
input = "鏡音リン"
mode = "hiragana"
expected = "かがみねリン"
note = "鏡音=かがみね、リンはpassthrough katakana (default かがみおん)"

[[case]]
input = "巡音ルカ"
mode = "hiragana"
expected = "めぐりねルカ"
note = "巡音=めぐりね、ルカはpassthrough"

[[case]]
input = "紲星"
mode = "hiragana"
expected = "きずな"
note = "紲=きずな (default きずなせい)"

[[case]]
input = "琴葉茜"
mode = "hiragana"
expected = "ことのはあかね"
note = "琴葉=ことのは (default ことよう)"

[[case]]
input = "小春六花"
mode = "hiragana"
expected = "こはるりっか"
note = "六花=りっか (default ろくか)"
