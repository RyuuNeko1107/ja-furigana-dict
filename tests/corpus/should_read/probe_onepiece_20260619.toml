# 2026-06-19 ONE PIECE キャラ名・用語 probe。青雉=あおきじ/黄猿=きざる 等は正読。
# 黒炭=こくたん(石炭) homograph、偉大なる航路/東の海 は作品 ruby のため非採録。

[[case]]
input = "錦えもん"
mode = "hiragana"
expected = "きんえもん"
note = "錦=きん (default にしき)"

