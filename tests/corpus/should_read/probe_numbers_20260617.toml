# 2026-06-17 自作例文 probe 由来。漢数字の百/千 連濁・促音化 (bare/unit 経路)。
# lib の bare 漢数字経路は number_to_katakana を通らず個別連結で 三百→さんひゃく と誤読
# していた (アラビア 300→さんびゃく は正読)。連濁 5 数を entry 化して救済。
# やお/やち idiom は Lindera の長 token が勝つので非干渉。
# 既知の残: 三千円/八千円 は unit「千円」候補と競合して さんせんえん 止まり (lib 課題)。

[[case]]
input = "三百"
mode = "hiragana"
expected = "さんびゃく"
note = "旧 さんひゃく"

[[case]]
input = "六百"
mode = "hiragana"
expected = "ろっぴゃく"

[[case]]
input = "八百"
mode = "hiragana"
expected = "はっぴゃく"

[[case]]
input = "三千"
mode = "hiragana"
expected = "さんぜん"
note = "旧 さんせん"

[[case]]
input = "八千"
mode = "hiragana"
expected = "はっせん"

[[case]]
input = "三百円"
mode = "hiragana"
expected = "さんびゃくえん"

[[case]]
input = "八百八町"
mode = "hiragana"
expected = "はっぴゃくはちまち"

# ─── idiom 非干渉ガード ───
[[case]]
input = "八百屋"
mode = "hiragana"
expected = "やおや"
note = "八百 entry を足しても Lindera 長token で維持"

[[case]]
input = "八百万"
mode = "hiragana"
expected = "やおよろず"

[[case]]
input = "八千代"
mode = "hiragana"
expected = "やちよ"
