# 2026-06-19 homograph 例文 由来の回帰 lock。
# homograph 語 (大事/最中/人気/生物/分別) は ja が文脈で妥当な読みを選ぶ (= 成熟)、
# 実バグは 風 standalone (形容詞後 文末) と 心地 連濁 のみ。

# ─── 風 = かぜ (形容詞/の + 風 文末、 prev_ends_any に い/な 追加) ───
[[case]]
input = "心地よい風が吹く"
mode = "hiragana"
expected = "ここちよいかぜがふく"
note = "旧 ふう (強い風/涼しい風も同様、文末で次助詞無し)"

[[case]]
input = "冷たい風"
mode = "hiragana"
expected = "つめたいかぜ"

[[case]]
input = "静かな風"
mode = "hiragana"
expected = "しずかなかぜ"

# 回帰ガード: 風 compound = フウ
[[case]]
input = "台風が来る"
mode = "hiragana"
expected = "たいふうがくる"

[[case]]
input = "洋風建築"
mode = "hiragana"
expected = "ようふうけんちく"

[[case]]
input = "風船で遊ぶ"
mode = "hiragana"
expected = "ふうせんであそぶ"

# ─── 心地 = ごこち 連濁 (住み/乗り。着/居は既に正) ───
[[case]]
input = "住み心地が良い"
mode = "hiragana"
expected = "すみごこちがよい"
note = "旧 すみここち"

[[case]]
input = "乗り心地"
mode = "hiragana"
expected = "のりごこち"

# 成熟確認: homograph 語は文脈で正読
[[case]]
input = "最中を食べる"
mode = "hiragana"
expected = "もなかをたべる"
note = "和菓子の最中 (さいちゅう ではない)"

[[case]]
input = "人気のない道"
mode = "hiragana"
expected = "ひとけのないみち"
note = "にんき ではない"
