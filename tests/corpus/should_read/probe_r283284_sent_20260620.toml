# 2026-06-20 R283-284 例文 probe。body動詞/idiom/nounは文脈で大半成熟。
# 屈める=かがめ/こごめ・捲る=まくる/めくる・踵=かかと/きびす・強請り=ねだり は両読みvalid。

[[case]]
input = "曲者揃いだ"
mode = "hiragana"
expected = "くせものぞろいだ"
note = "揃い=ぞろい連濁 (default そろい)"

[[case]]
input = "彼は剣呑な雰囲気を感じた"
mode = "hiragana"
expected = "かれはけんのんなふんいきをかんじた"
note = "剣呑=けんのん 成熟確認"

[[case]]
