# 2026-06-18 自作例文 probe round 6 (当て字 副詞 / 接続詞)。
# IPADIC が音読み or repetition で化けるものを jukugo で救済。
#
# - 愈々=イヨイヨ (愈 単独が full読み いよいよ で 々 が二重化していた)
# - 尚且つ=ナオカツ / 尚更=ナオサラ (尚 default ショウ → しょうかつ)
# - 彼方此方=アチコチ (= かなたこれかた と破損)
# - 直向き=ヒタムキ (直 default ちょく → ちょくむき)
# - 就中=ナカンズク (round4 で追加済、構造整理ついでに再掲)

[[case]]
input = "愈々始まる"
mode = "hiragana"
expected = "いよいよはじまる"
note = "旧 いよいよいよいよ"

[[case]]
input = "尚且つ安い"
mode = "hiragana"
expected = "なおかつやすい"
note = "旧 しょうかつ"

[[case]]
input = "尚更だ"
mode = "hiragana"
expected = "なおさらだ"

[[case]]
input = "彼方此方探す"
mode = "hiragana"
expected = "あちこちさがす"
note = "旧 かなたこれかた"

[[case]]
input = "直向きな努力"
mode = "hiragana"
expected = "ひたむきなどりょく"
note = "旧 ちょくむき"

# ─── 既存挙動ガード (仮令/所為/案の定 は ja が元から正読) ───
[[case]]
input = "仮令失敗しても"
mode = "hiragana"
expected = "たとえしっぱいしても"

[[case]]
input = "所為で負けた"
mode = "hiragana"
expected = "せいでまけた"

[[case]]
input = "案の定だった"
mode = "hiragana"
expected = "あんのじょうだった"
