# alpha.21 round 1-11 dict 改善 regression test
#
# 各 round で fix した entry を 「次回 regression を起こさない」 ように網羅。
# 100% pass を保つ前提、 dict / lib 変更で 1 件でも落ちたら CI red になる safety net。
#
# fix の出典:
# - round 1: 使/言/見/思/終/強/持/勝/変/寝 [[kanji]] block (default + ひらがな後続)
# - round 2: 行/入/落/出 多義動詞 next_starts_any 分岐
# - round 3: 主に / 何系 / 中系 / 分系 (= 既存 unihan + Lindera band-up で覆われる)
# - round 4: 的/次 default + 挨拶句 jukugo
# - round 5: 手/力/雅/為 default + 免疫力/前年比/給料日/手術後/記念日 jukugo
# - round 6: alphabet brand (loanwords 統合)
# - round 7: 歩 助数詞 + scale+counter
# - round 8: 居 [[kanji]] + 居る/居ない jukugo + 夜中
# - round 9: 悪 / 嫌 [[kanji]]
# - round 10: 檜風呂 + 時間 specials
# - round 11: 対/全/目 default + 全く

[meta]
schema_version = "2"
role = "corpus"
description = "alpha.21 round 1-11 dict 改善 regression test"

