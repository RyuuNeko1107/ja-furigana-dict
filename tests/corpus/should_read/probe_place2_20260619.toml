# 2026-06-19 難読駅名 probe 第3-4弾 由来の回帰 lock (関東私鉄/関西/名古屋/福岡)。
# 未登録だと ノ/ヶ が literal 残留 + 漢字 default 化け。馬出 は うまだし(城郭)と
# homograph のため bare は触らず駅は固有表層で固定。

