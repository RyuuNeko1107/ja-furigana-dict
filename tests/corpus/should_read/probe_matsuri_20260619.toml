# 2026-06-19 祭・年中行事 probe 由来の回帰 lock。
# 祭=まつり/さい の suffix homograph (有名祭は まつり、文化祭/体育祭=さい は非干渉)。
# 祇園祭/葵祭/天神祭/流鏑馬=やぶさめ/山車=だし/神楽/精霊流し は ja 正読。

[[case]]
input = "時代祭"
mode = "hiragana"
expected = "じだいまつり"
note = "京都三大祭 (旧 じだいさい)"

[[case]]
input = "神田祭"
mode = "hiragana"
expected = "かんだまつり"
note = "江戸三大祭"

[[case]]
input = "三社祭"
mode = "hiragana"
expected = "さんじゃまつり"
note = "三社=さんじゃ (旧 さんしゃさい)"

[[case]]
input = "山王祭"
mode = "hiragana"
expected = "さんのうまつり"

[[case]]
input = "御柱祭"
mode = "hiragana"
expected = "おんばしらまつり"
note = "諏訪、御柱=おんばしら (旧 ごはしらさい)"

[[case]]
input = "竿燈"
mode = "hiragana"
expected = "かんとう"
note = "竿=かん。燈→灯 compat 正規化で key=竿灯 (燈 入力で確認)"

[[case]]
input = "獅子舞"
mode = "hiragana"
expected = "ししまい"
note = "舞=まい (旧 ししぶ)"

[[case]]
input = "御祓い"
mode = "hiragana"
expected = "おはらい"
note = "御=お prefix (旧 ごはらい)"
