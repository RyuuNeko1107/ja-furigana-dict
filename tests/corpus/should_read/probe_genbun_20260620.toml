# 2026-06-20 例文 probe 由来の回帰 lock。
# 雨 prefix 過剰一般化 (雨上がり=あめ)、畳語々 連濁誤 (赤裸々/虚々実々)、陰=かげ 連濁。

# ─── 雨上がり = アメアガリ (旧 アマアガリ。雨→あま 過剰一般化、標準は あめあがり) ───
[[case]]
input = "雨上がりに虹が出た"
mode = "hiragana"
expected = "あめあがりににじがでた"
note = "旧 あまあがり"

# ─── 赤裸々 = セキララ (々 展開で あかはだかばだか に破損) ───
[[case]]
input = "赤裸々に語った"
mode = "hiragana"
expected = "せきららにかたった"
note = "旧 あかはだかばだか"

# ─── 虚々実々 = キョキョジツジツ (々 2字目 連濁誤 きょぎょ) ───
[[case]]
input = "虚々実々の駆け引き"
mode = "hiragana"
expected = "きょきょじつじつのかけひき"
note = "旧 きょぎょじつじつ"

# ─── 岩陰/草陰 = カゲ (陰=イン 音読み化け。木陰/物陰/日陰 は正) ───
[[case]]
input = "岩陰に潜む"
mode = "hiragana"
expected = "いわかげにひそむ"
note = "旧 いわいん"

[[case]]
input = "草陰に隠れる"
mode = "hiragana"
expected = "くさかげにかくれる"
note = "旧 くさいん"

# ─── 高尾山 = タカオサン (山=さん suffix。default たかおやま) ───
[[case]]
input = "高尾山に登る"
mode = "hiragana"
expected = "たかおさんにのぼる"
note = "旧 たかおやま"

# ─── 金色堂 = コンジキドウ (中尊寺。金色=こんじき/堂=どう) ───
[[case]]
input = "中尊寺金色堂"
mode = "hiragana"
expected = "ちゅうそんじこんじきどう"
note = "旧 きんいろどう"

# ─── 雨樋 = アマドイ (雨=あま/樋=どい。旧 あめひ。樋 default ひ の漏れ) ───
[[case]]
input = "雨樋を掃除する"
mode = "hiragana"
expected = "あまどいをそうじする"
note = "旧 あめひ"

# ─── 小雪/大雪 = コユキ/オオユキ (日常語 dominant、節気 しょうせつ/たいせつ は minority) ───
[[case]]
input = "小雪が舞う"
mode = "hiragana"
expected = "こゆきがまう"
note = "旧 しょうせつ (節気)"

[[case]]
input = "大雪が降った"
mode = "hiragana"
expected = "おおゆきがふった"
note = "旧 たいせつ (節気)"

# ─── 雨水 = アマミズ (日常語 dominant、節気/土木 うすい は minority。R20 deferral を flip) ───
[[case]]
input = "雨水が溜まる"
mode = "hiragana"
expected = "あまみずがたまる"
note = "旧 うすい (節気)"

# ─── 小枝 = コエダ (枝=シ 音読み化け こし。枯れ枝=かれえだ は正) ───
[[case]]
input = "小枝を拾う"
mode = "hiragana"
expected = "こえだをひろう"
note = "旧 こし"

# ─── 駅名 ヶ残留/二子=ふたこ/本町=ちょう ───
[[case]]
input = "新百合ヶ丘に行く"
mode = "hiragana"
expected = "しんゆりがおかにいく"
note = "ヶ残留 (旧 しんゆりヶおか)"

[[case]]
input = "二子新地を通る"
mode = "hiragana"
expected = "ふたこしんちをとおる"
note = "二子=ふたこ (旧 にし)"

[[case]]
input = "日吉本町を歩く"
mode = "hiragana"
expected = "ひよしほんちょうをあるく"
note = "本町=ちょう (旧 ほんまち)"

# ─── 獣道=けものみち/星明かり=ほしあかり (道=どう/星=せい 化け) ───
[[case]]
input = "獣道を辿る"
mode = "hiragana"
expected = "けものみちをたどる"
note = "旧 けものどう"

[[case]]
input = "星明かりを頼る"
mode = "hiragana"
expected = "ほしあかりをたよる"
note = "旧 せいあかり"

# ─── 芦花公園=ろか/井土ヶ谷=ヶ残留+谷こく ───
[[case]]
input = "芦花公園を歩く"
mode = "hiragana"
expected = "ろかこうえんをあるく"
note = "旧 あしか"

[[case]]
input = "井土ヶ谷で降りる"
mode = "hiragana"
expected = "いどがやでおりる"
note = "ヶ残留 (旧 いどヶこく)"

# ─── 強張る=こわばる (IPADIC きょうは 固定、活用形 明示entry化) ───
[[case]]
input = "体を強張らせる"
mode = "hiragana"
expected = "からだをこわばらせる"
note = "旧 きょうはらせる"

[[case]]
input = "顔が強張った"
mode = "hiragana"
expected = "かおがこわばった"
note = "強張る=こわばる"

# ─── 煮魚=にざかな (魚=ぎょ 化け、焼き魚は正)/近所付き合い=づきあい 連濁 ───
[[case]]
input = "煮魚の定食"
mode = "hiragana"
expected = "にざかなのていしょく"
note = "旧 にぎょ"

[[case]]
input = "近所付き合いが面倒"
mode = "hiragana"
expected = "きんじょづきあいがめんどう"
note = "連濁 づきあい (旧 つきあい)"

# ─── 人徳=じんとく (人=にん 化け) ───
[[case]]
input = "彼の人徳"
mode = "hiragana"
expected = "かれのじんとく"
note = "旧 にんとく"

# ─── 喉元過ぎれば=すぎ (喉元+過ぎれば で IPADIC よぎ token 分割) ───
[[case]]
input = "喉元過ぎれば"
mode = "hiragana"
expected = "のどもとすぎれば"
note = "旧 のどもとよぎれば"

# ─── 猫の額=ひたい (idiom、額=がく 化け)/人の世=よ (世=せい 化け、の+世) ───
[[case]]
input = "猫の額ほどの庭"
mode = "hiragana"
expected = "ねこのひたいほどのにわ"
note = "旧 ねこのがく"

[[case]]
input = "人の世"
mode = "hiragana"
expected = "ひとのよ"
note = "旧 ひとのせい (世 prev=の)"

[[case]]
input = "中世の城"
mode = "hiragana"
expected = "ちゅうせいのしろ"
note = "世 ガード (2字token せい 維持)"

# ─── の+単漢字 文末訓 (next助詞ruleはあるがprev=の未カバーだった字) ───
[[case]]
input = "努力の証"
mode = "hiragana"
expected = "どりょくのあかし"
note = "証 prev=の→あかし (旧 しょう)"

[[case]]
input = "組織の要"
mode = "hiragana"
expected = "そしきのかなめ"
note = "要 prev=の→かなめ (旧 よう)"

[[case]]
input = "夜の帳が下りる"
mode = "hiragana"
expected = "よるのとばりがおりる"
note = "帳=とばり (旧 ちょう)"

[[case]]
input = "証明書を出す"
mode = "hiragana"
expected = "しょうめいしょをだす"
note = "証 ガード (2字token しょう 維持)"
