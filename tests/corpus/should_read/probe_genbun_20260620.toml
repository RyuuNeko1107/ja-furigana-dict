# 2026-06-20 例文 probe 由来の回帰 lock。
# 雨 prefix 過剰一般化 (雨上がり=あめ)、畳語々 連濁誤 (赤裸々/虚々実々)、陰=かげ 連濁。

# ─── 雨上がり = アメアガリ (旧 アマアガリ。雨→あま 過剰一般化、標準は あめあがり) ───
[[case]]
input = "雨上がりに虹が出た"
mode = "hiragana"
expected = "あめあがりににじがでた"
note = "旧 あまあがり"

# ─── 赤裸々 = セキララ (々 展開で あかはだかばだか に破損) ───
[[case]]
input = "赤裸々に語った"
mode = "hiragana"
expected = "せきららにかたった"
note = "旧 あかはだかばだか"

# ─── 虚々実々 = キョキョジツジツ (々 2字目 連濁誤 きょぎょ) ───
[[case]]
input = "虚々実々の駆け引き"
mode = "hiragana"
expected = "きょきょじつじつのかけひき"
note = "旧 きょぎょじつじつ"

# ─── 岩陰/草陰 = カゲ (陰=イン 音読み化け。木陰/物陰/日陰 は正) ───
[[case]]
input = "岩陰に潜む"
mode = "hiragana"
expected = "いわかげにひそむ"
note = "旧 いわいん"

[[case]]
input = "草陰に隠れる"
mode = "hiragana"
expected = "くさかげにかくれる"
note = "旧 くさいん"

# ─── 高尾山 = タカオサン (山=さん suffix。default たかおやま) ───
[[case]]
input = "高尾山に登る"
mode = "hiragana"
expected = "たかおさんにのぼる"
note = "旧 たかおやま"

# ─── 金色堂 = コンジキドウ (中尊寺。金色=こんじき/堂=どう) ───
[[case]]
input = "中尊寺金色堂"
mode = "hiragana"
expected = "ちゅうそんじこんじきどう"
note = "旧 きんいろどう"

# ─── 雨樋 = アマドイ (雨=あま/樋=どい。旧 あめひ。樋 default ひ の漏れ) ───
[[case]]
input = "雨樋を掃除する"
mode = "hiragana"
expected = "あまどいをそうじする"
note = "旧 あめひ"

# ─── 小雪/大雪 = コユキ/オオユキ (日常語 dominant、節気 しょうせつ/たいせつ は minority) ───
[[case]]
input = "小雪が舞う"
mode = "hiragana"
expected = "こゆきがまう"
note = "旧 しょうせつ (節気)"

[[case]]
input = "大雪が降った"
mode = "hiragana"
expected = "おおゆきがふった"
note = "旧 たいせつ (節気)"

# ─── 雨水 = アマミズ (日常語 dominant、節気/土木 うすい は minority。R20 deferral を flip) ───
[[case]]
input = "雨水が溜まる"
mode = "hiragana"
expected = "あまみずがたまる"
note = "旧 うすい (節気)"

# ─── 小枝 = コエダ (枝=シ 音読み化け こし。枯れ枝=かれえだ は正) ───
[[case]]
input = "小枝を拾う"
mode = "hiragana"
expected = "こえだをひろう"
note = "旧 こし"

