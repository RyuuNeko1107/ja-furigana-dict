# 2026-06-20 例文 probe 由来の回帰 lock。
# 雨 prefix 過剰一般化 (雨上がり=あめ)、畳語々 連濁誤 (赤裸々/虚々実々)、陰=かげ 連濁。

# ─── 雨上がり = アメアガリ (旧 アマアガリ。雨→あま 過剰一般化、標準は あめあがり) ───
[[case]]
input = "雨上がりに虹が出た"
mode = "hiragana"
expected = "あめあがりににじがでた"
note = "旧 あまあがり"

# ─── 赤裸々 = セキララ (々 展開で あかはだかばだか に破損) ───
[[case]]
input = "赤裸々に語った"
mode = "hiragana"
expected = "せきららにかたった"
note = "旧 あかはだかばだか"

# ─── 虚々実々 = キョキョジツジツ (々 2字目 連濁誤 きょぎょ) ───
[[case]]
input = "虚々実々の駆け引き"
mode = "hiragana"
expected = "きょきょじつじつのかけひき"
note = "旧 きょぎょじつじつ"

# ─── 岩陰 = イワカゲ (陰=イン 音読み化け。木陰/物陰 は正) ───
[[case]]
input = "岩陰に潜む"
mode = "hiragana"
expected = "いわかげにひそむ"
note = "旧 いわいん"
