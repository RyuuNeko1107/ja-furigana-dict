# 2026-06-18 自作例文 probe 由来。多桁数字末尾の「N日」が和語日付読み (イツカ /
# ムイカ / ナノカ / ヨウカ / ココノカ / トオカ / ハツカ) に化けるバグ修正。
#
# 「五日 = イツカ」 等は単独日付 (= 暦の 5 日 / 5 日間) のみ。 「三百六十五日 = 365 日」
# のような多桁 counter では 数字読み + ニチ (= ゴニチ) が正。 各 date-jukugo entry に
# prev_ends_any = ["十","百","千","万"] guard を追加 (= 直前 number token の末尾が
# place 文字なら音読み)。 prev_eq でなく prev_ends_any なのは数値 parser が「三百六十」
# を 1 token 化するため (= 末尾一致で「二百」「三百六十」を拾う)。
#
# 四日 / 二十日 / 十日 は「百以上」 prefix のみ音読み化:
#   - 十四日 = ジュウヨッカ / 二十四日 = ニジュウヨッカ は和語が定着 → 十 prefix では維持
#   - 二百十日 (暦) も一般 TTS では ニヒャクジュウニチ で読まれるため こちらに揃える

# ─── 多桁 counter = 音読み + ニチ ───
[[case]]
input = "三百六十五日"
mode = "hiragana"
expected = "さんびゃくろくじゅうごにち"
note = "旧 …いつか"

[[case]]
input = "二百六日"
mode = "hiragana"
expected = "にひゃくろくにち"
note = "旧 …むいか"

[[case]]
input = "三十七日"
mode = "hiragana"
expected = "さんじゅうしちにち"
note = "旧 …なのか"

[[case]]
input = "五十八日"
mode = "hiragana"
expected = "ごじゅうはちにち"
note = "旧 …ようか"

[[case]]
input = "九十九日"
mode = "hiragana"
expected = "きゅうじゅうくにち"
note = "旧 …ここのか"

[[case]]
input = "十五日"
mode = "hiragana"
expected = "じゅうごにち"

[[case]]
input = "百五日"
mode = "hiragana"
expected = "ひゃくごにち"

[[case]]
input = "十三日"
mode = "hiragana"
expected = "じゅうさんにち"

[[case]]
input = "百二日"
mode = "hiragana"
expected = "ひゃくににち"

[[case]]
input = "百四日"
mode = "hiragana"
expected = "ひゃくよんにち"
note = "百以上 prefix の四日は ヨンニチ"

[[case]]
input = "百二十日"
mode = "hiragana"
expected = "ひゃくにじゅうにち"
note = "ハツカ にしない"

[[case]]
input = "二百十日"
mode = "hiragana"
expected = "にひゃくじゅうにち"
note = "暦 にひゃくとおか ではなく一般 TTS 読み"

[[case]]
input = "百十日"
mode = "hiragana"
expected = "ひゃくじゅうにち"

# ─── 単独日付 / 十 prefix の和語読みは維持 (非干渉ガード) ───
[[case]]
input = "五日"
mode = "hiragana"
expected = "いつか"

[[case]]
input = "二十日"
mode = "hiragana"
expected = "はつか"

[[case]]
input = "四日"
mode = "hiragana"
expected = "よっか"

[[case]]
input = "十日"
mode = "hiragana"
expected = "とおか"

[[case]]
input = "十四日"
mode = "hiragana"
expected = "じゅうよっか"
note = "十 prefix の四日は ヨッカ 維持"

[[case]]
input = "二十四日"
mode = "hiragana"
expected = "にじゅうよっか"

[[case]]
input = "六月五日"
mode = "hiragana"
expected = "ろくがついつか"
note = "日付文脈の五日は イツカ 維持"
