# 2026-06-18 自作例文 probe round 3 (prev=の 文脈 homograph)。
#
# - 葉: default ヨウ。 文末で「の葉」 (公孫樹の葉/桜の葉) が default ヨウ に化けるため
#       prev_eq="の"→は を追加 (既存の next 助詞→は と併せ end-of-string を網羅)。
#       葉緑素/紅葉/落葉 等の音読み熟語は維持。
# - 一途: default イチズ (一途な/一途に)。 「〜の一途 (をたどる)」 は prev_eq="の"→イット。

# ─── 葉 (prev=の → は) ───
[[case]]
input = "公孫樹の葉"
mode = "hiragana"
expected = "いちょうのは"
note = "旧 …のよう"

[[case]]
input = "葉が緑だ"
mode = "hiragana"
expected = "はがみどりだ"

[[case]]
input = "葉緑素"
mode = "hiragana"
expected = "ようりょくそ"
note = "音読み熟語ガード"

[[case]]
input = "落葉を掃く"
mode = "hiragana"
expected = "らくようをはく"

# ─── 一途 (prev=の → イット) ───
[[case]]
input = "凋落の一途"
mode = "hiragana"
expected = "ちょうらくのいっと"
note = "旧 いちず"

[[case]]
input = "悪化の一途をたどる"
mode = "hiragana"
expected = "あっかのいっとをたどる"

[[case]]
input = "一途な思い"
mode = "hiragana"
expected = "いちずなおもい"
note = "イチズ 維持ガード"

[[case]]
input = "一途に信じる"
mode = "hiragana"
expected = "いちずにしんじる"
