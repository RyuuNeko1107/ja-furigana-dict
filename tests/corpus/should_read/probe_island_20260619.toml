# 2026-06-19 離島・島名 probe 由来の回帰 lock。
# 西表島=いりおもてじま/小豆島=しょうどしま/波照間島/志賀島=しかのしま/厳島=いつくしま 等は ja 正読。
# 天草=あまくさ/てんぐさ(食材)は homograph で default 委ね。

[[case]]
input = "軍艦島"
mode = "hiragana"
expected = "ぐんかんじま"
note = "島=じま 連濁 (旧 ぐんかんしま)"

[[case]]
input = "初島"
mode = "hiragana"
expected = "はつしま"
note = "熱海沖 (連濁誤 はつじま)"

[[case]]
input = "能古島"
mode = "hiragana"
expected = "のこのしま"
note = "島=のしま (旧 のことう)"
