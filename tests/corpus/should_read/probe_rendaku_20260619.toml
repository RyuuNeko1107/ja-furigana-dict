# 2026-06-19 連濁 複合語 例文 由来の回帰 lock。
# 連濁 (声=ごえ/話=ばなし/紙=がみ/手=て/丼=どん/寿司=ずし) は ja 大半正、
# 兄弟語が Lindera token 化差で漏れた語のみ補充。

# ─── 話 = ばなし (無駄話、 作り話/昔話は正) ───
[[case]]
input = "無駄話をする"
mode = "hiragana"
expected = "むだばなしをする"
note = "旧 むだはなし"

# ─── 寿司 = ずし (手巻き/巻き/棒、 握り/稲荷/押し/ちらしは正) ───
[[case]]
input = "手巻き寿司"
mode = "hiragana"
expected = "てまきずし"
note = "旧 てまきすし"

[[case]]
input = "巻き寿司"
mode = "hiragana"
expected = "まきずし"

[[case]]
input = "棒寿司"
mode = "hiragana"
expected = "ぼうずし"

# ─── 裏 = うら (路地裏/天井裏、 裏=リ音に化けてた。屋根裏/舞台裏は正) ───
[[case]]
input = "路地裏の店"
mode = "hiragana"
expected = "ろじうらのみせ"
note = "旧 ろじり"

[[case]]
input = "天井裏に潜む"
mode = "hiragana"
expected = "てんじょううらにひそむ"
note = "旧 てんじょうり"

# 回帰ガード: 裏=リ compound は維持
[[case]]
input = "裏面に記載"
mode = "hiragana"
expected = "りめんにきさい"

[[case]]
input = "握り寿司を食べる"
mode = "hiragana"
expected = "にぎりずしをたべる"
