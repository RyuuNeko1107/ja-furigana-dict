# 2026-06-19 数字+助数詞 例文 由来の回帰 lock。
# 巻/票 を simple.toml → objects.toml の counter rule に移動 (促音/連濁 promotion 追加)。

# ─── 巻 = カン (1/6/8/10 促音) ───
[[case]]
input = "一巻の終わり"
mode = "hiragana"
expected = "いっかんのおわり"
note = "旧 いちかん"

[[case]]
input = "六巻まで読む"
mode = "hiragana"
expected = "ろっかんまでよむ"
note = "旧 ろくかん"

[[case]]
input = "漫画を三巻"
mode = "hiragana"
expected = "まんがをさんかん"

# ─── 票 = ヒョウ (1/6/8/10 促音+半濁ピョウ、3 連濁ビョウ) ───
[[case]]
input = "一票投じる"
mode = "hiragana"
expected = "いっぴょうとうじる"
note = "旧 いちひょう"

[[case]]
input = "三票差で勝つ"
mode = "hiragana"
expected = "さんびょうさでかつ"
note = "旧 さんひょう"

# 回帰ガード: counter でない 巻/票 = 維持
[[case]]
input = "圧巻の演技"
mode = "hiragana"
expected = "あっかんのえんぎ"

[[case]]
input = "伝票を整理"
mode = "hiragana"
expected = "でんぴょうをせいり"

[[case]]
input = "春巻きを揚げる"
mode = "hiragana"
expected = "はるまきをあげる"
