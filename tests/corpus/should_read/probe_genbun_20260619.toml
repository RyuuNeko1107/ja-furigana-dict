# ─── 祭囃子 = まつりばやし (祭 訓 + 連濁) ───
[[case]]
input = "祭囃子が聞こえる"
mode = "hiragana"
expected = "まつりばやしがきこえる"
note = "旧 さいはやし (祭=サイ 音読み + 連濁抜け)"

# ─── 乱高下 = らんこうげ (下 呉音 ゲ) ───
[[case]]
