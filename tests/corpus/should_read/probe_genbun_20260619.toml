mode = "hiragana"
expected = "かわせがらんこうげする"
note = "旧 らんこうか"

# ─── 中小企業 = ちゅうしょう (「の」 文脈で 中→ナカ 割れ防止) ───
[[case]]
input = "東大阪の中小企業"
mode = "hiragana"
expected = "ひがしおおさかのちゅうしょうきぎょう"
note = "旧 なかしょう。 単独は正だが prev=の で 中 kanji block が default ナカ に割る → band1000 jukugo で固定"

[[case]]
input = "地域の中小企業"
mode = "hiragana"
expected = "ちいきのちゅうしょうきぎょう"

# ─── 斑鳩 = いかるが (奈良の地名、 が 脱落防止) ───
[[case]]
input = "斑鳩の里"
mode = "hiragana"
expected = "いかるがのさと"
note = "旧 いかる。 斑鳩町 は正だが単体で が 脱落"

[[case]]
