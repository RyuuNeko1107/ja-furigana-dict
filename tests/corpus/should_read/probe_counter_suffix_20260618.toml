# 2026-06-18 自作例文 probe round 20 (序数/分 系)。
#
# - 一番目=いちばんめ (二番目以降は counter で ばんめ だが 一番目 だけ
#   一番(Lindera いちばん)+目もく に化けていた)。
# - 八分目=はちぶんめ (腹八分目。分 を時刻 はっぷん と誤読していた)。
#
# 分 の多義は既知の難問: time.toml [counter."分"] は意図的 kanji_numeral=false
# (充分/五分/三分の一 の競合回避、別タスク)。本 round は固定熟語のみ救済。
# 五分五分=ごぶ / 七分袖=しちぶ / 百分の一=ひゃくぶん / 五分刈り=ごぶ は ja 正読。

[[case]]
input = "一番目に並ぶ"
mode = "hiragana"
expected = "いちばんめにならぶ"
note = "旧 いちばんもく"

[[case]]
input = "二番目の人"
mode = "hiragana"
expected = "にばんめのひと"

[[case]]
input = "腹八分目"
mode = "hiragana"
expected = "はらはちぶんめ"
note = "旧 はらはっぷんめ"

[[case]]
input = "八分目まで"
mode = "hiragana"
expected = "はちぶんめまで"

# ─── ja 正読ガード ───
[[case]]
input = "五分五分の勝負"
mode = "hiragana"
expected = "ごぶごぶのしょうぶ"

[[case]]
input = "七分袖のシャツ"
mode = "hiragana"
expected = "しちぶそでのシャツ"

[[case]]
input = "百分の一"
mode = "hiragana"
expected = "ひゃくぶんのいち"
