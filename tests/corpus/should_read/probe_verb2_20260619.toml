# 2026-06-19 難読動詞 round 2。大半 ja 成熟・homograph (託ける=かこつける/ことづける、
# 歪む=ゆがむ/ひずむ) or 非標準漢字 (踠く/苛つく/噛り付く) で見送り。
# 実バグは 燻ぶる の full-reading 二重化のみ (unihan 燻=くすべる→くす stem 化)。

[[case]]
input = "燻ぶる"
mode = "hiragana"
expected = "くすぶる"
note = "unihan 燻=くすべる で くすべるぶる 二重化 → 燻=くす stem 化"

[[case]]
input = "燻ぶり"
mode = "hiragana"
expected = "くすぶり"

[[case]]
input = "燻製"
mode = "hiragana"
expected = "くんせい"
note = "stem 化で非干渉の確認"
