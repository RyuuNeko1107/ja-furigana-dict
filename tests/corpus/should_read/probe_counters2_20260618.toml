# 2026-06-18 自作例文 probe round 9 (数字+助数詞 counter 第2弾)。
# 漢数字 bare で促音/連濁/読みが抜けていた助数詞を objects.toml に追加 (kanji_numeral)。
# 束/張/棹/石 は 訓/音 が文脈で衝突する (一束=ひとたば/いっそく 等) ため不採用。
# 尾 (いちび) は既に正読。

# ─── 桁 (1/2 和語、6/8/10 促音) ───
[[case]]
input = "六桁"
mode = "hiragana"
expected = "ろっけた"
note = "旧 ろくけた"

[[case]]
input = "一桁"
mode = "hiragana"
expected = "ひとけた"
note = "和語維持ガード"

# ─── 客 / 脚 (1/6/8/10 促音) ───
[[case]]
input = "六客"
mode = "hiragana"
expected = "ろっきゃく"
note = "旧 ろくきゃく"

[[case]]
input = "一脚の椅子"
mode = "hiragana"
expected = "いっきゃくのいす"
note = "旧 いちきゃく"

[[case]]
input = "三脚"
mode = "hiragana"
expected = "さんきゃく"

# ─── 棟 (1/8/10 促音) ───
[[case]]
input = "一棟"
mode = "hiragana"
expected = "いっとう"
note = "旧 いちとう"

[[case]]
input = "六棟"
mode = "hiragana"
expected = "ろくとう"

# ─── 帖 (ジョウ) ───
[[case]]
input = "三帖の部屋"
mode = "hiragana"
expected = "さんじょうのへや"
note = "旧 さんちょう"

# ─── 反 (タン、1/8/10 促音) ───
[[case]]
input = "三反の土地"
mode = "hiragana"
expected = "さんたんのとち"
note = "旧 さんはん (田=た/でん は別件で本 case では避ける)"

[[case]]
input = "違反する"
mode = "hiragana"
expected = "いはんする"
note = "数字でないので counter 非発火ガード"

# ─── 貫 (1/6/8/10 促音) ───
[[case]]
input = "六貫"
mode = "hiragana"
expected = "ろっかん"
note = "旧 ろくかん"

[[case]]
input = "一貫した姿勢"
mode = "hiragana"
expected = "いっかんしたしせい"
note = "一貫性も いっかん で同じ"

# ─── 片 (1/6/8/10 促音+ペン、3 ペン) ───
[[case]]
input = "三片"
mode = "hiragana"
expected = "さんぺん"
note = "旧 さんへん"

[[case]]
input = "六片"
mode = "hiragana"
expected = "ろっぺん"

# ─── 斗 (1/8/10 促音) ───
[[case]]
input = "一斗缶"
mode = "hiragana"
expected = "いっとかん"
note = "旧 いちとかん"
