# === 助詞混在 =============================================================

[[case]]
input = "猫が好き"
mode = "hiragana"
expected = "ねこがすき"
note = "助詞 が、 標準助詞"

[[case]]
input = "本を読む"
mode = "hiragana"
expected = "ほんおよむ"
note = "助詞 を → お (= 読み上げ向け、 UniDic 経路で自動的に発音形 オ に展開)"

[[case]]
input = "私は学生です"
mode = "hiragana"
expected = "わたしわがくせいです"
note = "助詞 は → わ (= 読み上げ向け、 UniDic 経路で自動的に発音形 ワ に展開、 IPADIC では「は」 のまま fail する)"

[[case]]
input = "明日学校へ行く"
mode = "hiragana"
expected = "あしたがっこうえいく"
note = "助詞 へ → え (= 読み上げ向け、 UniDic 経路、 IPADIC では「へ」 のまま fail)"

[[case]]
input = "犬と遊ぶ"
mode = "hiragana"
expected = "いぬとあそぶ"
note = "助詞 と"

[[case]]
input = "東京の駅"
mode = "hiragana"
expected = "とうきょうのえき"
note = "助詞 の、 固有名詞"

# === 自然文 (記事 / Web text 想定) ========================================

[[case]]
input = "今日は晴れです"
mode = "hiragana"
expected = "きょうわはれです"
note = "今日=キョウ jukugo + 助詞 は → わ (読み上げ向け)"

[[case]]
input = "明日は雨が降る"
mode = "hiragana"
expected = "あすわあめがふる"
note = "明日=アス + 助詞 は → わ"

[[case]]
input = "猫が魚を食べた"
mode = "hiragana"
expected = "ねこがさかなおたべた"
note = "助詞混在 + 動詞過去"

[[case]]
input = "新しい技術が登場した"
mode = "hiragana"
expected = "あたらしいぎじゅつがとうじょうした"
note = "形容詞 + 名詞 + 助詞 + サ変動詞"

[[case]]
input = "東京駅で待ち合わせをした"
mode = "hiragana"
expected = "とうきょうえきでまちあわせおした"
note = "固有名詞 + 助詞 で + 複合動詞"

[[case]]
input = "明日会議があります"
mode = "hiragana"
expected = "あすかいぎがあります"
note = "明日 + 会議 jukugo + 助詞 + 動詞"

[[case]]
input = "毎日コーヒーを飲む"
mode = "hiragana"
expected = "まいにちコーヒーおのむ"
note = "毎日 jukugo + カタカナ surface + 助詞 + 動詞"

[[case]]
input = "週末は休みです"
mode = "hiragana"
expected = "しゅうまつわやすみです"
note = "週末 jukugo + 助詞 は → わ"

[[case]]
input = "彼は学校の先生だ"
mode = "hiragana"
expected = "かれわがっこうのせんせいだ"
note = "彼=カレ + 助詞 は → わ + 学校 + の + 先生 jukugo"

[[case]]
input = "私の本が机の上にある"
mode = "hiragana"
expected = "わたしのほんがつくえのうえにある"
note = "助詞重ね + 上 = うえ (kun)"

