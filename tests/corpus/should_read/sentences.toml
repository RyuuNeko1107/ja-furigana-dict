# === 助詞混在 =============================================================

[[case]]
input = "猫が好き"
mode = "hiragana"
expected = "ねこがすき"
note = "助詞 が、 標準助詞"

[[case]]
input = "本を読む"
mode = "hiragana"
expected = "ほんをよむ"
note = "助詞 を、 動詞"

[[case]]
input = "私は学生です"
mode = "hiragana"
expected = "わたしはがくせいです"
note = "助詞 は、 「は」 は ハ のまま (= 表記読み)、 UniDic 発音 ワ ではない"

[[case]]
input = "明日学校へ行く"
mode = "hiragana"
expected = "あしたがっこうへいく"
note = "助詞 へ、 「へ」 は ヘ のまま"

[[case]]
input = "犬と遊ぶ"
mode = "hiragana"
expected = "いぬとあそぶ"
note = "助詞 と"

[[case]]
input = "東京の駅"
mode = "hiragana"
expected = "とうきょうのえき"
note = "助詞 の、 固有名詞"

# === 自然文 (記事 / Web text 想定) ========================================

[[case]]
input = "今日は晴れです"
mode = "hiragana"
expected = "きょうははれです"
note = "今日=キョウ jukugo、 助詞 は"

[[case]]
input = "明日は雨が降る"
mode = "hiragana"
expected = "あすはあめがふる"
note = "明日=アス、 動詞 降る"

[[case]]
input = "猫が魚を食べた"
mode = "hiragana"
expected = "ねこがさかなをたべた"
note = "助詞混在 + 動詞過去"

[[case]]
input = "新しい技術が登場した"
mode = "hiragana"
expected = "あたらしいぎじゅつがとうじょうした"
note = "形容詞 + 名詞 + 助詞 + サ変動詞"

[[case]]
input = "東京駅で待ち合わせをした"
mode = "hiragana"
expected = "とうきょうえきでまちあわせをした"
note = "固有名詞 + 助詞 で + 複合動詞"

[[case]]
input = "明日会議があります"
mode = "hiragana"
expected = "あすかいぎがあります"
note = "明日 + 会議 jukugo + 助詞 + 動詞"

[[case]]
input = "毎日コーヒーを飲む"
mode = "hiragana"
expected = "まいにちコーヒーをのむ"
note = "毎日 jukugo + カタカナ surface + 助詞 + 動詞"

[[case]]
input = "週末は休みです"
mode = "hiragana"
expected = "しゅうまつはやすみです"
note = "週末 jukugo + 助詞 + 形容名詞"

[[case]]
input = "彼は学校の先生だ"
mode = "hiragana"
expected = "かれはがっこうのせんせいだ"
note = "彼=カレ + 助詞 + 学校 + の + 先生 jukugo"

[[case]]
input = "私の本が机の上にある"
mode = "hiragana"
expected = "わたしのほんがつくえのうえにある"
note = "助詞重ね + 上 = うえ (kun)"

