# 自然文の回帰 corpus (★alpha.17 で新設、 形態素辞書比較用)
#
# 既存 should_read.toml が **熟語 / 固有名詞中心** なのに対し、 本 file は
# **文章 / 動詞活用 / 助詞 / 口語** 等を含む 「実際の入力に近い」 case を集める。
#
# 用途:
# - 形態素辞書 (IPADIC / UniDic) の比較で得意領域 / 苦手領域を観察
# - Lindera fallback (band 50) の精度を測る (= dict 未登録部分のカバレッジ)
# - 口語 / SNS / 会話文への対応度を測る
#
# 期待 reading は **読み上げ向け (= 発音)**:
# - 漢字 → 表記読み (ガッコウ、 ジョウズ、 等)
# - 助詞 は → わ (= 「私は学生」 → 「わたしわがくせい」)
# - 助詞 へ → え (= 「学校へ」 → 「がっこうえ」)
# - 助詞 を → お (= 「本を読む」 → 「ほんおよむ」)
# - 長音 (= UniDic 発音形 「ガッコー」 等) は normalize で 表記読み 「ガッコウ」 に変換済
#
# 「ルビ振り (ruby mode)」 では surface 維持なので、 「私は学生」 → 「{私|わたし}は{学生|がくせい}」
# のように 「は」 は そのまま保持される (= 別 corpus / test で確認)。

# === 動詞 + okurigana ====================================================

[[case]]
input = "食べる"
mode = "hiragana"
expected = "たべる"
note = "標準動詞"

[[case]]
input = "食べた"
mode = "hiragana"
expected = "たべた"
note = "過去形"

[[case]]
input = "食べました"
mode = "hiragana"
expected = "たべました"
note = "丁寧過去"

[[case]]
input = "走り出した"
mode = "hiragana"
expected = "はしりだした"
note = "複合動詞"

[[case]]
input = "読み終わる"
mode = "hiragana"
expected = "よみおわる"
note = "複合動詞"

[[case]]
input = "考えている"
mode = "hiragana"
expected = "かんがえている"
note = "進行形"

[[case]]
input = "行かない"
mode = "hiragana"
expected = "いかない"
note = "否定形"

[[case]]
input = "来た"
mode = "hiragana"
expected = "きた"
note = "カ変動詞 (来る) の活用"

[[case]]
input = "した"
mode = "hiragana"
expected = "した"
note = "サ変動詞 (する) の活用、 既に kana surface"

