mode = "hiragana"
expected = "うつくしいはな"
note = "イ形容詞 + 名詞"

[[case]]
input = "楽しかった"
mode = "hiragana"
expected = "たのしかった"
note = "イ形容詞過去形"

[[case]]
input = "静かな夜"
mode = "hiragana"
expected = "しずかなよる"
note = "ナ形容詞"

[[case]]
input = "便利だ"
mode = "hiragana"
expected = "べんりだ"
