# 2026-06-18 自作例文 probe round 17 (実=み/じつ の prev/next 整理)。
# 既存 next_starts_any に「の」 が入っていて 実の所→みのところ (誤) になり、
# 逆に 桑の実 (実 が文末) は拾えず じつ に化けていた。
# → next から「の」 除外 + prev_eq="の"→み 追加で両方修正。
#
# 動植物/食材名 (鰯/鯖/鰤/烏賊/牡蠣/椎茸/舞茸/占地=しめじ/生姜/山葵/辣韮) は ja 正読。

# ─── の の後の 実 = み (果実) ───
[[case]]
input = "山椒の実"
mode = "hiragana"
expected = "さんしょうのみ"
note = "旧 さんしょうのじつ"

[[case]]
input = "桑の実"
mode = "hiragana"
expected = "くわのみ"

[[case]]
input = "栗の実"
mode = "hiragana"
expected = "くりのみ"

# ─── 実+助詞 = み ───
[[case]]
input = "実が成る"
mode = "hiragana"
expected = "みがなる"

# ─── 実の親/実の所 = じつ (next の 除外で修正) ───
[[case]]
input = "実の所"
mode = "hiragana"
expected = "じつのところ"
note = "旧 みのところ"

[[case]]
input = "実の親"
mode = "hiragana"
expected = "じつのおや"

# ─── じつ 維持ガード ───
[[case]]
input = "実力を出す"
mode = "hiragana"
expected = "じつりょくをだす"

[[case]]
input = "実は違う"
mode = "hiragana"
expected = "じつはちがう"
