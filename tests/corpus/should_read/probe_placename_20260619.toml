# 2026-06-19 地名/固有名詞 例文 由来の回帰 lock。
# 難読地名は ja 大半正読 (喜連瓜破/立売堀/杭全/柴島/中百舌鳥/京終/櫟本/榛原/曽爾/
# 安乗/波切)。homograph 地名 (放出=ほうしゅつ/十三=じゅうさん) は一般読み支配で見送り。

# ─── 湖 = コ (漢字+湖 の湖名 suffix。 単独 湖=みずうみ は維持) ───
[[case]]
input = "青蓮寺湖"
mode = "hiragana"
expected = "しょうれんじこ"
note = "旧 しょうれんじみずうみ。prev=漢字→コ"

[[case]]
input = "人造湖の周り"
mode = "hiragana"
expected = "じんぞうこのまわり"

[[case]]
input = "美しい湖"
mode = "hiragana"
expected = "うつくしいみずうみ"
note = "単独/形容詞後 は みずうみ 維持"

# ─── 三輪 = みわ (奈良。 三輪車=さんりん は別) ───
[[case]]
input = "三輪明神に参る"
mode = "hiragana"
expected = "みわみょうじんにまいる"
note = "旧 さんりん"

[[case]]
input = "三輪車に乗る"
mode = "hiragana"
expected = "さんりんしゃにのる"
note = "ガード: 乗り物は さんりん"

# ─── 斎宮跡 = さいくうあと (旧 いつきせき 破損) ───
[[case]]
input = "斎宮跡を訪ねる"
mode = "hiragana"
expected = "さいくうあとをたずねる"
