# 2026-06-19 難読駅名 第7弾 (近鉄/南海/名鉄)。ノ/ヶ残留 + 難読音訓。
# 衣摺加美北/帝塚山/菖蒲池=あやめいけ/賢島=かしこじま/五十鈴川 等は ja 正読。
# 富貴=ふうき(一般語)は homograph で default 委ね。

[[case]]
input = "八戸ノ里"
mode = "hiragana"
expected = "やえのさと"
note = "八戸=やえ難読 + ノ残留 (はちのへでない)"

[[case]]
input = "枚岡"
mode = "hiragana"
expected = "ひらおか"
note = "枚=ひら (旧 まいおか)"

[[case]]
input = "萩ノ茶屋"
mode = "hiragana"
expected = "はぎのちゃや"
note = "ノ残留"

[[case]]
input = "尼ヶ辻"
mode = "hiragana"
expected = "あまがつじ"
note = "ヶ残留"

[[case]]
input = "久宝寺口"
mode = "hiragana"
expected = "きゅうほうじぐち"
note = "口=ぐち 連濁 (旧 こう)"

[[case]]
input = "蒲郡"
mode = "hiragana"
expected = "がまごおり"
note = "蒲=がま/郡=ごおり (全壊 ほぐん)"
