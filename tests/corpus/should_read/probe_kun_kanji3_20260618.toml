# 2026-06-18 自作例文 probe round 5 (単漢字訓 文末 / 送り仮名)。
#
# - 指: default シ + 既存 match (指す→さ / 本指→ゆび / の+指→ゆび / 助詞→ゆび)。
#       「細い指/長い指/嫋やかな指」 (= 形容詞活用語尾 い/な の後で 指 が文末) が
#       default シ に化けるため prev_ends_any を ["の","い","な"] に拡張。
# - 厳: default ゲン。 「厳めしい=いかめしい」 を next_starts_any=["め"]→いか で追加
#       (厳か=おごそか は Lindera token、 厳格/威厳/厳しい は維持)。

# ─── 指 (形容詞+指 文末) ───
[[case]]
input = "細い指"
mode = "hiragana"
expected = "ほそいゆび"
note = "旧 ほそいし"

[[case]]
input = "長い指"
mode = "hiragana"
expected = "ながいゆび"

[[case]]
input = "指示を出す"
mode = "hiragana"
expected = "しじをだす"
note = "シ 音熟語ガード"

[[case]]
input = "親指を立てる"
mode = "hiragana"
expected = "おやゆびをたてる"

# ─── 厳めしい ───
[[case]]
input = "厳めしい門構え"
mode = "hiragana"
expected = "いかめしいもんがまえ"
note = "旧 げんめしい"

[[case]]
input = "厳かな式典"
mode = "hiragana"
expected = "おごそかなしきてん"
note = "おごそか ガード"

[[case]]
input = "厳格な父"
mode = "hiragana"
expected = "げんかくなちち"
note = "ゲン ガード"
