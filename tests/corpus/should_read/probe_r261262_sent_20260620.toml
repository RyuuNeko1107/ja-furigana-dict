# 2026-06-20 R261-262 proper noun 例文 probe。地名/キャラは文脈で大半成熟。

[[case]]
input = "京都の先斗町を歩く"
mode = "hiragana"
expected = "きょうとのぽんとちょうをあるく"
note = "先斗町=ぽんとちょう (町=ちょう、先斗=ぽんとは既正)"

[[case]]
input = "彼は冬月コウゾウと話す"
mode = "hiragana"
expected = "かれはふゆつきコウゾウとはなす"
note = "冬月=ふゆつき (default ふゆげつ)"

[[case]]
input = "彼は石廊崎まで車で行った"
mode = "hiragana"
expected = "かれはいろうざきまでくるまでいった"
note = "石廊崎=いろうざき 成熟確認"

[[case]]
input = "彼は両儀式と対峙した"
mode = "hiragana"
expected = "かれはりょうぎしきとたいじした"
note = "両儀式=りょうぎしき 成熟確認"
