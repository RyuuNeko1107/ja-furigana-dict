expected = "じゅうぶんなじゅんびでじゅっぷんまったのち、じゅっぷんかんのきゅうけいをとった"
note = "「十分」default ジュウブン、時間文脈 ジュップン、「十分間」固定 numeric_phrases"

[[case]]
input = "仲人の仲介で結婚式、素人と玄人の差は大きい"
