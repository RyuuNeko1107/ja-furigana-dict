# 「読めるはず」の期待値スナップショット
#
# 辞書 + ルールが揃っていれば必ず正解になる入力。これが壊れたら何かを失った。
# 現状の ja-furigana-dict (alpha.1 同梱 seed: unihan 43k / jukugo 605 / compat 436)
# 相当を前提にしている。

# ---------------------------------------------------------------------------
# 一般熟語: jukugo/general.toml で hit するもの
# ---------------------------------------------------------------------------

[[case]]
input = "灰桜"
mode = "hiragana"
expected = "はいざくら"
note = "桜の品種名 (淡灰色の桜)、辞書 hit"

[[case]]
input = "黎明"
mode = "hiragana"
expected = "れいめい"
note = "夜明け、辞書 hit"

[[case]]
input = "曙光"
mode = "hiragana"
expected = "しょこう"
note = "夜明けの光、辞書 hit"

[[case]]
input = "灰桜の散る道"
mode = "ruby"
expected = "{灰桜|はいざくら}の{散る|ちる}{道|みち}"
note = "辞書 hit + Lindera で動詞 / 単漢字"

# ---------------------------------------------------------------------------
# 四字熟語
# ---------------------------------------------------------------------------

[[case]]
input = "一期一会"
mode = "hiragana"
expected = "いちごいちえ"
note = "四字熟語、yomi 連声"

[[case]]
input = "四面楚歌"
mode = "hiragana"
expected = "しめんそか"

# ---------------------------------------------------------------------------
# 地名 (固有名詞)
# ---------------------------------------------------------------------------

[[case]]
input = "北海道"
mode = "hiragana"
expected = "ほっかいどう"

[[case]]
input = "秋葉原"
mode = "hiragana"
expected = "あきはばら"
note = "Lindera default だと あきばはら になりがちだが、辞書で固定"

[[case]]
input = "吉祥寺"
mode = "hiragana"
expected = "きちじょうじ"

# ---------------------------------------------------------------------------
# 文脈ルール (rules/context/*.toml)
# ---------------------------------------------------------------------------

[[case]]
input = "今日"
mode = "hiragana"
expected = "きょう"
note = "default は きょう、文脈で こんにち も有効"

[[case]]
input = "明日"
mode = "hiragana"
expected = "あした"

# ---------------------------------------------------------------------------
# 数値 + 助数詞 (rules/counters/*.toml)
# ---------------------------------------------------------------------------

[[case]]
input = "3冊"
mode = "hiragana"
expected = "さんさつ"
note = "数値 + 冊 → 連濁ルール"

[[case]]
input = "5匹"
mode = "hiragana"
expected = "ごひき"

[[case]]
input = "1本"
mode = "hiragana"
expected = "いっぽん"
note = "1 + 本 で促音 + 半濁"

# ---------------------------------------------------------------------------
# SI 単位 (rules/si_units.toml)
# ---------------------------------------------------------------------------

[[case]]
input = "5km"
mode = "hiragana"
expected = "ごきろめーとる"

[[case]]
input = "5KM"
mode = "hiragana"
expected = "ごきろめーとる"
note = "case-insensitive lookup、alpha.1 で fix"

[[case]]
input = "3GB"
mode = "hiragana"
expected = "さんぎがばいと"

# ---------------------------------------------------------------------------
# TTS 整形
# ---------------------------------------------------------------------------

[[case]]
input = "こんにちは。さようなら。"
mode = "tts"
expected = "こんにちは、、さようなら。"
note = "句点を読点 2 つで pause 化、最後の。は残す"

# ---------------------------------------------------------------------------
# ローマ字 (alpha.2 で追加)
# ---------------------------------------------------------------------------

[[case]]
input = "灰桜"
mode = "romaji"
expected = "haizakura"
note = "ヘボン式 default"

[[case]]
input = "ちょっと"
mode = "romaji"
expected = "chotto"
note = "促音 + ち系のヘボン式"

[[case]]
input = "新橋"
mode = "romaji"
expected = "shimbashi"
note = "ヘボン式 ん + b で m"
