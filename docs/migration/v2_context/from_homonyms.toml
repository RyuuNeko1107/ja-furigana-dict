# 機械変換: rules/context/homonyms.toml → entry inline match
#
# 各 [entries."X"] block を **既存 core/jukugo/ の対応 surface entry に
# merge** するか、 surface 不在なら新規 entry として配置する。
# 本 file は staging area、 lib は load しない (= role 不明)。

[meta]
schema_version = "2"
role = "migrated_context"  # 仮 role、 実 merge 時に削除
description = "rules/context migration の staging output (review 用、 lib loader 対象外)"

# TODO: default 不在 (旧 rule)、 POS-only match の reading='ジョウズ' を default 採用 (POS='名詞'/'形容詞')
# TODO: 既存 entry: core/jukugo/basic/general.toml に merge 要
[entries."上手"]
reading = "ジョウズ"
# TODO: POS-only match dropped (reading='ジョウズ', 原条件 pos='名詞')、 literal 列挙で代用要
# TODO: POS-only match dropped (reading='ジョウズ', 原条件 pos='形容詞')、 literal 列挙で代用要

[[entries."上手".match]]
reading = "カミテ"
next_eq = "から"

# TODO: default 不在 (旧 rule)、 POS-only match の reading='ヘタ' を default 採用 (POS='名詞'/'形容詞')
# TODO: 既存 entry: core/jukugo/basic/general.toml に merge 要
[entries."下手"]
reading = "ヘタ"
# TODO: POS-only match dropped (reading='ヘタ', 原条件 pos='名詞')、 literal 列挙で代用要
# TODO: POS-only match dropped (reading='ヘタ', 原条件 pos='形容詞')、 literal 列挙で代用要

# TODO: core/ に entry 不在、 適切な core/jukugo/<sub-dir>/<file>.toml に配置要
