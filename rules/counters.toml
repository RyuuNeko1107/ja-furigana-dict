# 助数詞ルール
#
# - [simple]       : 数値カナの後ろに値を連結するだけのシンプルな助数詞
# - [counter."X"]  : 連濁・促音化等のルールを伴う助数詞 (X は表記)
#
# CounterRule のフィールド:
#   default       : 連結するデフォルトの suffix (なければ recursive モード等)
#   specials      : 数値そのものに対する full-override (例: 月の 4→シガツ)
#   rules         : 末尾数字 + 連濁/促音化規則
#   replacements  : 数値カナの末尾置換 (時の 4→ヨン→ヨ 等)
#   mode          : "recursive" (例: 「目」が既存助数詞の末尾に付く)
#   suffix        : recursive モード時の連結文字列

# ─── 単純サフィックス ────────────────────────────────────────────────────────
[simple]
"円" = "エン"
"点" = "テン"
"割" = "ワリ"
"度" = "ド"
"°" = "ド"
"℃" = "ド"
"℉" = "カッシ"
"合" = "ゴウ"
"倍" = "バイ"
"名" = "メイ"
"話" = "ワ"
"期" = "キ"
"号" = "ゴウ"
"便" = "ビン"
"着" = "チャク"
"発" = "ハツ"
"章" = "ショウ"
"曲" = "キョク"
"類" = "ルイ"
"票" = "ヒョウ"
"軒" = "ケン"
"席" = "セキ"
"機" = "キ"
"缶" = "カン"
"粒" = "ツブ"
"錠" = "ジョウ"
"艘" = "ソウ"
"社" = "シャ"
"校" = "コウ"
"口" = "クチ"
"年" = "ネン"
"時間" = "ジカン"
"時間半" = "ジカンハン"
"時半" = "ジハン"
"時頃" = "ジゴロ"
"時ごろ" = "ジゴロ"
"秒" = "ビョウ"
"台" = "ダイ"
"枚" = "マイ"
"羽" = "ワ"
"位" = "イ"
"週" = "シュウ"
"ヶ月" = "カゲツ"
"ケ月" = "カゲツ"
"か月" = "カゲツ"
"箇月" = "カゲツ"
"ヶ月半" = "カゲツハン"
"ケ月半" = "カゲツハン"
"か月半" = "カゲツハン"
"箇月半" = "カゲツハン"
"‰" = "パーミル"

# ─── 月: 4/7/9 が full-override ─────────────────────────────────────────────
[counter."月"]
default = "ガツ"
specials = { "4" = "シガツ", "7" = "シチガツ", "9" = "クガツ" }

# ─── 日: 1〜31 の特殊読みは days.toml で別管理 ─────────────────────────────
[counter."日"]
default = "ニチ"

# ─── 人: 1/2 が特殊 ────────────────────────────────────────────────────────
[counter."人"]
default = "ニン"
specials = { "1" = "ヒトリ", "2" = "フタリ" }

# ─── 時: 0=レイジ、4/7/9 はカナ末尾置換 ────────────────────────────────────
[counter."時"]
default = "ジ"
specials = { "0" = "レイジ" }

[[counter."時".replacements]]
last_digit = [4]
from = "ヨン"
to = "ヨ"

[[counter."時".replacements]]
last_digit = [7]
from = "ナナ"
to = "シチ"

[[counter."時".replacements]]
last_digit = [9]
from = "キュウ"
to = "ク"

# ─── 分: euphonic ──────────────────────────────────────────────────────────
[counter."分"]
default = "フン"

[[counter."分".rules]]
last_digit = [1, 3, 4, 6, 8, 0]
suffix = "プン"
sokuonize = true

# ─── 分半 ──────────────────────────────────────────────────────────────────
[counter."分半"]
default = "フンハン"

[[counter."分半".rules]]
last_digit = [1, 3, 4, 6, 8, 0]
suffix = "プンハン"
sokuonize = true

# ─── 本 ────────────────────────────────────────────────────────────────────
[counter."本"]
default = "ホン"

[[counter."本".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ポン"
sokuonize = true

[[counter."本".rules]]
last_digit = [3]
suffix = "ボン"

# ─── 匹 ────────────────────────────────────────────────────────────────────
[counter."匹"]
default = "ヒキ"

[[counter."匹".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピキ"
sokuonize = true

[[counter."匹".rules]]
last_digit = [3]
suffix = "ビキ"

# ─── 杯 ────────────────────────────────────────────────────────────────────
[counter."杯"]
default = "ハイ"

[[counter."杯".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パイ"
sokuonize = true

[[counter."杯".rules]]
last_digit = [3]
suffix = "バイ"

# ─── 階 ────────────────────────────────────────────────────────────────────
[counter."階"]
default = "カイ"

[[counter."階".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カイ"
sokuonize = true

[[counter."階".rules]]
last_digit = [3]
suffix = "ガイ"

# ─── 個 ────────────────────────────────────────────────────────────────────
[counter."個"]
default = "コ"

[[counter."個".rules]]
last_digit = [1, 6, 8, 0]
suffix = "コ"
sokuonize = true

# ─── 歳 ────────────────────────────────────────────────────────────────────
[counter."歳"]
default = "サイ"

[[counter."歳".rules]]
last_digit = [1, 8, 0]
suffix = "サイ"
sokuonize = true

# ─── 冊 ────────────────────────────────────────────────────────────────────
[counter."冊"]
default = "サツ"

[[counter."冊".rules]]
last_digit = [1, 8, 0]
suffix = "サツ"
sokuonize = true

# ─── 回 ────────────────────────────────────────────────────────────────────
[counter."回"]
default = "カイ"

[[counter."回".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カイ"
sokuonize = true

# ─── 週間 ──────────────────────────────────────────────────────────────────
[counter."週間"]
default = "シュウカン"

[[counter."週間".rules]]
last_digit = [1, 8, 0]
suffix = "シュウカン"
sokuonize = true

# ─── % / ％ ────────────────────────────────────────────────────────────────
[counter."%"]
default = "パーセント"

[[counter."%".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true

[counter."％"]
default = "パーセント"

[[counter."％".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true

# ─── ヶ所 / 箇所 / か所 ────────────────────────────────────────────────────
[counter."ヶ所"]
default = "カショ"

[[counter."ヶ所".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カショ"
sokuonize = true

[counter."箇所"]
default = "カショ"

[[counter."箇所".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カショ"
sokuonize = true

[counter."か所"]
default = "カショ"

[[counter."か所".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カショ"
sokuonize = true

# ─── 「目」: 既存助数詞末尾に再帰的に付く ───────────────────────────────
[counter."目"]
mode = "recursive"
suffix = "メ"
