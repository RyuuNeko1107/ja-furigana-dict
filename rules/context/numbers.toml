# 数字を含む慣用語句の文脈ルール
#
# 「一日 = ツイタチ / イチニチ」「一月 = イチガツ / ヒトツキ」 のように
# 数字 + 助数詞風の連体修飾語が文脈で読み分かれるパターン。

[meta]
role = "context"
description = "数字を含む慣用語句の文脈ルール (一日→ツイタチ / 一月→イチガツ 等)"

# === begin: 一日 ===
# 月名の後ならツイタチ、 期間文脈ならイチニチ、 default は イチニチ
[[rule]]
surface = "一日"
default = "イチニチ"

[[rule.match]]
prev_month = true
reading = "ツイタチ"

[[rule.match]]
next_starts_any = ["中", "間", "分", "以上", "以下", "程", "ほど", "かけて"]
reading = "イチニチ"

[[rule.match]]
prev_ends = ["毎", "約", "丸", "まる"]
reading = "イチニチ"
# === end: 一日 ===

# === begin: 一人 ===
[[rule]]
surface = "一人"
default = "ヒトリ"
# === end: 一人 ===

# === begin: 二人 ===
[[rule]]
surface = "二人"
default = "フタリ"
# === end: 二人 ===

# === begin: 一月 ===
# 暦 (イチガツ) vs 期間 (ヒトツキ)
[[rule]]
surface = "一月"

[[rule.match]]
next_starts_any = ["日", "から", "まで", "に", "の", "は", "も", "、", "。"]
reading = "イチガツ"

[[rule.match]]
next_digit = true
reading = "イチガツ"

[[rule.match]]
next_starts_any = ["中", "間", "分", "以上", "以下", "程", "ほど", "かけて", "かかる", "かかった", "かかれば"]
reading = "ヒトツキ"
# === end: 一月 ===

# === begin: 二月 ===
# 暦 (ニガツ) vs 期間 (フタツキ)
[[rule]]
surface = "二月"

[[rule.match]]
next_starts_any = ["日", "から", "まで", "に", "の", "は", "も", "、", "。"]
reading = "ニガツ"

[[rule.match]]
next_digit = true
reading = "ニガツ"

[[rule.match]]
next_starts_any = ["中", "間", "分", "以上", "以下", "程", "ほど", "かけて", "かかる", "かかった", "かかれば"]
reading = "フタツキ"
# === end: 二月 ===

# === begin: 一時 ===
[[rule]]
surface = "一時"
default = "イチジ"
# === end: 一時 ===

# === begin: 一番 ===
[[rule]]
surface = "一番"
default = "イチバン"
# === end: 一番 ===

# === begin: 一体 ===
[[rule]]
surface = "一体"
default = "イッタイ"
# === end: 一体 ===

# === begin: 一杯 ===
[[rule]]
surface = "一杯"
default = "イッパイ"
# === end: 一杯 ===

# === begin: 一生 ===
[[rule]]
surface = "一生"
default = "イッショウ"
# === end: 一生 ===

# === begin: 一緒 ===
[[rule]]
surface = "一緒"
default = "イッショ"
# === end: 一緒 ===

# === begin: 一人前 ===
[[rule]]
surface = "一人前"
default = "イチニンマエ"
# === end: 一人前 ===
