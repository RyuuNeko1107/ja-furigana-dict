# 同形異音語 (品詞・後続トークンで読みが切り替わるもの)
#
# 上手 = ジョウズ / カミテ / ウワテ
# 下手 = ヘタ / シモテ / シタテ
# 人気 = ニンキ / ヒトケ
# 大人気 = ダイニンキ / オトナゲ
# 十分 = ジュウブン / ジュップン

# ─── 上手 / 下手: 名詞・形容詞のとき ジョウズ / ヘタ ──────────────────
[[rule]]
surface = "上手"

[[rule.match]]
pos_eq = "名詞"
reading = "ジョウズ"

[[rule.match]]
pos_eq = "形容詞"
reading = "ジョウズ"

[[rule]]
surface = "下手"

[[rule.match]]
pos_eq = "名詞"
reading = "ヘタ"

[[rule.match]]
pos_eq = "形容詞"
reading = "ヘタ"

# ─── 人気: 「人気が無い」「人気の無い」→ ヒトケ、それ以外は ニンキ ──
[[rule]]
surface = "人気"
default = "ニンキ"

[[rule.match]]
next_eq = "が"
next_next_starts_with_any = ["な", "無"]
reading = "ヒトケ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["な", "無"]
reading = "ヒトケ"

# ─── 十分: 形容動詞用法は ジュウブン、時間は ジュップン ───────────────
[[rule]]
surface = "十分"
default = "ジュウブン"

[[rule.match]]
next_eq = "な"
reading = "ジュウブン"

[[rule.match]]
next_eq = "に"
reading = "ジュウブン"

[[rule.match]]
next_eq = "だ"
reading = "ジュウブン"

[[rule.match]]
next_eq = "で"
reading = "ジュウブン"

[[rule.match]]
next_eq = "です"
reading = "ジュウブン"

[[rule.match]]
next_starts_with_any = ["前", "後", "間", "以内", "おき", "ごろ", "頃"]
reading = "ジュップン"

[[rule.match]]
pos_eq = "名詞"
reading = "ジュップン"

# ─── 大人気: 「大人気ない」→ オトナゲ、それ以外は ダイニンキ ─────────
[[rule]]
surface = "大人気"
default = "ダイニンキ"

[[rule.match]]
next_starts_with = "な"
reading = "オトナゲ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["な", "無"]
reading = "オトナゲ"
