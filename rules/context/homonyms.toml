# 同形異音語 (品詞・後続トークンで読みが切り替わるもの)
#
# 上手 = ジョウズ / カミテ / ウワテ
# 下手 = ヘタ / シモテ / シタテ
# 人気 = ニンキ / ヒトケ
# 大人気 = ダイニンキ / オトナゲ
# 十分 = ジュウブン / ジュップン

# ─── 上手 / 下手: 名詞・形容詞のとき ジョウズ / ヘタ ──────────────────
# 舞台用語「上手から / 上手に登場」は カミテ
[[rule]]
surface = "上手"

[[rule.match]]
next_eq = "から"
reading = "カミテ"

[[rule.match]]
pos_eq = "名詞"
reading = "ジョウズ"

[[rule.match]]
pos_eq = "形容詞"
reading = "ジョウズ"

[[rule]]
surface = "下手"

[[rule.match]]
pos_eq = "名詞"
reading = "ヘタ"

[[rule.match]]
pos_eq = "形容詞"
reading = "ヘタ"

# ─── 人気: 「人気が無い」「人気の無い」→ ヒトケ、それ以外は ニンキ ──
[[rule]]
surface = "人気"
default = "ニンキ"

[[rule.match]]
next_eq = "が"
next_next_starts_with_any = ["な", "無"]
reading = "ヒトケ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["な", "無"]
reading = "ヒトケ"

# ─── 十分: 形容動詞用法は ジュウブン、時間は ジュップン ───────────────
[[rule]]
surface = "十分"
default = "ジュウブン"

[[rule.match]]
next_eq = "な"
reading = "ジュウブン"

[[rule.match]]
next_eq = "に"
reading = "ジュウブン"

[[rule.match]]
next_eq = "だ"
reading = "ジュウブン"

[[rule.match]]
next_eq = "で"
reading = "ジュウブン"

[[rule.match]]
next_eq = "です"
reading = "ジュウブン"

[[rule.match]]
next_starts_with_any = ["前", "後", "間", "以内", "おき", "ごろ", "頃", "間の", "間で", "間に"]
reading = "ジュップン"

# 「十分間」全体マッチ (連続 surface)
[[rule.match]]
next_eq = "間"
reading = "ジュップン"

[[rule.match]]
pos_eq = "名詞"
reading = "ジュップン"

# ─── 一行: イチギョウ (テキスト・行番号、default) / イッコウ (集団) ─────
# 現代の頻度では「本の一行」「最後の一行」のような **テキスト・行番号** 用途が多い。
# 「一行の旅団」「彼ら一行」のような集団用途は限定的なので match 側で対応。
#
# Lindera は「一行 の 旅団」と分割するので、next = の (1 文字) かつ
# next_next の surface が「旅団 / 集団 / 一同 / 様」等で始まるかで判定する
# (next_starts_with_any では next の surface 1 文字「の」しか見えないので不可)。
[[rule]]
surface = "一行"
default = "イチギョウ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["旅", "集団", "一同", "御一行", "中"]
reading = "イッコウ"

[[rule.match]]
prev_ends_with_any = ["私たち", "我々", "彼ら", "御", "総勢", "観光"]
reading = "イッコウ"

# ─── 大人気: 「大人気ない」→ オトナゲ、それ以外は ダイニンキ ─────────
[[rule]]
surface = "大人気"
default = "ダイニンキ"

[[rule.match]]
next_starts_with = "な"
reading = "オトナゲ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["な", "無"]
reading = "オトナゲ"

# ─── 寒気: 体感 (寒気がする) は サムケ、気象 (寒気団 / 寒気が南下) は カンキ ─
# weather.toml に default カンキ あり、ここで ある特定文脈のみ サムケ に上書き。
[[rule]]
surface = "寒気"
default = "カンキ"

[[rule.match]]
next_eq = "が"
next_next_starts_with_any = ["する", "し"]
reading = "サムケ"

[[rule.match]]
next_eq = "を"
next_next_starts_with_any = ["覚", "感", "催"]
reading = "サムケ"

[[rule.match]]
prev_ends_with_any = ["背筋", "悪寒"]
reading = "サムケ"

# ─── 方々: 場所 (ホウボウ) と人々の敬称 (カタガタ) で読み分け ─────────
# 「方々で噂」「方々を巡る」→ ホウボウ、「方々におかれましては」→ カタガタ
[[rule]]
surface = "方々"
default = "ホウボウ"

# 敬称: prev に 御/皆様/関係者 等
[[rule.match]]
prev_ends_with_any = ["御", "皆様", "関係者", "出席者", "ご来場の", "参加者"]
reading = "カタガタ"

# 敬称: next が「におかれ」「が」「は」+ 敬語動詞
[[rule.match]]
next_eq = "に"
next_next_starts_with_any = ["おかれ"]
reading = "カタガタ"

# ─── 表: 「表に出る/立つ/向く」 はオモテ、「表を作成」 などはヒョウ (default) ─
# Lindera 単独 token の default が ヒョウ (data table) になる傾向のため、
# 物理的「表 (おもて)」用法を context rule で拾う。
[[rule]]
surface = "表"
default = "ヒョウ"

# 「表に出る」「表に立つ」「表に向かう」 — 方向を示す用法
[[rule.match]]
next_eq = "に"
next_next_starts_with_any = ["出", "立", "向"]
reading = "オモテ"

# 「表から」(出入口・方向) → オモテ
[[rule.match]]
next_eq = "から"
reading = "オモテ"

# 「表向き」「表通り」「表沙汰」「表舞台」「表口」「表面」(物理的表側)
[[rule.match]]
next_starts_with_any = ["向き", "通り", "沙汰", "舞台", "口", "玄関", "参道", "門"]
reading = "オモテ"

# ─── 翡翠: 鉱物 (ヒスイ default) と 鳥 (カワセミ) で読み分け ─────────────
# general.toml が default ヒスイ を提供 (アクセサリー / 色名で頻度高)。
# 鳥 (カワセミ) 用法は水辺・池・枝など自然描写の文脈に限定的なので
# context rule で拾う。 animals.toml の 「翡翠 = カワセミ」 は cross-file
# 重複を避けるため削除済み。
[[rule]]
surface = "翡翠"
default = "ヒスイ"

# 「翡翠 + が + 水辺/池/木/枝/羽」 — 鳥の動作・生息描写
[[rule.match]]
next_eq = "が"
next_next_starts_with_any = ["水辺", "池", "木", "枝", "羽", "飛", "舞", "鳴", "止ま"]
reading = "カワセミ"

# 「翡翠 + の + 羽/姿/巣/鳴き声」
[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["羽", "姿", "巣", "鳴", "雛"]
reading = "カワセミ"
