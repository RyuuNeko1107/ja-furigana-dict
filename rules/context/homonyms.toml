# 同形異音語 (品詞・後続トークンで読みが切り替わるもの)
#
# 上手 = ジョウズ / カミテ / ウワテ
# 下手 = ヘタ / シモテ / シタテ
# 人気 = ニンキ / ヒトケ
# 大人気 = ダイニンキ / オトナゲ
# 十分 = ジュウブン / ジュップン

# ─── 上手 / 下手: 名詞・形容詞のとき ジョウズ / ヘタ ──────────────────
# 舞台用語「上手から / 上手に登場」は カミテ
[[rule]]
surface = "上手"

[[rule.match]]
next_eq = "から"
reading = "カミテ"

[[rule.match]]
pos_eq = "名詞"
reading = "ジョウズ"

[[rule.match]]
pos_eq = "形容詞"
reading = "ジョウズ"

[[rule]]
surface = "下手"

[[rule.match]]
pos_eq = "名詞"
reading = "ヘタ"

[[rule.match]]
pos_eq = "形容詞"
reading = "ヘタ"

# ─── 人気: 「人気が無い」「人気の無い」→ ヒトケ、それ以外は ニンキ ──
[[rule]]
surface = "人気"
default = "ニンキ"

[[rule.match]]
next_eq = "が"
next_next_starts_with_any = ["な", "無"]
reading = "ヒトケ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["な", "無"]
reading = "ヒトケ"

# ─── 十分: 形容動詞用法は ジュウブン、時間は ジュップン ───────────────
[[rule]]
surface = "十分"
default = "ジュウブン"

[[rule.match]]
next_eq = "な"
reading = "ジュウブン"

[[rule.match]]
next_eq = "に"
reading = "ジュウブン"

[[rule.match]]
next_eq = "だ"
reading = "ジュウブン"

[[rule.match]]
next_eq = "で"
reading = "ジュウブン"

[[rule.match]]
next_eq = "です"
reading = "ジュウブン"

[[rule.match]]
next_starts_with_any = ["前", "後", "間", "以内", "おき", "ごろ", "頃", "間の", "間で", "間に"]
reading = "ジュップン"

# 「十分間」全体マッチ (連続 surface)
[[rule.match]]
next_eq = "間"
reading = "ジュップン"

[[rule.match]]
pos_eq = "名詞"
reading = "ジュップン"

# ─── 一行: イチギョウ (テキスト・行番号、default) / イッコウ (集団) ─────
# 現代の頻度では「本の一行」「最後の一行」のような **テキスト・行番号** 用途が多い。
# 「一行の旅団」「彼ら一行」のような集団用途は限定的なので match 側で対応。
#
# Lindera は「一行 の 旅団」と分割するので、next = の (1 文字) かつ
# next_next の surface が「旅団 / 集団 / 一同 / 様」等で始まるかで判定する
# (next_starts_with_any では next の surface 1 文字「の」しか見えないので不可)。
[[rule]]
surface = "一行"
default = "イチギョウ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["旅", "集団", "一同", "御一行", "中"]
reading = "イッコウ"

[[rule.match]]
prev_ends_with_any = ["私たち", "我々", "彼ら", "御", "総勢", "観光"]
reading = "イッコウ"

# ─── 大人気: 「大人気ない」→ オトナゲ、それ以外は ダイニンキ ─────────
[[rule]]
surface = "大人気"
default = "ダイニンキ"

[[rule.match]]
next_starts_with = "な"
reading = "オトナゲ"

[[rule.match]]
next_eq = "の"
next_next_starts_with_any = ["な", "無"]
reading = "オトナゲ"

# ─── 寒気: 体感 (寒気がする) は サムケ、気象 (寒気団 / 寒気が南下) は カンキ ─
# weather.toml に default カンキ あり、ここで ある特定文脈のみ サムケ に上書き。
[[rule]]
surface = "寒気"
default = "カンキ"

[[rule.match]]
next_eq = "が"
next_next_starts_with_any = ["する", "し"]
reading = "サムケ"

[[rule.match]]
next_eq = "を"
next_next_starts_with_any = ["覚", "感", "催"]
reading = "サムケ"

[[rule.match]]
prev_ends_with_any = ["背筋", "悪寒"]
reading = "サムケ"
