# 単純な読み固定化 (形態素解析が外しがちな語)
#
# 文脈分岐は無く default のみで固定する語をまとめる。
# 「何○○」「日付・暦」「人名混同しがちな熟語」等。

# ─── 大人 ──────────────────────────────────────────────────────────────

[meta]
role = "context"
description = "単純な読み固定化 (大人 / 何日 / 何人 等、 形態素解析が外しがちな語を default 固定)"

[[rule]]
surface = "大人"
default = "オトナ"

# ─── 何日 / 何人 / 何回 / 何度 ────────────────────────────────────────
[[rule]]
surface = "何日"
default = "ナンニチ"

[[rule]]
surface = "何人"
default = "ナンニン"

[[rule]]
surface = "何回"
default = "ナンカイ"

[[rule]]
surface = "何度"
default = "ナンド"

# ─── 仲人 / 素人 / 玄人 ──────────────────────────────────────────────
[[rule]]
surface = "仲人"
default = "ナコウド"

[[rule]]
surface = "素人"
default = "シロウト"

[[rule]]
surface = "玄人"
default = "クロウト"

# ─── 日本 ──────────────────────────────────────────────────────────────
[[rule]]
surface = "日本"
default = "ニホン"

# ─── 検証ループ補強: 単漢字が動詞・形容詞活用で誤認されるのを上書き ────

# 能: 動詞「能う (アタウ)」と誤認されがち
[[rule]]
surface = "能"
default = "ノウ"

# 約: 形容動詞「約やか (ツヅマヤカ)」と誤認されがち
[[rule]]
surface = "約"
default = "ヤク"

# 差: 動詞「差す (サス)」と誤認されがち
[[rule]]
surface = "差"
default = "サ"

# 本: 訓読み「もと」に倒れることが多い (起源の意)
# 書籍・冊子の「ホン」をデフォルトに
[[rule]]
surface = "本"
default = "ホン"

# 率: 動詞「率いる (ヒキイル)」と誤認されがち
[[rule]]
surface = "率"
default = "リツ"

# 半: 訓読み「ナカバ」に倒れがち (時刻・割合の「ハン」)
[[rule]]
surface = "半"
default = "ハン"

# 間: 訓「アイダ」「ハザマ」に倒れがち (時間・空間単位の「カン」)
[[rule]]
surface = "間"
default = "カン"

# 円: Lindera が「マル」「マルイ」と返しがち (通貨・図形の「エン」)
[[rule]]
surface = "円"
default = "エン"

# 屋: 訓読み「オク」(古語) に倒れがち。蕎麦屋・酒屋など店舗の「ヤ」
[[rule]]
surface = "屋"
default = "ヤ"

# 者: 訓読み「モノ」に倒れがち (研究者・参加者の「シャ」)
[[rule]]
surface = "者"
default = "シャ"

# 市場: 文脈で シジョウ / イチバ
# default は イチバ (everyday: 市場で野菜を買う)。
# 株式市場 / 金融市場 / 為替市場 / 国際市場 / 国内市場 は jukugo/general.toml に
# 4 字 compound として登録済 (longest match で merge され context rule に到達しない)。
# ここは backup — jukugo 未登録の compound に対する safety net。
[[rule]]
surface = "市場"
default = "イチバ"

# 経済・金融文脈 (prev が経済領域の語) → シジョウ
[[rule.match]]
prev_ends = ["証券", "債券", "労働", "海外", "輸出", "輸入", "新興"]
reading = "シジョウ"

# 経済・金融文脈 (next が経済用語) → シジョウ
[[rule.match]]
next_starts_any = ["原理", "経済", "規模", "動向", "占有"]
reading = "シジョウ"

# ─── 角: 場所 (カド) と数学・形状 (カク) と動物 (ツノ) で読み分け ──────
# default は カド (一般用法: 角を曲がる、机の角)。数学用語は jukugo に compound
# 登録済 (三角形 / 四角形 / 鋭角 / 鈍角 等)。動物の角は phrase 化 (鹿の角 等)。
[[rule]]
surface = "角"
default = "カド"

# 数学・形状の compound 略号 (三角 / 直角 / 等) — jukugo 未登録のものを保険で
[[rule.match]]
prev_ends = ["三", "四", "六", "八", "鋭", "鈍", "直", "視"]
reading = "カク"

# next が「度」「形」「材」等の数学・建築領域語 → カク
[[rule.match]]
next_starts_any = ["度", "材"]
reading = "カク"

# ─── 被る: 着用 (カブル) と 受動 (コウムル) ────────────────────────────
# Lindera は古典的な コウムル を default にするが、現代日本語では カブル が圧倒的に
# 多い (帽子 / 仮面 / 面 / マスク / 容疑 / 罪 を被る)。コウムル は被害文脈のみ。
[[rule]]
surface = "被る"
default = "カブル"

# 被害 / 災害 / 影響 等 → コウムル
[[rule.match]]
prev_ends = ["被害", "災害", "影響", "損害", "迷惑", "不利益", "損失"]
reading = "コウムル"

# ─── 今日 / 明日 / 昨日 / 今年 / 去年 / 来年 / 今月 ───────────────────
[[rule]]
surface = "今日"
default = "キョウ"

[[rule]]
surface = "明日"
default = "アシタ"

[[rule]]
surface = "昨日"
default = "キノウ"

[[rule]]
surface = "今年"
default = "コトシ"

[[rule]]
surface = "去年"
default = "キョネン"

[[rule]]
surface = "来年"
default = "ライネン"

[[rule]]
surface = "今月"
default = "コンゲツ"
