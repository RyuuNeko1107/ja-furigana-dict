# 単純な読み固定化 (形態素解析が外しがちな語)
#
# 文脈分岐は無く default のみで固定する語をまとめる。
# 「何○○」「日付・暦」「人名混同しがちな熟語」等。

[meta]
role = "context"
description = "単純な読み固定化 (大人 / 何日 / 何人 等、 形態素解析が外しがちな語を default 固定)"

# === begin: 大人 ===
[[rule]]
surface = "大人"
default = "オトナ"
# === end: 大人 ===

# === begin: 何日 ===
[[rule]]
surface = "何日"
default = "ナンニチ"
# === end: 何日 ===

# === begin: 何人 ===
[[rule]]
surface = "何人"
default = "ナンニン"
# === end: 何人 ===

# === begin: 何回 ===
[[rule]]
surface = "何回"
default = "ナンカイ"
# === end: 何回 ===

# === begin: 何度 ===
[[rule]]
surface = "何度"
default = "ナンド"
# === end: 何度 ===

# === begin: 仲人 ===
[[rule]]
surface = "仲人"
default = "ナコウド"
# === end: 仲人 ===

# === begin: 素人 ===
[[rule]]
surface = "素人"
default = "シロウト"
# === end: 素人 ===

# === begin: 玄人 ===
[[rule]]
surface = "玄人"
default = "クロウト"
# === end: 玄人 ===

# === begin: 日本 ===
[[rule]]
surface = "日本"
default = "ニホン"
# === end: 日本 ===

# === begin: 能 ===
# 動詞「能う (アタウ)」と誤認されがち
[[rule]]
surface = "能"
default = "ノウ"
# === end: 能 ===

# === begin: 約 ===
# 形容動詞「約やか (ツヅマヤカ)」と誤認されがち
[[rule]]
surface = "約"
default = "ヤク"
# === end: 約 ===

# === begin: 差 ===
# 動詞「差す (サス)」と誤認されがち
[[rule]]
surface = "差"
default = "サ"
# === end: 差 ===

# === begin: 本 ===
# 訓読み「もと」に倒れることが多い (起源の意)、 書籍・冊子の「ホン」 を default に
[[rule]]
surface = "本"
default = "ホン"
# === end: 本 ===

# === begin: 率 ===
# 動詞「率いる (ヒキイル)」と誤認されがち
[[rule]]
surface = "率"
default = "リツ"
# === end: 率 ===

# === begin: 半 ===
# 訓読み「ナカバ」に倒れがち (時刻・割合の「ハン」)
[[rule]]
surface = "半"
default = "ハン"
# === end: 半 ===

# === begin: 間 (default 固定) ===
# 訓「アイダ」「ハザマ」に倒れがち (時間・空間単位の「カン」)
# 部屋用法 (マ) は homonyms.toml の context rule で別途上書き
[[rule]]
surface = "間"
default = "カン"
# === end: 間 (default 固定) ===

# === begin: 円 ===
# Lindera が「マル」「マルイ」と返しがち (通貨・図形の「エン」)
[[rule]]
surface = "円"
default = "エン"
# === end: 円 ===

# === begin: 屋 ===
# 訓読み「オク」(古語) に倒れがち。 蕎麦屋・酒屋など店舗の「ヤ」
[[rule]]
surface = "屋"
default = "ヤ"
# === end: 屋 ===

# === begin: 者 ===
# 訓読み「モノ」に倒れがち (研究者・参加者の「シャ」)
[[rule]]
surface = "者"
default = "シャ"
# === end: 者 ===

# === begin: 市場 ===
# 文脈で シジョウ / イチバ
# default は イチバ (everyday: 市場で野菜を買う)。
# 株式市場 / 金融市場 / 為替市場 / 国際市場 / 国内市場 は jukugo/general.toml に
# 4 字 compound として登録済 (longest match で merge され context rule に到達しない)。
# ここは backup — jukugo 未登録の compound に対する safety net。
[[rule]]
surface = "市場"
default = "イチバ"

# 経済・金融文脈 (prev が経済領域の語) → シジョウ
[[rule.match]]
prev_ends = ["証券", "債券", "労働", "海外", "輸出", "輸入", "新興"]
reading = "シジョウ"

# 経済・金融文脈 (next が経済用語) → シジョウ
[[rule.match]]
next_starts_any = ["原理", "経済", "規模", "動向", "占有"]
reading = "シジョウ"
# === end: 市場 ===

# === begin: 角 ===
# 場所 (カド) と数学・形状 (カク) と動物 (ツノ) で読み分け
# default は カド (一般用法: 角を曲がる、机の角)。 数学用語は jukugo に compound
# 登録済 (三角形 / 四角形 / 鋭角 / 鈍角 等)。 動物の角は phrase 化 (鹿の角 等)。
[[rule]]
surface = "角"
default = "カド"

# 数学・形状の compound 略号 (三角 / 直角 / 等) — jukugo 未登録のものを保険で
[[rule.match]]
prev_ends = ["三", "四", "六", "八", "鋭", "鈍", "直", "視"]
reading = "カク"

# next が「度」「形」「材」等の数学・建築領域語 → カク
[[rule.match]]
next_starts_any = ["度", "材"]
reading = "カク"
# === end: 角 ===

# === begin: 被る ===
# 着用 (カブル) と 受動 (コウムル)
# Lindera は古典的な コウムル を default にするが、 現代日本語では カブル が圧倒的に
# 多い (帽子 / 仮面 / 面 / マスク / 容疑 / 罪 を被る)。 コウムル は被害文脈のみ。
[[rule]]
surface = "被る"
default = "カブル"

# 被害 / 災害 / 影響 等 → コウムル
[[rule.match]]
prev_ends = ["被害", "災害", "影響", "損害", "迷惑", "不利益", "損失"]
reading = "コウムル"
# === end: 被る ===

# === begin: 今日 ===
[[rule]]
surface = "今日"
default = "キョウ"
# === end: 今日 ===

# === begin: 明日 ===
[[rule]]
surface = "明日"
default = "アシタ"
# === end: 明日 ===

# === begin: 昨日 ===
[[rule]]
surface = "昨日"
default = "キノウ"
# === end: 昨日 ===

# === begin: 今年 ===
[[rule]]
surface = "今年"
default = "コトシ"
# === end: 今年 ===

# === begin: 去年 ===
[[rule]]
surface = "去年"
default = "キョネン"
# === end: 去年 ===

# === begin: 来年 ===
[[rule]]
surface = "来年"
default = "ライネン"
# === end: 来年 ===

# === begin: 今月 ===
[[rule]]
surface = "今月"
default = "コンゲツ"
# === end: 今月 ===
