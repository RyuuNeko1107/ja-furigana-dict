# 単純な読み固定化 (形態素解析が外しがちな語)
#
# 文脈分岐は無く default のみで固定する語をまとめる。
# 「何○○」「日付・暦」「人名混同しがちな熟語」等。

# ─── 大人 ──────────────────────────────────────────────────────────────
[[rule]]
surface = "大人"
default = "オトナ"

# ─── 何日 / 何人 / 何回 / 何度 ────────────────────────────────────────
[[rule]]
surface = "何日"
default = "ナンニチ"

[[rule]]
surface = "何人"
default = "ナンニン"

[[rule]]
surface = "何回"
default = "ナンカイ"

[[rule]]
surface = "何度"
default = "ナンド"

# ─── 仲人 / 素人 / 玄人 ──────────────────────────────────────────────
[[rule]]
surface = "仲人"
default = "ナコウド"

[[rule]]
surface = "素人"
default = "シロウト"

[[rule]]
surface = "玄人"
default = "クロウト"

# ─── 日本 ──────────────────────────────────────────────────────────────
[[rule]]
surface = "日本"
default = "ニホン"

# ─── 今日 / 明日 / 昨日 / 今年 / 去年 / 来年 / 今月 ───────────────────
[[rule]]
surface = "今日"
default = "キョウ"

[[rule]]
surface = "明日"
default = "アシタ"

[[rule]]
surface = "昨日"
default = "キノウ"

[[rule]]
surface = "今年"
default = "コトシ"

[[rule]]
surface = "去年"
default = "キョネン"

[[rule]]
surface = "来年"
default = "ライネン"

[[rule]]
surface = "今月"
default = "コンゲツ"
