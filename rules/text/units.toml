# SI / 一般単位
# `ci = true` で case-insensitive lookup (大文字小文字を区別しない)


[meta]
schema_version = "2"
role = "units"
description = "SI 単位 + 通貨 + % (km / kg / mL / 円 / % 等、 数値 + 単位を 1 chunk で読む。 lookup は case-insensitive)"

[entries]
"km" = { kana = "キロメートル" }
"cm" = { kana = "センチメートル" }
"mm" = { kana = "ミリメートル" }
"m"  = { kana = "メートル" }
"kg" = { kana = "キログラム" }
"mg" = { kana = "ミリグラム" }
"g"  = { kana = "グラム" }
"t"  = { kana = "トン" }
"mL" = { kana = "ミリリットル", ci = true }
"L"  = { kana = "リットル", ci = true }
"TB" = { kana = "テラバイト" }
"GB" = { kana = "ギガバイト" }
"MB" = { kana = "メガバイト" }
"KB" = { kana = "キロバイト" }

# 通貨 / 数量単位 (NumberChunker で N + 円 を 1 chunk にする用)
"円" = { kana = "エン" }
"%"  = { kana = "パーセント" }
"％" = { kana = "パーセント" }
