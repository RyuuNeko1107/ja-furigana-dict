# 数字を含む慣用語句
#
# ## 用途
#
# 「二十歳 → ハタチ」 のような 「数字 + 漢字」 で **慣用読みが固定** な熟語の
# 例外 table。 数字 + 助数詞の動的合成 (= rules/numbers/counters/) より **先に**
# 確定するので、 ここに登録した surface は他経路を bypass する。
#
# 例:
#   「二十歳」 → ハタチ (= "ニジュッサイ" ではない)
#   「明後日」 → アサッテ (= "ミョウゴニチ" ではない)
#   「一昨日」 → オトトイ (= "イッサクジツ" ではない)
#
# ## どのとき発火するか
#
# lib の Smart engine で NumberCandidateProvider (band 950) が candidate として
# emit する (= 数字+助数詞の動的合成と同 band、 同位置では surface が長い方が
# Viterbi path で勝つ)。 dict 完全一致 (core/ の entry、 band 1000) があれば
# そちらが優先 = 個別 override 可能。
#
# ## 追加するなら
#
# - **数字を含む** 慣用句のみ (= 純粋な熟語は core/jukugo/ に置く)
# - 慣用読みが固定 (= 文脈で揺れない) のものに限定
# - 揺れる読み (= 「一日 → イチニチ / ツイタチ」) は core/jukugo/ の entry inline match
#   側で書く (= 本 file は揺れ無し前提の早期確定経路)
# - 50 音順推奨
#
# ## 注意点
#
# - **長い surface の登録で部分 surface に勝つ** (= 「一人前 イチニンマエ」 と
#   「一人 ヒトリ」 が両方候補に出て、 Viterbi が長い方を採択する)


[meta]
schema_version = "2"
role = "numeric_phrases"
description = "数字を含む例外語句 (二十歳→ハタチ / 明後日→アサッテ 等、 助数詞ルールより先に確定)"

[entries]
"二十歳" = "ハタチ"
"二十日" = "ハツカ"
"一昨日" = "オトトイ"
"一昨年" = "オトトシ"
"明後日" = "アサッテ"
"明々後日" = "シアサッテ"
"三日坊主" = "ミッカボウズ"
"三が日" = "サンガニチ"
"四半期" = "シハンキ"
"八百屋" = "ヤオヤ"
"五重塔" = "ゴジュウノトウ"
"三日月" = "ミカヅキ"
"一人前" = "イチニンマエ"
"二人三脚" = "ニニンサンキャク"
"一人" = "ヒトリ"
"二人" = "フタリ"
"百個" = "ヒャッコ"
"千個" = "センコ"
"百本" = "ヒャッポン"
"千本" = "センボン"
"百匹" = "ヒャッピキ"
"百冊" = "ヒャクサツ"
# Lindera が「十」+「分間」に分解する問題への対応 (context rule 効かない)
"十分間" = "ジュップンカン"
