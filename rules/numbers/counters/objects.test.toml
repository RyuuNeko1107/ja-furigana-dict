# inline test for rules/counters/objects.toml
#
# CI 専用 (tools/test_inline_rules.py が binary で input → expected を検証)。
# lib loader は file 名 match で skip + release tar からも exclude、
# runtime memory には載らない。
#
# **書き方ルール**:
# - 1 case あたり `[[test]]` ブロック + `input` / `expected` の 2 行
#   (3 行 1 case の縦書き、 末尾追記で merge 競合は手動 resolve しやすい)
# - **append-only**: 既存 case を **削除しない**、 追加のみ。
#   reading が変わったら新 case を追加して古いものは残す
#   (= 過去通せたものは通し続ける、 corpus と同じ regression lock)
# - 順序は問わない (TOML array なので並べ替えは不要)
# - 関連グループに `# ─── タイトル ──` のコメントで小見出し可

# ─── 本 ────────────────────────────────────────────
[[test]]
input = "1本"
expected = "いっぽん"

[[test]]
input = "3本"
expected = "さんぼん"

[[test]]
input = "5本"
expected = "ごほん"

# ─── 匹 ────────────────────────────────────────────
[[test]]
input = "1匹"
expected = "いっぴき"

[[test]]
input = "3匹"
expected = "さんびき"

# ─── 冊 ────────────────────────────────────────────
[[test]]
input = "1冊"
expected = "いっさつ"

# ─── 1 例文 → 複数 target (新 schema 例) ───────────────────
[[test]]
input = "3本の傘と5匹の猫"
expected = "さんぼんのかさとごひきのねこ"

[[test.targets]]
surface = "3本"
reading = "さんぼん"

[[test.targets]]
surface = "5匹"
reading = "ごひき"

# ─── 巻 (書籍): 1/6/8/10 促音 (2026-06-19) ───
[[test]]
input = "六巻"
expected = "ろっかん"

[[test]]
input = "一巻"
expected = "いっかん"

# ─── 票 (投票): 1/6/8/10 促音+半濁、3 連濁 (2026-06-19) ───
[[test]]
input = "一票"
expected = "いっぴょう"

[[test]]
input = "三票"
expected = "さんびょう"

# ─── simple→objects 移動 counter promotion (2026-06-19) ───
[[test]]
input = "一話"
expected = "いちわ"

[[test]]
input = "一曲"
expected = "いっきょく"

[[test]]
input = "六機"
expected = "ろっき"

[[test]]
input = "一品"
expected = "いっぴん"

[[test]]
input = "六丁"
expected = "ろくちょう"

[[test]]
input = "三砲"
expected = "さんぼう"
