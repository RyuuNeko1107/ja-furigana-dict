# 時間系助数詞 (月 / 日 / 時 / 分 / 分半 / 週間 / 回)
#
# ## 用途
#
# 時間文脈で **数値依存の特殊読み + カナ末尾置換** が起こる助数詞。 simple.toml
# (= 単純連結のみ) と異なり、 数値末尾 (1/4/7/9 等) で reading が動的に変わる。
#
# 例:
#   「4 月」  → シガツ      (= specials: 4 → シガツ で full-override)
#   「7 月」  → シチガツ    (= 7 → シチガツ)
#   「4 時」  → ヨジ        (= replacements: 4 → ヨン → ヨ で末尾置換)
#   「9 時」  → クジ        (= 9 → キュウ → ク で末尾置換)
#   「1 日」  → ツイタチ    (= days.toml で特殊読み、 ただし日付文脈のみ)
#   「3 分」  → サンプン    (= rules: 3 で suffix プン)
#   「1 回」  → イッカイ    (= rules: 1 で sokuonize イチ → イッ + suffix カイ)
#
# ## counter rule の構成要素
#
# 各 `[counter."X"]` は以下を組み合わせて書ける:
#
# - `default = "..."`: 規定 reading (= 末尾置換 / 連濁が無いときの suffix)
# - `specials = { "N" = "..." }`: 数値 N に対する **full-override** reading
#   (例: 「月」 で specials = { "4" = "シガツ" } → 「4 月」 は default を bypass)
# - `[[counter."X".rules]]`: 末尾数字 last_digit + 連濁 / 促音化 (例: 「本」 で
#   1/6/8/10 → suffix ポン + sokuonize = true で「1 本 = イッポン」)
# - `[[counter."X".replacements]]`: 数値カナ末尾の文字列置換 (例: 「時」 で 4 →
#   ヨン → ヨ で 「4 時 = ヨジ」)
#
# ## 追加するなら
#
# - **時間 / 期間** 関連の助数詞のみ (= 月 / 日 / 時 / 分 / 時間 / 週間 等)
# - 4/7/9 の特殊読みは specials か replacements で表現
# - 数値依存の連濁 / 促音化は rules で
# - 単純連結のみ (= 「時間」 「時頃」 等) は simple.toml で書く
#
# ## 注意点
#
# - 「日」 default は 「ニチ」、 1〜31 の **暦の特殊読み** (ツイタチ / フツカ等) は
#   `days.toml` で **暦の日付文脈** にのみ適用される (= 「1 日に 2 回」 は default
#   「イチニチ」、 「6 月 1 日」 の 「1 日」 は 「ツイタチ」)
# - specials は数値が **完全一致** で発火 (= 「4」 specials は 「4 月」 のみ、 「14 月」 で
#   末尾 4 が hit しない、 末尾 N 文脈は rules / replacements で書く)

[meta]
schema_version = "2"
role = "counters"
description = "時間系助数詞 (月 / 日 / 時 / 分 / 週間 / 回、 4/7/9 の特殊読み + カナ末尾置換)"

# === begin: 月 ===
# 4/7/9 は specials で full-override (シガツ / シチガツ / クガツ)
[counter."月"]
default = "ガツ"
specials = { "4" = "シガツ", "7" = "シチガツ", "9" = "クガツ" }
# === end: 月 ===

# === begin: 日 ===
# 1〜31 の特殊読みは days.toml で別管理 (ここでは default のみ)
[counter."日"]
default = "ニチ"
# === end: 日 ===

# === begin: 時 ===
# 0=レイジ、4/7/9 はカナ末尾置換 (ヨン→ヨ / ナナ→シチ / キュウ→ク)
[counter."時"]
default = "ジ"
kanji_numeral = true  # 漢数字でも replacements 発火 (四時=よじ/九時=くじ。旧 よんじ/きゅうじ 化け、★2026-06-21)
specials = { "0" = "レイジ" }

[[counter."時".replacements]]
last_digit = [4]
from = "ヨン"
to = "ヨ"

[[counter."時".replacements]]
last_digit = [7]
from = "ナナ"
to = "シチ"

[[counter."時".replacements]]
last_digit = [9]
from = "キュウ"
to = "ク"
# === end: 時 ===

# === begin: 分 ===
[counter."分"]
default = "フン"
# 意図的に kanji_numeral = false (漢数字 bare は OFF)。理由: counter synthesis は
# band 950 で jukugo (band 100) より強いため、有効化すると「十分=ジュウブン (充分)」
# 「五分=ゴブ」「三分の一=サンブンノイチ」が じゅっぷん/ごふん/さんぷん に化ける。
# bare 漢数字 + 分 の minutes/fraction/proportion 判別は文脈ルールが必要 (別タスク)。
kanji_numeral = false

[[counter."分".rules]]
last_digit = [1, 3, 4, 6, 8, 0]
suffix = "プン"
sokuonize = true
# === end: 分 ===

# === begin: 分半 ===
[counter."分半"]
default = "フンハン"
kanji_numeral = false  # 分 と同様に意図的 OFF (上記 分 ブロック参照)

[[counter."分半".rules]]
last_digit = [1, 3, 4, 6, 8, 0]
suffix = "プンハン"
sokuonize = true
# === end: 分半 ===

# === begin: 週間 ===
[counter."週間"]
default = "シュウカン"
kanji_numeral = true  # 一週間/八週間/十週間 → いっしゅうかん/はっしゅうかん/じゅっしゅうかん (漢数字 bare 対応)

[[counter."週間".rules]]
last_digit = [1, 8, 0]
suffix = "シュウカン"
sokuonize = true
# === end: 週間 ===

# === begin: 回 ===
[counter."回"]
default = "カイ"
kanji_numeral = true  # 六回/八回/十回 → ろっかい/はっかい/じゅっかい (漢数字 bare 対応)

[[counter."回".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カイ"
sokuonize = true
# === end: 回 ===

# === begin: ヶ月 系 === (1/6/8/10 で促音化。 一ヶ月=いっかげつ、 六ヶ月=ろっかげつ)
# 旧: simple.toml に「ヶ月=カゲツ」で置かれ 1ヶ月→イチカゲツ と促音化していなかった
# (★VV比較 2026-06-17)。promote して euphonic counter 化。表記ゆれ全variant + 半。
[counter."ヶ月"]
default = "カゲツ"
kanji_numeral = true
[[counter."ヶ月".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツ"
sokuonize = true

[counter."ケ月"]
default = "カゲツ"
kanji_numeral = true
[[counter."ケ月".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツ"
sokuonize = true

[counter."か月"]
default = "カゲツ"
kanji_numeral = true
[[counter."か月".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツ"
sokuonize = true

[counter."箇月"]
default = "カゲツ"
kanji_numeral = true
[[counter."箇月".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツ"
sokuonize = true

[counter."ヶ月半"]
default = "カゲツハン"
kanji_numeral = true
[[counter."ヶ月半".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツハン"
sokuonize = true

[counter."ケ月半"]
default = "カゲツハン"
kanji_numeral = true
[[counter."ケ月半".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツハン"
sokuonize = true

[counter."か月半"]
default = "カゲツハン"
kanji_numeral = true
[[counter."か月半".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツハン"
sokuonize = true

[counter."箇月半"]
default = "カゲツハン"
kanji_numeral = true
[[counter."箇月半".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カゲツハン"
sokuonize = true
# === end: ヶ月 系 ===

# === begin: 年度 ===
# 「8年度」「令和8年度」のような表現を ハチネンド と読ませる
[counter."年度"]
default = "ネンド"
# === end: 年度 ===

# === begin: 時間半 ===
# 「2時間半」を ニジカンハン と読ませる
[counter."時間半"]
default = "ジカンハン"
# 注: 四時間半/九時間半 の特殊読み (よじ/くじ) は lib の counter matching 上
# replacements が発火しないため未対応 (四時間半=よんじかんはん のまま、稀用法)。
# === end: 時間半 ===

# === begin: 年 ===
# Lindera default で「ねん」が出るが、念のため counter として明示
[counter."年"]
default = "ネン"
# === end: 年 ===

# === begin: 時間 ===
# 「N時間」を Nジカン に。 4/7/9 はカナ末尾置換 (ヨン→ヨ / ナナ→シチ / キュウ→ク、
# 「時」 と同じ pattern、 ★alpha.21 round 10 で対応):
#   4時間 → ヨジカン (ヨンジカンではなく)
#   7時間 → シチジカン
#   9時間 → クジカン
[counter."時間"]
default = "ジカン"
kanji_numeral = true  # 漢数字でも replacements 発火 (四時間=よじかん/九時間=くじかん。旧 よんじかん/きゅうじかん、★2026-06-21)

[[counter."時間".replacements]]
last_digit = [4]
from = "ヨン"
to = "ヨ"

[[counter."時間".replacements]]
last_digit = [7]
from = "ナナ"
to = "シチ"

[[counter."時間".replacements]]
last_digit = [9]
from = "キュウ"
to = "ク"
# === end: 時間 ===
