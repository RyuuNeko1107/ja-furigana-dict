# 時間系助数詞 (月 / 日 / 時 / 分 / 分半 / 週間 / 回)
#
# 「日」の 1〜31 の特殊読みは days.toml で別管理 (ここでは default のみ)。

[meta]
role = "counters"
description = "時間系助数詞 (月 / 日 / 時 / 分 / 週間 / 回、 4/7/9 の特殊読み + カナ末尾置換)"

# === begin: 月 ===
# 4/7/9 は specials で full-override (シガツ / シチガツ / クガツ)
[counter."月"]
default = "ガツ"
specials = { "4" = "シガツ", "7" = "シチガツ", "9" = "クガツ" }
# === end: 月 ===

# === begin: 日 ===
# 1〜31 の特殊読みは days.toml で別管理 (ここでは default のみ)
[counter."日"]
default = "ニチ"
# === end: 日 ===

# === begin: 時 ===
# 0=レイジ、4/7/9 はカナ末尾置換 (ヨン→ヨ / ナナ→シチ / キュウ→ク)
[counter."時"]
default = "ジ"
specials = { "0" = "レイジ" }

[[counter."時".replacements]]
last_digit = [4]
from = "ヨン"
to = "ヨ"

[[counter."時".replacements]]
last_digit = [7]
from = "ナナ"
to = "シチ"

[[counter."時".replacements]]
last_digit = [9]
from = "キュウ"
to = "ク"
# === end: 時 ===

# === begin: 分 ===
[counter."分"]
default = "フン"

[[counter."分".rules]]
last_digit = [1, 3, 4, 6, 8, 0]
suffix = "プン"
sokuonize = true
# === end: 分 ===

# === begin: 分半 ===
[counter."分半"]
default = "フンハン"

[[counter."分半".rules]]
last_digit = [1, 3, 4, 6, 8, 0]
suffix = "プンハン"
sokuonize = true
# === end: 分半 ===

# === begin: 週間 ===
[counter."週間"]
default = "シュウカン"

[[counter."週間".rules]]
last_digit = [1, 8, 0]
suffix = "シュウカン"
sokuonize = true
# === end: 週間 ===

# === begin: 回 ===
[counter."回"]
default = "カイ"

[[counter."回".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カイ"
sokuonize = true
# === end: 回 ===

# === begin: 年度 ===
# 「8年度」「令和8年度」のような表現を ハチネンド と読ませる
[counter."年度"]
default = "ネンド"
# === end: 年度 ===

# === begin: 時間半 ===
# 「2時間半」を ニジカンハン と読ませる
[counter."時間半"]
default = "ジカンハン"
# === end: 時間半 ===

# === begin: 年 ===
# Lindera default で「ねん」が出るが、念のため counter として明示
[counter."年"]
default = "ネン"
# === end: 年 ===

# === begin: 時間 ===
# 「N時間」を Nジカン に
[counter."時間"]
default = "ジカン"
# === end: 時間 ===
