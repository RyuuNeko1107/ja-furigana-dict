# パーセンテージ (% / ％)

[meta]
schema_version = "2"
role = "counters"
description = "パーセンテージ (% / ％、 1/6/8/0 で促音化 + パーセント)"

# === begin: % ===
[counter."%"]
default = "パーセント"
kanji_numeral = false  # 漢数字 + % (「五%」) は実用ほぼ無いため意図的 OFF

[[counter."%".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true
# === end: % ===

# === begin: ％ ===
[counter."％"]
default = "パーセント"
kanji_numeral = false  # 漢数字 + ％ は実用ほぼ無いため意図的 OFF

[[counter."％".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true
# === end: ％ ===
