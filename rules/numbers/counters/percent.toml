# パーセンテージ (% / ％)


[meta]
role = "counters"
description = "パーセンテージ (% / ％、 1/6/8/0 で促音化 + パーセント)"

[counter."%"]
default = "パーセント"

[[counter."%".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true

[counter."％"]
default = "パーセント"

[[counter."％".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true
