# パーセンテージ (% / ％)

[meta]
role = "counters"
description = "パーセンテージ (% / ％、 1/6/8/0 で促音化 + パーセント)"

# === begin: % ===
[counter."%"]
default = "パーセント"

[[counter."%".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true
# === end: % ===

# === begin: ％ ===
[counter."％"]
default = "パーセント"

[[counter."％".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パーセント"
sokuonize = true
# === end: ％ ===
