# 場所を数える助数詞 (階 / ヶ所 / 箇所 / か所)

[meta]
role = "counters"
description = "場所を数える助数詞 (階 / ヶ所 / 箇所 / か所、 連濁 / 促音化)"

# === begin: 階 ===
[counter."階"]
default = "カイ"

[[counter."階".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カイ"
sokuonize = true

[[counter."階".rules]]
last_digit = [3]
suffix = "ガイ"
# === end: 階 ===

# === begin: ヶ所 ===
[counter."ヶ所"]
default = "カショ"

[[counter."ヶ所".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カショ"
sokuonize = true
# === end: ヶ所 ===

# === begin: 箇所 ===
[counter."箇所"]
default = "カショ"

[[counter."箇所".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カショ"
sokuonize = true
# === end: 箇所 ===

# === begin: か所 ===
[counter."か所"]
default = "カショ"

[[counter."か所".rules]]
last_digit = [1, 6, 8, 0]
suffix = "カショ"
sokuonize = true
# === end: か所 ===
