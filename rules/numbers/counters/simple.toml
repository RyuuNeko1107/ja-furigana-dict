# 単純サフィックス助数詞
#
# ## 用途
#
# 連濁 / 促音化 / kana 末尾置換などの **複雑 logic が要らない** 助数詞。
# 数値カナの後ろに value を **そのまま連結** するだけ。
#
# 例:
#   「3 円」 → サンエン     (= サン + エン)
#   「5 度」 → ゴド         (= ゴ + ド)
#   「7 名」 → シチメイ     (= シチ + メイ)
#   「2 時間」 → ニジカン   (= ニ + ジカン)
#
# ## どのとき発火するか
#
# lib の chunks/ counter regex で 「数値 + 助数詞」 が hit した時、 lib の
# `euphonic_counter_read()` がまず simple table を確認、 hit すれば
# 「数値カナ + simple value」 で確定。 hit しなければ counter table (= `[counter."X"]`)
# 側の連濁 / 促音化 logic に進む。
#
# ## 追加するなら
#
# - 形式: `"surface" = "読み"` (= 1 line entry)
# - **連濁 / 促音化 / 数値依存 specials が無い** 助数詞のみ、 これらが要る場合は
#   `[counter."X"]` (= objects.toml / time.toml 等) に置く
# - 例: 「個」 は 1/6/8/10 で促音化 (「1 個 = イッコ」) するので simple ではなく
#   objects.toml の `[counter."個"]` で書く
# - 50 音順推奨
#
# ## 注意点
#
# - **連濁・促音化判定**: 数値末尾 1/3/6/8/10 で読みが変わる助数詞は
#   simple に置かないこと (= 「3 本 → サンボン」 のような連濁が起こる助数詞)
# - 「時間」 「時間半」 「時頃」 のような **時間 + 修飾** 系もここで OK (= 助数詞
#   全体を 1 unit として扱い、 数値部だけが変化する)


[meta]
schema_version = "2"
role = "counters"
description = "単純サフィックス助数詞 (円 / 点 / 度 / 名 / 話 等、 数値カナ + value 連結のみ)"

