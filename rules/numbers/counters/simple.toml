# 単純サフィックス助数詞
#
# ## 用途
#
# 連濁 / 促音化 / kana 末尾置換などの **複雑 logic が要らない** 助数詞。
# 数値カナの後ろに value を **そのまま連結** するだけ。
#
# 例:
#   「3 円」 → サンエン     (= サン + エン)
#   「5 度」 → ゴド         (= ゴ + ド)
#   「7 名」 → シチメイ     (= シチ + メイ)
#   「2 時間」 → ニジカン   (= ニ + ジカン)
#
# ## どのとき発火するか
#
# lib の chunks/ counter regex で 「数値 + 助数詞」 が hit した時、 lib の
# `euphonic_counter_read()` がまず simple table を確認、 hit すれば
# 「数値カナ + simple value」 で確定。 hit しなければ counter table (= `[counter."X"]`)
# 側の連濁 / 促音化 logic に進む。
#
# ## 追加するなら
#
# - 形式: `"surface" = "読み"` (= 1 line entry)
# - **連濁 / 促音化 / 数値依存 specials が無い** 助数詞のみ、 これらが要る場合は
#   `[counter."X"]` (= objects.toml / time.toml 等) に置く
# - 例: 「個」 は 1/6/8/10 で促音化 (「1 個 = イッコ」) するので simple ではなく
#   objects.toml の `[counter."個"]` で書く
# - 50 音順推奨
#
# ## 注意点
#
# - **連濁・促音化判定**: 数値末尾 1/3/6/8/10 で読みが変わる助数詞は
#   simple に置かないこと (= 「3 本 → サンボン」 のような連濁が起こる助数詞)
# - 「時間」 「時間半」 「時頃」 のような **時間 + 修飾** 系もここで OK (= 助数詞
#   全体を 1 unit として扱い、 数値部だけが変化する)


[meta]
schema_version = "2"
role = "counters"
description = "単純サフィックス助数詞 (円 / 点 / 度 / 名 / 話 等、 数値カナ + value 連結のみ)"

[simple]
"円" = "エン"
"点" = "テン"
"割" = "ワリ"
"度" = "ド"
"°" = "ド"
"℃" = "ド"
"℉" = "カッシ"
"合" = "ゴウ"
"倍" = "バイ"
"名" = "メイ"
"号" = "ゴウ"
"章" = "ショウ"
"類" = "ルイ"
"席" = "セキ"
"粒" = "ツブ"
"錠" = "ジョウ"
# 「艘」 は objects.toml で counter rule (kanji_numeral opt-in、 一艘=いっそう 促音 + 三艘=さんそう)
"口" = "クチ"
"年" = "ネン"
"時間半" = "ジカンハン"
"時半" = "ジハン"
"時頃" = "ジゴロ"
"時ごろ" = "ジゴロ"
"秒" = "ビョウ"
"台" = "ダイ"
"枚" = "マイ"
# 「羽」 は objects.toml で counter rule (1/6/8/10 で促音 + 3 で連濁 = サンバ/ロッパ)
"位" = "イ"
"体" = "タイ"  # ★round 19、 「3 体」 = サンタイ (= キャラ数)
# 「週」 は objects.toml で counter rule (1/6/8/10 で促音 = イッシュウ等)
# 「ヶ月」 系は time.toml で counter rule (1/6/8/10 で促音 = イッカゲツ/ロッカゲツ等)。
# simple.toml に置くと簡易ルートで確定し促音化しないため、 ここから除外。
"‰" = "パーミル"
# 「件」 は objects.toml で rule (1/6/8/10 で促音 = イッケン等)
"番" = "バン"
"段" = "ダン"
"字" = "ジ"
"行" = "ギョウ"
"商" = "ショウ"
"玉" = "タマ"
"弾" = "ダン"
"葉" = "ヨウ"
# 「食」 は objects.toml で rule
"両" = "リョウ"
"周年" = "シュウネン"
"頁" = "ページ"
# 「室」 は objects.toml で rule
"打" = "ダ"
"切れ" = "キレ"
"杖" = "ジョウ"
# 「畳」 は objects.toml で rule (= kanji_numeral opt-in、 六畳/八畳)
"歌" = "カ"
"基" = "キ"
"番目" = "バンメ"
"番手" = "バンテ"
"段階" = "ダンカイ"
