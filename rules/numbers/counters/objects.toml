# 票 (投票): 一票=いっぴょう/六票=ろっぴょう/八票=はっぴょう/十票=じゅっぴょう、 三票=さんびょう (俵と同型、旧 simple.toml で欠落)
[counter."票"]
default = "ヒョウ"
kanji_numeral = true

[[counter."票".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピョウ"
sokuonize = true

[[counter."票".rules]]
last_digit = [3]
suffix = "ビョウ"
# === end: 票 ===

# ───────────────────────────────────────────────────────────────
# simple.toml から移動 (2026-06-19): 漢数字 bare + 促音/連濁 promotion 対応。
# simple.toml は kanji_numeral 無し + promotion 無しのため「一話=いちはなし/一曲=いちきょく」
# 等に化けていた。objects.toml の counter rule で漢数字 gate + 促音化を付与。
# ───────────────────────────────────────────────────────────────

