# 物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊)

# ─── 本 ────────────────────────────────────────────────────────────────────

[meta]
role = "counters"
description = "物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊、 連濁 / 促音化)"

[counter."本"]
default = "ホン"

[[counter."本".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ポン"
sokuonize = true

[[counter."本".rules]]
last_digit = [3]
suffix = "ボン"

# ─── 匹 ────────────────────────────────────────────────────────────────────
[counter."匹"]
default = "ヒキ"

[[counter."匹".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピキ"
sokuonize = true

[[counter."匹".rules]]
last_digit = [3]
suffix = "ビキ"

# ─── 杯 ────────────────────────────────────────────────────────────────────
[counter."杯"]
default = "ハイ"

[[counter."杯".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パイ"
sokuonize = true

[[counter."杯".rules]]
last_digit = [3]
suffix = "バイ"

# ─── 個 ────────────────────────────────────────────────────────────────────
[counter."個"]
default = "コ"

[[counter."個".rules]]
last_digit = [1, 6, 8, 0]
suffix = "コ"
sokuonize = true

# ─── 歳 ────────────────────────────────────────────────────────────────────
[counter."歳"]
default = "サイ"

[[counter."歳".rules]]
last_digit = [1, 8, 0]
suffix = "サイ"
sokuonize = true

# ─── 冊 ────────────────────────────────────────────────────────────────────
[counter."冊"]
default = "サツ"

[[counter."冊".rules]]
last_digit = [1, 8, 0]
suffix = "サツ"
sokuonize = true

