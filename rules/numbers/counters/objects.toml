# 物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊)

[meta]
role = "counters"
description = "物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊、 連濁 / 促音化)"

# === begin: 本 ===
[counter."本"]
default = "ホン"

[[counter."本".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ポン"
sokuonize = true

[[counter."本".rules]]
last_digit = [3]
suffix = "ボン"
# === end: 本 ===

# === begin: 匹 ===
[counter."匹"]
default = "ヒキ"

[[counter."匹".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピキ"
sokuonize = true

[[counter."匹".rules]]
last_digit = [3]
suffix = "ビキ"
# === end: 匹 ===

# === begin: 杯 ===
[counter."杯"]
default = "ハイ"

[[counter."杯".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パイ"
sokuonize = true

[[counter."杯".rules]]
last_digit = [3]
suffix = "バイ"
# === end: 杯 ===

# === begin: 個 ===
[counter."個"]
default = "コ"

[[counter."個".rules]]
last_digit = [1, 6, 8, 0]
suffix = "コ"
sokuonize = true
# === end: 個 ===

# === begin: 歳 ===
[counter."歳"]
default = "サイ"

[[counter."歳".rules]]
last_digit = [1, 8, 0]
suffix = "サイ"
sokuonize = true
# === end: 歳 ===

# === begin: 冊 ===
[counter."冊"]
default = "サツ"

[[counter."冊".rules]]
last_digit = [1, 8, 0]
suffix = "サツ"
sokuonize = true
# === end: 冊 ===

