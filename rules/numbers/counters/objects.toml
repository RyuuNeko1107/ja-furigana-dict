# 物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊)
#
# ## 用途
#
# 数値末尾 (1/3/6/8/10) で **連濁 / 促音化** が起こる助数詞。 物体 / 動物 / 容器 /
# 個数を数えるときの reading 動的合成。
#
# 例:
#   「1 本」 → イッポン    (= rules: 1/6/8/10 で sokuonize + suffix ポン)
#   「3 本」 → サンボン    (= rules: 3 で suffix ボン)
#   「7 本」 → ナナホン    (= default: ホン、 = rules に該当無し)
#   「1 匹」 → イッピキ    (= 同 pattern: ピキ + 促音化)
#   「3 匹」 → サンビキ    (= ビキ 連濁)
#   「1 個」 → イッコ      (= sokuonize: イチ → イッ + suffix コ)
#
# ## 書き方 (= 各 counter の典型 pattern)
#
#   [counter."X"]
#   default = "<デフォルト読み>"   # 連濁・促音化が起こらない数値の場合
#
#   [[counter."X".rules]]
#   last_digit = [1, 6, 8, 0]      # 末尾数字 (= 「1 X」 「16 X」 「100 X」 等)
#   suffix = "<促音化版>"           # 例: 「ポン」 (ホン の半濁音)
#   sokuonize = true               # 数値カナ末尾を促音化 (= イチ → イッ、 ロク → ロッ)
#
#   [[counter."X".rules]]
#   last_digit = [3]
#   suffix = "<連濁版>"             # 例: 「ボン」 (ホン の濁音)
#   # sokuonize = false (= default、 「3」 は変化しない)
#
# ## どのとき発火するか
#
# lib の chunks/ で `NUM_PAT + counter` regex が hit、 lib の
# `euphonic_counter_read()` が:
# 1. simple.toml にあれば simple ルートで確定 (= 該当しない場合のみ counter table へ)
# 2. specials (= 完全一致 number override) を確認
# 3. replacements (= カナ末尾置換) を適用
# 4. rules (= last_digit + 連濁 / 促音化) を適用
# 5. default で fallback
#
# ## 追加するなら
#
# - 連濁 / 促音化が起こる物体系 助数詞のみ
# - 単純連結のみ (= 「点」 「度」 等) は simple.toml に置く
# - 時間系 (= 「月」 「日」 「時」 「分」) は time.toml に置く
# - 人 (= 「人」 「名」) は people.toml に置く
# - 場所 (= 「階」 「軒」) は places.toml に置く

[meta]
schema_version = "2"
role = "counters"
description = "物を数える助数詞 (本 / 匹 / 杯 / 個 / 歳 / 冊、 連濁 / 促音化)"

# === begin: 本 ===
[counter."本"]
default = "ホン"
kanji_numeral = true  # 六本/八本/十本 → ろっぽん/はっぽん/じゅっぽん (漢数字 bare 対応)

[[counter."本".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ポン"
sokuonize = true

[[counter."本".rules]]
last_digit = [3]
suffix = "ボン"
# === end: 本 ===

# === begin: 匹 ===
[counter."匹"]
default = "ヒキ"
kanji_numeral = true  # 五匹/六匹/十匹 → ごひき/ろっぴき/じゅっぴき (漢数字 bare 対応)

[[counter."匹".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピキ"
sokuonize = true

[[counter."匹".rules]]
last_digit = [3]
suffix = "ビキ"
# === end: 匹 ===

# === begin: 杯 ===
[counter."杯"]
default = "ハイ"
kanji_numeral = true  # 三杯/六杯 → さんばい/ろっぱい (漢数字 bare 対応)

[[counter."杯".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パイ"
sokuonize = true

[[counter."杯".rules]]
last_digit = [3]
suffix = "バイ"
# === end: 杯 ===

# === begin: 個 ===
[counter."個"]
default = "コ"
kanji_numeral = true  # 六個/八個/十個 → ろっこ/はっこ/じゅっこ (漢数字 bare 対応)

[[counter."個".rules]]
last_digit = [1, 6, 8, 0]
suffix = "コ"
sokuonize = true
# === end: 個 ===

# === begin: 歳 ===
[counter."歳"]
default = "サイ"
kanji_numeral = true  # 一歳/八歳 → いっさい/はっさい (漢数字 bare 対応)

[[counter."歳".rules]]
last_digit = [1, 8, 0]
suffix = "サイ"
sokuonize = true
# === end: 歳 ===

# === begin: 冊 ===
[counter."冊"]
default = "サツ"
kanji_numeral = true  # 一冊/八冊/十冊 → いっさつ/はっさつ/じゅっさつ (漢数字 bare 対応)

[[counter."冊".rules]]
last_digit = [1, 8, 0]
suffix = "サツ"
sokuonize = true
# === end: 冊 ===

# === begin: 歩 === (★alpha.21 round 7、 「1 万歩 → イチマンポ」 等の助数詞 promotion)
[counter."歩"]
default = "ホ"
kanji_numeral = true  # 一歩/六歩/八歩 → いっぽ/ろっぽ/はっぽ (漢数字 bare 対応)

# 1/6/8/10 で促音化 + ポ (= 「いっぽ / ろっぽ / はっぽ / じゅっぽ / いちまんぽ」)
[[counter."歩".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ポ"
sokuonize = true

# 3 は連濁で ボ (= 「さんぼ」 三歩)
[[counter."歩".rules]]
last_digit = [3]
suffix = "ボ"
# === end: 歩 ===

# === begin: つ === (和語数詞 1〜9 specials)
# 「N つ」 は 1〜9 が和語数詞 (ヒトツ / フタツ / ミッツ / ヨッツ / イツツ / ムッツ /
# ナナツ / ヤッツ / ココノツ)。 default 「ツ」 は 10 以上の safety fallback。
[counter."つ"]
default = "ツ"
specials = { "1" = "ヒトツ", "2" = "フタツ", "3" = "ミッツ", "4" = "ヨッツ", "5" = "イツツ", "6" = "ムッツ", "7" = "ナナツ", "8" = "ヤッツ", "9" = "ココノツ" }
# === end: つ ===

# === begin: 隻 === (船等、 1/8/10 で促音化。 六隻=ろくせき は促音化しない)
[counter."隻"]
default = "セキ"
kanji_numeral = true  # 一隻/八隻 → いっせき/はっせき (漢数字 bare 対応)

[[counter."隻".rules]]
last_digit = [1, 8, 0]
suffix = "セキ"
sokuonize = true
# === end: 隻 ===

# === begin: 頭 === (大型動物、 1/8/10 で促音化。 六頭=ろくとう は促音化しない)
[counter."頭"]
default = "トウ"
kanji_numeral = true  # 一頭/八頭/十頭 → いっとう/はっとう/じゅっとう (漢数字 bare 対応)

[[counter."頭".rules]]
last_digit = [1, 8, 0]
suffix = "トウ"
sokuonize = true
# === end: 頭 ===

# === begin: 句 === (俳句、 1/6/8/10 で促音化)
[counter."句"]
default = "ク"
kanji_numeral = true  # 一句/六句 → いっく/ろっく (漢数字 bare 対応)

[[counter."句".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ク"
sokuonize = true
# === end: 句 ===

# === begin: 局 === (将棋/テレビ局、 1/6/8/10 で促音化)
[counter."局"]
default = "キョク"
kanji_numeral = true  # 一局/六局 → いっきょく/ろっきょく (漢数字 bare 対応)

[[counter."局".rules]]
last_digit = [1, 6, 8, 0]
suffix = "キョク"
sokuonize = true
# === end: 局 ===

# === begin: 種 === (種類、 1/8/10 で促音化。 六種=ろくしゅ は促音化しない)
[counter."種"]
default = "シュ"
kanji_numeral = true  # 一種/八種 → いっしゅ/はっしゅ (漢数字 bare 対応)

[[counter."種".rules]]
last_digit = [1, 8, 0]
suffix = "シュ"
sokuonize = true
# === end: 種 ===

# === begin: 首 === (詩歌、 1/6/8/10 で促音化)
[counter."首"]
default = "シュ"
kanji_numeral = true  # 一首/六首 → いっしゅ/ろくしゅ (漢数字 bare 対応)

[[counter."首".rules]]
last_digit = [1, 6, 8, 0]
suffix = "シュ"
sokuonize = true
# === end: 首 ===

# === begin: 軒 === (家屋、 1/6/8/10 で促音化 + ケン、 3 で連濁ゲン、 ★round 51)
# simple.toml の「軒 = ケン」 を override (= rule 優先で動的合成)
[counter."軒"]
default = "ケン"
kanji_numeral = true  # 三軒/六軒 → さんげん/ろっけん (漢数字 bare 対応)

[[counter."軒".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ケン"
sokuonize = true

[[counter."軒".rules]]
last_digit = [3]
suffix = "ゲン"
# === end: 軒 ===

# === begin: 着 === (衣類/到着順、 1/6/8/10 で促音化、 ★round 51)
[counter."着"]
default = "チャク"
kanji_numeral = true  # 一着/六着 → いっちゃく/ろくちゃく (漢数字 bare 対応)

[[counter."着".rules]]
last_digit = [1, 6, 8, 0]
suffix = "チャク"
sokuonize = true
# === end: 着 ===

# === begin: 通 === (手紙/書類、 1/6/8/10 で促音化、 ★round 51)
[counter."通"]
default = "ツウ"
kanji_numeral = true  # 一通/六通 → いっつう/ろくつう (漢数字 bare 対応)

[[counter."通".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ツウ"
sokuonize = true
# === end: 通 ===

# === begin: 発 === (弾薬/球数、 1/6/8/10 で促音化 + パツ、 3 で連濁、 ★round 51)
# simple.toml の「発 = ハツ」 を override (= rule 優先で動的合成)
[counter."発"]
default = "ハツ"
kanji_numeral = true  # 三発/六発 → さんぱつ/ろっぱつ (漢数字 bare 対応)

[[counter."発".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パツ"
sokuonize = true

[[counter."発".rules]]
last_digit = [3]
suffix = "パツ"
# === end: 発 ===

# === begin: 羽 === (鳥、 1/3/6/8/10 で促音化/連濁、 ★round 51)
# 1=イチワ (連濁/促音なし)、 3=サンバ、 6=ロッパ、 8=ハッパ、 10=ジュッパ
[counter."羽"]
default = "ワ"
kanji_numeral = true  # 三羽/五羽/六羽 → さんば/ごわ/ろっぱ (漢数字 bare 対応、 旧 五羽→ごう 誤読を解消)

[[counter."羽".rules]]
last_digit = [6, 8, 0]
suffix = "パ"
sokuonize = true

[[counter."羽".rules]]
last_digit = [3]
suffix = "バ"
# === end: 羽 ===

# === begin: 週 === (週数、 1/6/8/10 で促音化)
[counter."週"]
default = "シュウ"
kanji_numeral = true  # 一週/六週/八週 → いっしゅう/ろくしゅう/はっしゅう (漢数字 bare 対応)

[[counter."週".rules]]
last_digit = [1, 6, 8, 0]
suffix = "シュウ"
sokuonize = true
# === end: 週 ===

# === begin: 派 === (派閥、 1/6/8/10 で促音化)
[counter."派"]
default = "ハ"
kanji_numeral = true  # 一派/六派/八派 → いっぱ/ろっぱ/はっぱ (漢数字 bare 対応)

[[counter."派".rules]]
last_digit = [1, 6, 8, 0]
suffix = "パ"
sokuonize = true
# === end: 派 ===

# === begin: 節 === (節数、 1/6/8/10 で促音化)
[counter."節"]
default = "セツ"
kanji_numeral = true  # 一節/六節/八節 → いっせつ/ろくせつ/はっせつ (漢数字 bare 対応)

[[counter."節".rules]]
last_digit = [1, 6, 8, 0]
suffix = "セツ"
sokuonize = true
# === end: 節 ===

# === begin: 編 === (書物の編、 1/6/8/10 で促音化)
[counter."編"]
default = "ヘン"
kanji_numeral = true  # 一編/六編 → いっぺん/ろっぺん (漢数字 bare 対応)

[[counter."編".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ペン"
sokuonize = true

[[counter."編".rules]]
last_digit = [3]
suffix = "ペン"
# === end: 編 ===

# === begin: 篇 === (詩篇、 「編」 異体字、 1/6/8/10 で促音化)
[counter."篇"]
default = "ヘン"
kanji_numeral = true  # 一篇 → いっぺん (漢数字 bare 対応)

[[counter."篇".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ペン"
sokuonize = true

[[counter."篇".rules]]
last_digit = [3]
suffix = "ペン"
# === end: 篇 ===

# === begin: 件 === (件数、 1/6/8/10 で促音化、 simple.toml の「件 = ケン」 を override)
[counter."件"]
default = "ケン"
kanji_numeral = true  # 一件/六件 → いっけん/ろっけん (漢数字 bare 対応)

[[counter."件".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ケン"
sokuonize = true
# === end: 件 ===

# === begin: 軒 === (家屋、 既上で定義済、 重複しない)

# === begin: 階 === (places.toml に既、 重複しない)

# === begin: 食 === (食事、 1/6/8/10 で促音化)
[counter."食"]
default = "ショク"
kanji_numeral = true  # 一食/六食 → いっしょく/ろくしょく (漢数字 bare 対応)

[[counter."食".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ショク"
sokuonize = true
# === end: 食 ===

# === begin: 戦 === (試合、 1/6/8/10 で促音化、 「1 戦 = イッセン」)
[counter."戦"]
default = "セン"
kanji_numeral = true  # 一戦/六戦 → いっせん/ろっせん (漢数字 bare 対応)

[[counter."戦".rules]]
last_digit = [1, 6, 8, 0]
suffix = "セン"
sokuonize = true
# === end: 戦 ===

# inline test は隣接の `objects.test.toml` に分離 (CI 専用、 release tar 除外、
# runtime memory には載らない)。 contributor は `<name>.test.toml` ペアで追記する。

# === begin: 畳 ===
[counter."畳"]
default = "ジョウ"
kanji_numeral = true  # 六畳/八畳 → ろくじょう/はちじょう (元 simple.toml、 漢数字 bare 対応で移動)
# === end: 畳 ===

# === begin: 艘 === (船、 1/8/10 で促音化。 六艘=ろくそう は促音化しない、 ★2026-06-18)
# 元 simple.toml の「艘 = ソウ」 を移動 (= 漢数字 三艘=さんふね 誤読を kanji_numeral で解消)
[counter."艘"]
default = "ソウ"
kanji_numeral = true  # 一艘/八艘 → いっそう/はっそう、 三艘=さんそう (漢数字 bare 対応)

[[counter."艘".rules]]
last_digit = [1, 8, 0]
suffix = "ソウ"
sokuonize = true
# === end: 艘 ===

# === begin: 斤 === (食パン等、 1/6/8/10 で促音化。 ★2026-06-18)
[counter."斤"]
default = "キン"
kanji_numeral = true  # 一斤/六斤/八斤 → いっきん/ろっきん/はっきん (漢数字 bare 対応)

[[counter."斤".rules]]
last_digit = [1, 6, 8, 0]
suffix = "キン"
sokuonize = true
# === end: 斤 ===

# === begin: 俵 === (米俵等、 1/6/8/10 で促音化 + ピョウ、 3 で連濁ビョウ。 ★2026-06-18)
[counter."俵"]
default = "ヒョウ"
kanji_numeral = true  # 一俵/六俵 → いっぴょう/ろっぴょう、 三俵=さんびょう (漢数字 bare 対応)

[[counter."俵".rules]]
last_digit = [1, 6, 8, 0]
suffix = "ピョウ"
sokuonize = true

[[counter."俵".rules]]
last_digit = [3]
suffix = "ビョウ"
# === end: 俵 ===

# === begin: 桁 === (数の桁、 1/2 は和語 ヒトケタ/フタケタ、 6/8/10 で促音化。 ★2026-06-18)
[counter."桁"]
default = "ケタ"
kanji_numeral = true  # 三桁/六桁 → さんけた/ろっけた (漢数字 bare 対応)
specials = { "1" = "ヒトケタ", "2" = "フタケタ" }

[[counter."桁".rules]]
last_digit = [6, 8, 0]
suffix = "ケタ"
sokuonize = true
# === end: 桁 ===

# === begin: 客 === (茶碗等の組、 1/6/8/10 で促音化。 ★2026-06-18)
[counter."客"]
default = "キャク"
kanji_numeral = true  # 一客/六客 → いっきゃく/ろっきゃく (漢数字 bare 対応)

[[counter."客".rules]]
last_digit = [1, 6, 8, 0]
suffix = "キャク"
sokuonize = true
# === end: 客 ===

# === begin: 脚 === (椅子/三脚、 1/6/8/10 で促音化。 ★2026-06-18)
[counter."脚"]
default = "キャク"
kanji_numeral = true  # 一脚/六脚 → いっきゃく/ろっきゃく (漢数字 bare 対応)

[[counter."脚".rules]]
last_digit = [1, 6, 8, 0]
suffix = "キャク"
sokuonize = true
